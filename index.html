* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --felt-light: #3a5741;
  --felt: #22382a;
  --felt-dark: #0c1410;
  --gold: #d9a441;
  --cream: #e8dcc0;
  --ink: #2a241a;
  --ink-faded: #7a6f58;
  --ivory: #f5efe2;
}

body {
  font-family: Georgia, 'Iowan Old Style', 'Times New Roman', serif;
  color: var(--cream);
  background: radial-gradient(ellipse 120% 90% at 50% -20%, var(--felt-light), var(--felt) 45%, var(--felt-dark) 100%) fixed;
  min-height: 100vh;
}

/* Lamp glow */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  background: radial-gradient(ellipse 45% 30% at 50% 0%, rgba(255, 220, 150, 0.13), transparent 70%);
}

/* Felt grain */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  background-image: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='300' height='300'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/><feColorMatrix type='saturate' values='0'/></filter><rect width='300' height='300' filter='url(%23n)' opacity='0.05'/></svg>");
}

#app {
  max-width: 1080px;
  margin: 0 auto;
  padding: 24px 20px 60px;
  position: relative;
  z-index: 1;
  overflow-x: clip; /* nothing may widen the page past the viewport */
}

/* ── Scene: the hanging lamp ────────────────── */

#scene {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
}

#scene .lamp {
  position: absolute;
  top: 0; left: 50%;
  width: 0;
  transform-origin: top center;
  animation: lamp-sway 9s ease-in-out infinite;
}

@keyframes lamp-sway {
  0%, 100% { transform: rotate(-0.6deg); }
  50% { transform: rotate(0.6deg); }
}

#scene .cord {
  position: absolute;
  top: 0; left: -1px;
  width: 2px; height: 34px;
  background: linear-gradient(#000, #1c1712);
}

#scene .shade {
  position: absolute;
  top: 34px; left: -60px;
  width: 120px; height: 40px;
  background: linear-gradient(160deg, #4a3d28, #241d12 60%, #15100a);
  clip-path: polygon(26% 0, 74% 0, 100% 100%, 0 100%);
}

#scene .bulbglow {
  position: absolute;
  top: 62px; left: -75px;
  width: 150px; height: 26px;
  background: radial-gradient(ellipse at 50% 0%, rgba(255, 232, 170, 0.9), rgba(255, 220, 150, 0.15) 55%, transparent 75%);
  filter: blur(2px);
}

#scene .cone {
  position: absolute;
  top: 70px; left: 0;
  width: 100%; height: 62vh;
  background: linear-gradient(rgba(255, 226, 160, 0.09), transparent 78%);
  clip-path: polygon(44.5% 0, 55.5% 0, 84% 100%, 16% 100%);
  animation: flicker 7s infinite;
}

@keyframes flicker {
  0%, 100% { opacity: 1; }
  87% { opacity: 1; }
  88% { opacity: 0.75; }
  89% { opacity: 0.95; }
  91% { opacity: 0.7; }
  92% { opacity: 1; }
}

#scene .motes i {
  position: absolute;
  top: 80px;
  width: 3px; height: 3px;
  border-radius: 50%;
  background: rgba(255, 232, 180, 0.55);
  opacity: 0;
  animation: mote 11s linear infinite;
}

#scene .motes i:nth-child(1) { left: 47%; animation-duration: 12s; }
#scene .motes i:nth-child(2) { left: 50%; animation-delay: 1.6s; animation-duration: 9s; }
#scene .motes i:nth-child(3) { left: 53%; animation-delay: 3.1s; width: 2px; height: 2px; }
#scene .motes i:nth-child(4) { left: 45%; animation-delay: 4.7s; animation-duration: 14s; }
#scene .motes i:nth-child(5) { left: 56%; animation-delay: 6s; width: 2px; height: 2px; }
#scene .motes i:nth-child(6) { left: 49%; animation-delay: 7.4s; animation-duration: 10s; }
#scene .motes i:nth-child(7) { left: 52%; animation-delay: 8.8s; width: 2px; height: 2px; }
#scene .motes i:nth-child(8) { left: 44%; animation-delay: 10.2s; animation-duration: 13s; }

@keyframes mote {
  0% { transform: translate(0, 0); opacity: 0; }
  12% { opacity: 0.7; }
  85% { opacity: 0.35; }
  100% { transform: translate(26px, 52vh); opacity: 0; }
}

#scene .vignette {
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 50% 38%, transparent 52%, rgba(0, 0, 0, 0.55) 100%);
}

header {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
  margin-bottom: 28px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 14px;
}

.logo-mark {
  height: 46px;
  filter: drop-shadow(0 0 12px rgba(217, 164, 65, 0.3));
}

.wordmark {
  display: flex;
  flex-direction: column;
  gap: 4px;
  font-weight: normal;
  text-transform: uppercase;
  color: var(--gold);
  text-shadow: 0 0 24px rgba(217, 164, 65, 0.35);
  line-height: 1;
}

.wordmark .w1 {
  font-size: 1.35rem;
  letter-spacing: 0.42em;
}

.wordmark .w2 {
  font-size: 0.95rem;
  letter-spacing: 0.45em;
  color: rgba(217, 164, 65, 0.8);
}

.wordmark .w2 em {
  font-style: italic;
  text-transform: lowercase;
  font-size: 0.8rem;
  letter-spacing: 0.2em;
  color: rgba(232, 220, 192, 0.55);
}

.stats { display: flex; flex-wrap: wrap; gap: 18px; align-items: baseline; }

.stat {
  font-size: 0.9rem;
  color: rgba(232, 220, 192, 0.75);
  letter-spacing: 0.05em;
}

.stat .boss { color: var(--gold); font-style: italic; }

.stat.money {
  font-size: 1.1rem;
  color: var(--gold);
}

.help-btn {
  width: 26px; height: 26px;
  border-radius: 50%;
  border: 1px solid rgba(217, 164, 65, 0.5);
  background: rgba(0, 0, 0, 0.3);
  color: var(--gold);
  font-family: inherit;
  font-size: 0.9rem;
  cursor: pointer;
  transition: box-shadow 0.12s ease;
}

.help-btn:hover { box-shadow: 0 0 12px rgba(217, 164, 65, 0.35); }

.help-btn.wide {
  width: auto;
  border-radius: 14px;
  padding: 0 14px;
  font-size: 0.7rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
}

.stat-btn {
  background: none;
  border: none;
  border-bottom: 1px dotted rgba(232, 220, 192, 0.4);
  font-family: inherit;
  padding: 0 0 1px;
  cursor: pointer;
  transition: color 0.12s ease;
}

.stat-btn:hover { color: var(--gold); }

/* Progression map */

.map {
  display: flex;
  flex-direction: column;
  gap: 5px;
  margin-bottom: 18px;
}

.map-act {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 4px 8px;
  border-radius: 4px;
}

.map-act.here { background: rgba(217, 164, 65, 0.18); }

.map-act-label {
  width: 54px;
  font-size: 0.72rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-faded);
}

.map-nodes { display: flex; align-items: center; }

.map-branch {
  position: relative;
  display: flex;
  flex-direction: column;
  gap: 3px;
  padding-left: 14px;
}

.map-branch::before {
  content: '';
  position: absolute;
  left: 2px; top: 14px; bottom: 14px;
  border-left: 1px dashed rgba(42, 36, 26, 0.45);
}

.map-path {
  display: flex;
  align-items: center;
  gap: 10px;
}

.map-path-label {
  width: 66px;
  font-size: 0.58rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink-faded);
  text-align: right;
}

.map-path.back .map-path-label { color: #8d2f23; }

.map-path.not-taken { opacity: 0.28; }
.map-path.taken .map-path-label { font-weight: bold; }

.map-node {
  position: relative;
  width: 40px; height: 40px;
  border-radius: 50%;
  border: 1px solid rgba(42, 36, 26, 0.45);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.7rem;
  font-variant-numeric: tabular-nums;
  background: rgba(255, 255, 255, 0.3);
}

.map-node.boss {
  border-width: 2px;
  border-color: #8d2f23;
  color: #8d2f23;
}

/* Map tooltips (instant, styled) */

.map-node[data-tip] { cursor: help; }

.map-node[data-tip]:hover::before {
  content: attr(data-tip);
  position: absolute;
  bottom: calc(100% + 8px);
  left: 50%;
  transform: translateX(-50%);
  background: #1c1712;
  color: var(--cream);
  font-size: 0.68rem;
  letter-spacing: 0.04em;
  white-space: nowrap;
  padding: 6px 10px;
  border-radius: 4px;
  border: 1px solid rgba(217, 164, 65, 0.35);
  box-shadow: 0 6px 18px rgba(0, 0, 0, 0.5);
  z-index: 10;
  pointer-events: none;
}

.map-path-label em {
  display: block;
  font-style: normal;
  font-size: 0.55rem;
  color: #7a5514;
}

.map-path.back .map-path-label em { color: #8d2f23; }

.map-node.boss::after {
  content: '';
  position: absolute;
  top: -2px; right: -1px;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: #e06a2b;
}

.map-node.done { opacity: 0.6; }

.map-node.done::after {
  content: '✓';
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.1rem;
  color: #4a6741;
  background: rgba(237, 227, 202, 0.85);
  border-radius: 50%;
}

.map-node.current {
  border-color: #7a5514;
  box-shadow: 0 0 0 3px rgba(217, 164, 65, 0.45);
  font-weight: bold;
}

.map-link {
  width: 18px;
  border-top: 1px dashed rgba(42, 36, 26, 0.45);
}

.map-boss-name {
  position: relative;
  margin-left: auto;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  font-size: 0.6rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: #8d2f23;
  text-align: center;
  max-width: 86px;
  cursor: help;
}

.map-boss-name svg { height: 34px; }

.map-boss-name[data-tip]:hover::before {
  content: attr(data-tip);
  position: absolute;
  bottom: calc(100% + 6px);
  right: 0;
  background: #1c1712;
  color: var(--cream);
  font-size: 0.68rem;
  letter-spacing: 0.04em;
  text-transform: none;
  white-space: nowrap;
  padding: 6px 10px;
  border-radius: 4px;
  border: 1px solid rgba(217, 164, 65, 0.35);
  box-shadow: 0 6px 18px rgba(0, 0, 0, 0.5);
  z-index: 10;
  pointer-events: none;
}

.map-legend {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 8px 18px;
  margin-bottom: 18px;
  font-size: 0.72rem;
  color: var(--ink-faded);
}

.map-legend span { display: flex; align-items: center; gap: 6px; }

.leg-node {
  width: 16px; height: 16px;
  border-radius: 50%;
  border: 1px solid rgba(42, 36, 26, 0.45);
  background: rgba(255, 255, 255, 0.3);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 0.65rem;
  font-style: normal;
}

.leg-node.leg-boss { border-width: 2px; border-color: #8d2f23; }
.leg-node.leg-done { color: #4a6741; background: rgba(237, 227, 202, 0.9); }
.leg-node.leg-you { border-color: #7a5514; box-shadow: 0 0 0 2px rgba(217, 164, 65, 0.45); }
.leg-node.leg-q { border-style: dashed; border-color: #7a5514; color: #7a5514; background: none; }

/* "?" links on the map */

.map-link.qlink {
  position: relative;
  width: 18px; height: 18px;
  border: 1px dashed #7a5514;
  border-top: 1px dashed #7a5514;
  border-radius: 50%;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 0.62rem;
  color: #7a5514;
  cursor: help;
  margin: 0 2px;
}

.map-link.qlink.seen { opacity: 0.35; }

.map-link.qlink[data-tip]:hover::before {
  content: attr(data-tip);
  position: absolute;
  bottom: calc(100% + 8px);
  left: 50%;
  transform: translateX(-50%);
  background: #1c1712;
  color: var(--cream);
  font-size: 0.68rem;
  white-space: nowrap;
  padding: 6px 10px;
  border-radius: 4px;
  border: 1px solid rgba(217, 164, 65, 0.35);
  box-shadow: 0 6px 18px rgba(0, 0, 0, 0.5);
  z-index: 10;
  pointer-events: none;
}

/* "?" event panel */

.event-panel { max-width: 460px; }

.event-mark {
  font-size: 2.6rem;
  color: #7a5514;
  line-height: 1;
  margin-bottom: 4px;
}

.event-options {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-top: 18px;
}

.event-opt { border-color: rgba(122, 85, 20, 0.6); color: #7a5514; background: none; }
.event-opt:hover:not(:disabled) { background: rgba(217, 164, 65, 0.2); box-shadow: none; }
.event-opt .count { display: block; margin: 4px 0 0; font-style: italic; }

.event-result {
  margin: 16px 0 20px;
  font-style: italic;
  color: var(--ink);
}

main {
  display: grid;
  grid-template-columns: 1fr 340px;
  gap: 32px;
  align-items: start;
}

@media (max-width: 800px) {
  main { grid-template-columns: 1fr; }
}

/* ── Table side ─────────────────────────────── */

.table { display: flex; flex-direction: column; gap: 28px; }
.playbar { display: flex; flex-direction: column; gap: 28px; }

.target-panel {
  position: relative;
  border: 1px solid rgba(217, 164, 65, 0.25);
  border-radius: 8px;
  padding: 18px 22px;
  background: rgba(0, 0, 0, 0.22);
}

/* The regular, sitting in at boss rounds */

.target-panel .regular-svg {
  position: absolute;
  right: 16px; bottom: 0;
  height: 78px;
  opacity: 0.92;
}

.boss-rule {
  margin-top: 10px;
  padding-right: 96px;
  font-size: 0.85rem;
  font-style: italic;
  color: rgba(232, 220, 192, 0.75);
}

.boss-rule strong {
  font-style: normal;
  font-weight: normal;
  color: var(--gold);
  letter-spacing: 0.06em;
}

.target-panel.boss-round {
  border-color: #8d2f23;
  animation: boss-pulse 2.4s ease-in-out infinite;
}

@keyframes boss-pulse {
  0%, 100% { box-shadow: 0 0 18px rgba(141, 47, 35, 0.25); }
  50% { box-shadow: 0 0 34px rgba(141, 47, 35, 0.55); }
}

.target-score {
  font-size: 2.2rem;
  letter-spacing: 0.02em;
  display: flex;
  align-items: flex-end;
  gap: 4px;
}

.ts-block { display: inline-flex; flex-direction: column; }

.ts-label {
  font-size: 0.62rem;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: rgba(232, 220, 192, 0.45);
}

.target-score .current { color: var(--ivory); }
.target-score .slash { color: var(--ink-faded); margin: 0 6px; }
.target-score .needed { color: var(--gold); }

.current.bump { animation: score-bump 0.5s ease; }

@keyframes score-bump {
  0% { transform: scale(1); }
  35% { transform: scale(1.25); color: var(--gold); text-shadow: 0 0 18px rgba(217, 164, 65, 0.7); }
  100% { transform: scale(1); }
}

.progress {
  height: 5px;
  margin: 12px 0;
  background: rgba(0, 0, 0, 0.45);
  border-radius: 3px;
  overflow: hidden;
}

.progress .fill {
  height: 100%;
  background: linear-gradient(90deg, #8a6a2c, var(--gold));
  transition: width 0.35s ease;
}

.turns {
  font-size: 0.8rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: rgba(232, 220, 192, 0.6);
  display: flex;
  align-items: center;
  gap: 7px;
}

.turn-pip {
  width: 9px; height: 9px;
  border-radius: 50%;
  background: rgba(232, 220, 192, 0.15);
  display: inline-block;
}

.turn-pip.on { background: var(--gold); box-shadow: 0 0 6px rgba(217, 164, 65, 0.5); }

/* Dice */

.dice {
  display: flex;
  gap: 16px;
  justify-content: center;
  padding: 10px 0;
  flex-wrap: wrap;
}

.die-wrap {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}

.die-tipcard {
  position: absolute;
  bottom: calc(100% + 26px);
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  gap: 5px;
  background: #1c1712;
  color: var(--cream);
  padding: 8px 10px;
  border-radius: 4px;
  border: 1px solid rgba(217, 164, 65, 0.35);
  box-shadow: 0 6px 18px rgba(0, 0, 0, 0.5);
  z-index: 30;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.1s ease;
}

.die-wrap:hover .die-tipcard { opacity: 1; }

.die-tipcard .tip-row {
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: 0.68rem;
  letter-spacing: 0.04em;
  white-space: nowrap;
}

.die-tipcard .tip-row em { font-style: normal; }
.die-tipcard .tip-row svg { width: 20px; height: 20px; flex-shrink: 0; }

.faces {
  font-size: 0.62rem;
  letter-spacing: 0.08em;
  color: rgba(232, 220, 192, 0.45);
  font-variant-numeric: tabular-nums;
}

.die {
  position: relative;
  width: 72px; height: 72px;
  padding: 11px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(145deg, var(--ivory), #ddd2bc);
  box-shadow: 0 5px 14px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.7);
  display: grid;
  grid-template: repeat(3, 1fr) / repeat(3, 1fr);
  cursor: pointer;
  transition: transform 0.12s ease, box-shadow 0.12s ease;
}

.die:hover:not(:disabled) { transform: translateY(-3px); }

.die.held {
  transform: translateY(-10px);
  outline: 2px solid var(--gold);
  box-shadow: 0 10px 20px rgba(0, 0, 0, 0.55), 0 0 18px rgba(217, 164, 65, 0.4);
}

.die:disabled { cursor: default; opacity: 0.75; }

.die .cell { display: flex; align-items: center; justify-content: center; }

.die .pip {
  width: 11px; height: 11px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #3d362a, #191510);
}

.die .wild-face {
  grid-column: 1 / -1;
  grid-row: 1 / -1;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.7rem;
  color: #7a5514;
  text-shadow: 0 0 8px rgba(217, 164, 65, 0.6);
}

.die .held-tag {
  position: absolute;
  top: -22px; left: 50%;
  transform: translateX(-50%);
  font-size: 0.62rem;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--gold);
  opacity: 0;
  transition: opacity 0.12s ease;
}

.die.held .held-tag { opacity: 1; }

.die.locked {
  outline: 2px dashed #8d2f23;
  opacity: 0.85;
  cursor: default;
}

.die.locked .held-tag {
  opacity: 1;
  color: #c4543f;
}

/* Materials */

.die.gold {
  background: linear-gradient(145deg, #ecd28a, #c09a45);
  box-shadow: 0 5px 14px rgba(0, 0, 0, 0.5), 0 0 12px rgba(217, 164, 65, 0.35),
    inset 0 1px 0 rgba(255, 240, 200, 0.8);
}

.die.glass {
  background: linear-gradient(145deg, rgba(200, 230, 240, 0.45), rgba(150, 190, 210, 0.3));
  border: 1px solid rgba(210, 235, 245, 0.5);
  box-shadow: 0 5px 14px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.5);
}

.die.glass .pip {
  background: radial-gradient(circle at 35% 35%, #dff2f8, #9dc4d4);
}

/* Targeting (shop items and consumables that need a target) */

.die.targetable {
  cursor: pointer;
  animation: beckon 1.2s ease-in-out infinite;
  outline: 1px dashed rgba(217, 164, 65, 0.6);
  opacity: 1;
}

@keyframes beckon {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-5px); }
}

/* Roll animation */

.die.rolling { animation: tumble 0.45s ease; }
.die-wrap:nth-child(2) .die.rolling { animation-delay: 0.03s; }
.die-wrap:nth-child(3) .die.rolling { animation-delay: 0.06s; }
.die-wrap:nth-child(4) .die.rolling { animation-delay: 0.09s; }
.die-wrap:nth-child(5) .die.rolling { animation-delay: 0.12s; }

@keyframes tumble {
  0% { transform: translateY(-30px) rotate(-15deg); }
  45% { transform: translateY(5px) rotate(9deg); }
  70% { transform: translateY(-7px) rotate(-4deg); }
  100% { transform: translateY(0) rotate(0); }
}

/* Controls & flavor */

.controls { display: flex; justify-content: center; padding-top: 8px; }

.button {
  font-family: inherit;
  font-size: 1rem;
  letter-spacing: 0.08em;
  padding: 12px 34px;
  border-radius: 6px;
  border: 1px solid rgba(217, 164, 65, 0.5);
  background: rgba(0, 0, 0, 0.35);
  color: var(--cream);
  cursor: pointer;
  transition: background 0.12s ease, box-shadow 0.12s ease;
}

.button.primary { border-color: var(--gold); color: var(--gold); }

.button:hover:not(:disabled) {
  background: rgba(217, 164, 65, 0.12);
  box-shadow: 0 0 16px rgba(217, 164, 65, 0.2);
}

.button:disabled { opacity: 0.35; cursor: default; }

.button .count { font-size: 0.75rem; opacity: 0.7; margin-left: 6px; }

.button.small { font-size: 0.8rem; padding: 8px 16px; }

.button.small.active {
  background: rgba(217, 164, 65, 0.25);
  box-shadow: 0 0 12px rgba(217, 164, 65, 0.3);
}

.tray {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-left: 18px;
}

.tray-label {
  font-size: 0.62rem;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: rgba(232, 220, 192, 0.4);
}

.tray-item {
  display: inline-flex;
  align-items: center;
  gap: 7px;
}

.tray-item svg { width: 20px; height: 20px; }

.flavor {
  font-style: italic;
  color: rgba(232, 220, 192, 0.55);
  text-align: center;
  min-height: 1.4em;
}

/* ── Ledger ─────────────────────────────────── */

.ledger {
  background:
    repeating-linear-gradient(transparent, transparent 27px, rgba(42, 36, 26, 0.08) 28px),
    linear-gradient(160deg, #ede3ca, var(--cream) 55%, #dccfae);
  color: var(--ink);
  border-radius: 4px;
  padding: 20px 22px 24px;
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.55);
  transform: rotate(-0.4deg);
}

.ledger h2 {
  font-size: 1.05rem;
  font-weight: normal;
  text-transform: uppercase;
  letter-spacing: 0.25em;
  text-align: center;
  border-bottom: 1px solid rgba(42, 36, 26, 0.35);
  padding-bottom: 10px;
}

.ledger-note {
  font-size: 0.72rem;
  font-style: italic;
  text-align: center;
  color: var(--ink-faded);
  margin: 6px 0 12px;
}

.cat {
  position: relative;
  display: flex;
  width: 100%;
  justify-content: space-between;
  align-items: baseline;
  gap: 10px;
  padding: 6px 4px;
  border: none;
  border-bottom: 1px dotted rgba(42, 36, 26, 0.25);
  background: none;
  font-family: inherit;
  font-size: 0.95rem;
  color: var(--ink);
  text-align: left;
}

.cat.open { cursor: pointer; transition: background 0.1s ease; }
.cat.open:hover:not(:disabled) { background: rgba(217, 164, 65, 0.22); }
.cat:disabled { cursor: default; }

.cat-name { display: flex; flex-direction: column; }

.cat-hint {
  font-size: 0.68rem;
  color: var(--ink-faded);
  font-style: italic;
}

.cat-score { font-variant-numeric: tabular-nums; font-size: 1.05rem; text-align: right; }

.cat.worthless .cat-score { color: var(--ink-faded); }

/* Zero writes are a legal, deliberate sacrifice — say so on hover.
   Absolutely positioned so the hidden note never shifts the numbers. */
.zero-note {
  position: absolute;
  right: 4px;
  bottom: 1px;
  font-size: 0.55rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: #8d2f23;
  font-weight: normal;
  white-space: nowrap;
  opacity: 0;
  transition: opacity 0.1s ease;
  pointer-events: none;
}

.cat.open:hover .zero-note { opacity: 1; }

.cat-score.juicy { color: #7a5514; font-weight: bold; }

/* An entry that would meet the round target right now */

.cat.clincher {
  background: rgba(217, 164, 65, 0.22);
  outline: 1px solid rgba(217, 164, 65, 0.75);
  outline-offset: -1px;
  border-radius: 3px;
  animation: clinch-glow 1.6s ease-in-out infinite;
}

.cat.clincher .cat-score { color: #7a5514; font-weight: bold; }

.win-note {
  display: block;
  font-size: 0.55rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: #7a5514;
  font-weight: normal;
  text-align: right;
}

@keyframes clinch-glow {
  0%, 100% { box-shadow: 0 0 0 rgba(217, 164, 65, 0); }
  50% { box-shadow: 0 0 14px rgba(217, 164, 65, 0.5); }
}

.cat.spent { opacity: 0.55; }
.cat.spent .cat-name { text-decoration: line-through; }

.upper-set {
  padding: 3px 4px 5px;
  font-size: 0.6rem;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-faded);
  border-bottom: 1px solid rgba(42, 36, 26, 0.35);
  text-align: right;
}

.upper-set.set-paid { color: #4a6741; }

.cat.is-sealed { opacity: 0.6; }
.cat.is-sealed .cat-name { text-decoration: line-through; text-decoration-color: #8d2f23; }
.cat.is-sealed .cat-score {
  font-size: 0.62rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: #8d2f23;
}

.cat.targetable {
  cursor: pointer;
  outline: 1px dashed rgba(122, 85, 20, 0.6);
  outline-offset: -1px;
}

.cat.targetable:hover { background: rgba(217, 164, 65, 0.3); }
.cat.spent.targetable { opacity: 0.8; }

.lv {
  font-size: 0.62rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: #7a5514;
  border: 1px solid rgba(122, 85, 20, 0.5);
  border-radius: 3px;
  padding: 0 4px;
  margin-left: 6px;
  vertical-align: middle;
}

/* ── Shop ───────────────────────────────────── */

/* ── Charms ─────────────────────────────────── */

.night-note {
  margin: -16px 0 16px;
  font-size: 0.72rem;
  font-style: italic;
  letter-spacing: 0.06em;
  color: rgba(217, 164, 65, 0.75);
}

.charm-tray {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 10px;
  margin: -14px 0 18px;
}

.charm-chip {
  position: relative;
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 0.7rem;
  letter-spacing: 0.08em;
  color: rgba(232, 220, 192, 0.8);
  border: 1px solid rgba(217, 164, 65, 0.35);
  border-radius: 14px;
  padding: 3px 10px 3px 5px;
  background: rgba(0, 0, 0, 0.25);
  cursor: help;
}

.charm-chip svg { width: 20px; height: 20px; }

/* The deed sits apart from the charms: not a relic, a claim. */
.deed-chip {
  border-color: rgba(141, 47, 35, 0.6);
  color: rgba(232, 220, 192, 0.95);
}
.button.deed-reward { border-color: rgba(141, 47, 35, 0.7); }

.charm-chip[data-tip]:hover::before {
  content: attr(data-tip);
  position: absolute;
  top: calc(100% + 8px);
  left: 0;
  background: #1c1712;
  color: var(--cream);
  font-size: 0.7rem;
  white-space: nowrap;
  padding: 6px 10px;
  border-radius: 4px;
  border: 1px solid rgba(217, 164, 65, 0.35);
  box-shadow: 0 6px 18px rgba(0, 0, 0, 0.5);
  z-index: 20;
  pointer-events: none;
}

.charm-count {
  font-size: 0.62rem;
  letter-spacing: 0.15em;
  color: rgba(232, 220, 192, 0.4);
}

.reward-card .reward-icon svg { width: 44px; height: 44px; }

.replace-grid { grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); }

/* The make-room abort — breathing room below the charm cards. */
.cancel-replace { display: block; margin: 16px auto 0; }

/* Review a recorded night from its expanded records row. */
.rec-review { margin-top: 10px; }

.reward-money {
  display: block;
  margin: 16px auto 0;
  border-color: #7a5514;
  color: #7a5514;
  background: none;
}

.offer-kind {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 0.6rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--gold);
}

.offer-kind svg { width: 18px; height: 18px; }

/* ── The dealer & his speech bubble ─────────── */

.host {
  position: relative;
  display: flex;
  align-items: flex-end;
  gap: 16px;
  padding: 6px 0 0 6px;
  min-height: 120px;
}

.smoke i {
  position: absolute;
  bottom: 110px;
  left: 46px;
  width: 8px; height: 8px;
  border-radius: 50%;
  background: rgba(210, 200, 180, 0.14);
  filter: blur(3px);
  opacity: 0;
  animation: smoke-rise 7s ease-out infinite;
}

.smoke i:nth-child(2) { animation-delay: 2.3s; left: 52px; }
.smoke i:nth-child(3) { animation-delay: 4.6s; left: 42px; }

@keyframes smoke-rise {
  0% { transform: translateY(0) scale(1); opacity: 0; }
  15% { opacity: 0.7; }
  100% { transform: translateY(-70px) translateX(14px) scale(2.6); opacity: 0; }
}

/* Themed scrollbars for the paper panels */

.panel::-webkit-scrollbar, .records::-webkit-scrollbar { width: 8px; }
.panel::-webkit-scrollbar-thumb, .records::-webkit-scrollbar-thumb {
  background: rgba(42, 36, 26, 0.3);
  border-radius: 4px;
}
.panel::-webkit-scrollbar-track, .records::-webkit-scrollbar-track { background: transparent; }

.dealer-svg {
  height: 150px;
  flex-shrink: 0;
  filter: drop-shadow(0 8px 14px rgba(0, 0, 0, 0.5));
}

.dealer-svg .dealer-body {
  transform-origin: 85px 210px;
  animation: sway 6s ease-in-out infinite;
}

@keyframes sway {
  0%, 100% { transform: rotate(0deg); }
  50% { transform: rotate(0.7deg); }
}

.bubble {
  position: relative;
  background: linear-gradient(160deg, #ede3ca, var(--cream));
  color: var(--ink);
  font-style: italic;
  font-size: 0.95rem;
  padding: 12px 18px;
  border-radius: 10px;
  border-bottom-left-radius: 2px;
  max-width: 460px;
  margin-bottom: 64px;
  box-shadow: 0 8px 20px rgba(0, 0, 0, 0.45);
}

.bubble::before {
  content: '';
  position: absolute;
  left: -9px;
  bottom: 6px;
  border: 9px solid transparent;
  border-right-color: var(--cream);
  border-left-width: 0;
  border-bottom-width: 3px;
}

/* The regular sits opposite during their round */

.host .boss-side {
  margin-left: auto;
  flex-shrink: 0;
}

.host .boss-side svg {
  height: 118px;
  filter: drop-shadow(0 8px 14px rgba(0, 0, 0, 0.5)) drop-shadow(0 0 16px rgba(141, 47, 35, 0.2));
}

.bubble.from-boss {
  margin-left: auto;
  background: linear-gradient(160deg, #241a12, #17110c);
  color: var(--cream);
  border: 1px solid rgba(141, 47, 35, 0.65);
  border-bottom-left-radius: 10px;
  border-bottom-right-radius: 2px;
}

.bubble.from-boss::before { display: none; }

.bubble.from-boss::after {
  content: '';
  position: absolute;
  right: -9px;
  bottom: 6px;
  border: 9px solid transparent;
  border-left-color: #1d1610;
  border-right-width: 0;
  border-bottom-width: 3px;
}

.dealer-svg .eye {
  transform-origin: center;
  transform-box: fill-box;
  animation: blink 5.5s infinite;
}

@keyframes blink {
  0%, 91%, 100% { transform: scaleY(1); }
  93%, 95% { transform: scaleY(0.1); }
}

.counter-edge {
  height: 14px;
  border-radius: 4px;
  background: linear-gradient(#6a4629, #3a2517 70%, #241608);
  box-shadow: 0 6px 16px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 220, 160, 0.15);
  margin-bottom: 6px;
}

.shop-head { text-align: center; }

.shop-head h2 {
  font-weight: normal;
  text-transform: uppercase;
  letter-spacing: 0.3em;
  font-size: 1rem;
  color: var(--gold);
  margin-bottom: 8px;
}

.offers {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 14px;
}

.offer {
  display: flex;
  flex-direction: column;
  gap: 8px;
  padding: 14px 14px 12px;
  border: 1px solid rgba(217, 164, 65, 0.3);
  border-radius: 8px;
  background: rgba(0, 0, 0, 0.28);
  color: var(--cream);
  font-family: inherit;
  text-align: left;
  cursor: pointer;
  transition: border-color 0.12s ease, box-shadow 0.12s ease;
}

.offer:hover:not(:disabled) {
  border-color: var(--gold);
  box-shadow: 0 0 14px rgba(217, 164, 65, 0.15);
}

.offer:disabled { opacity: 0.45; cursor: default; }

.offer.sold { opacity: 0.35; }

.offer.targeting {
  border-color: var(--gold);
  box-shadow: 0 0 18px rgba(217, 164, 65, 0.35);
}

.offer-head {
  display: flex;
  align-items: center;
  gap: 9px;
}

.offer-icon svg {
  width: 28px;
  height: 28px;
  display: block;
}

.offer-name {
  font-size: 0.95rem;
  letter-spacing: 0.06em;
  color: var(--gold);
}

.offer-kind-tag {
  display: block;
  font-size: 0.58rem;
  font-style: normal;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: rgba(232, 220, 192, 0.5);
}

.offer-desc {
  font-size: 0.78rem;
  font-style: italic;
  color: rgba(232, 220, 192, 0.6);
  flex: 1;
}

.offer-price {
  font-size: 0.9rem;
  color: var(--ivory);
  font-variant-numeric: tabular-nums;
}

.hint {
  text-align: center;
  font-size: 0.8rem;
  font-style: italic;
  color: var(--gold);
  min-height: 1.2em;
}

.shop-controls { gap: 14px; }

.next-round {
  text-align: center;
  font-size: 0.78rem;
  letter-spacing: 0.08em;
  color: rgba(232, 220, 192, 0.45);
}

/* ── Overlays ───────────────────────────────── */

.overlay {
  position: fixed;
  inset: 0;
  background: rgba(5, 8, 6, 0.72);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.panel {
  position: relative;
  background: linear-gradient(160deg, #ede3ca, var(--cream) 55%, #dccfae);
  color: var(--ink);
  border-radius: 4px;
  padding: 34px 40px;
  max-width: 420px;
  width: 100%;
  min-width: 0; /* shrink to fit the overlay instead of spilling off-screen */
  max-height: calc(100vh - 40px);
  max-height: calc(100dvh - 40px);
  overflow-y: auto;
  overflow-wrap: break-word;
  text-align: center;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7);
}

.stamp {
  position: absolute;
  top: 14px; right: 14px;
  transform: rotate(-12deg);
  font-size: 0.85rem;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: #8d6a1e;
  border: 3px double #8d6a1e;
  border-radius: 4px;
  padding: 5px 10px 5px 13px;
  opacity: 0.7;
  mix-blend-mode: multiply;
  animation: stamp-in 0.3s cubic-bezier(0.2, 2.2, 0.4, 1);
}

.stamp.bad { color: #8d2f23; border-color: #8d2f23; }

/* House records (local scoreboard) */

.records-wrap { margin: 0 0 20px; text-align: left; }

.records-wrap h3 {
  font-weight: normal;
  text-transform: uppercase;
  letter-spacing: 0.18em;
  font-size: 0.8rem;
  color: #7a5514;
  text-align: center;
  border-bottom: 1px dotted rgba(42, 36, 26, 0.3);
  padding-bottom: 4px;
  margin-bottom: 6px;
}

.records {
  list-style: none;
  max-height: 34vh;
  overflow-y: auto;
}

.records summary {
  display: flex;
  gap: 10px;
  align-items: baseline;
  cursor: pointer;
  padding: 5px 4px;
  border-bottom: 1px dotted rgba(42, 36, 26, 0.2);
  font-size: 0.85rem;
}

.records summary::-webkit-details-marker { display: none; }
.records summary::marker { content: ''; }

.records li.current summary {
  background: rgba(217, 164, 65, 0.25);
  border-radius: 3px;
}

.rec-rank { width: 20px; color: var(--ink-faded); font-variant-numeric: tabular-nums; }
.rec-reached { flex: 1; }
.rec-total { font-variant-numeric: tabular-nums; }
.rec-date { color: var(--ink-faded); font-size: 0.7rem; }

.rec-detail {
  display: flex;
  flex-direction: column;
  gap: 5px;
  padding: 6px 4px 10px 30px;
  font-size: 0.75rem;
  color: var(--ink-faded);
}

.mini-die {
  display: inline-block;
  border: 1px solid rgba(42, 36, 26, 0.35);
  border-radius: 3px;
  padding: 0 4px;
  margin: 0 4px 2px 0;
  font-size: 0.7rem;
  letter-spacing: 0.08em;
  font-variant-numeric: tabular-nums;
  color: var(--ink);
}

.mini-die.gold { background: #e2bd67; }
.mini-die.glass { background: rgba(150, 190, 210, 0.45); }

/* Table choice (act branching) */

.choice-panel { max-width: 560px; }

.choice-cards {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-top: 18px;
}

.choice-card {
  display: flex;
  flex-direction: column;
  gap: 8px;
  padding: 18px 16px;
  border: 1px solid rgba(42, 36, 26, 0.4);
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.35);
  font-family: inherit;
  color: var(--ink);
  text-align: center;
  cursor: pointer;
  transition: transform 0.12s ease, box-shadow 0.12s ease;
}

.choice-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 22px rgba(0, 0, 0, 0.25);
}

.choice-card h3 {
  font-weight: normal;
  text-transform: uppercase;
  letter-spacing: 0.2em;
  font-size: 0.95rem;
}

.choice-card.back { border-color: #8d2f23; }
.choice-card.back h3 { color: #8d2f23; }

.choice-desc { font-size: 0.8rem; font-style: italic; color: var(--ink-faded); flex: 1; }

.choice-caption {
  font-size: 0.58rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--ink-faded);
}

.choice-targets { font-size: 0.95rem; font-variant-numeric: tabular-nums; }
.choice-pay {
  font-size: 0.7rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: #7a5514;
}

.choice-card.back .choice-pay { color: #8d2f23; }

.choice-extra {
  font-size: 0.72rem;
  font-style: italic;
  color: #7a5514;
  margin-top: 4px;
}

.stakes-tag {
  margin-left: 12px;
  font-size: 0.62rem;
  letter-spacing: 0.2em;
  color: #c4543f;
  border: 1px solid rgba(141, 47, 35, 0.6);
  border-radius: 3px;
  padding: 1px 6px;
}

/* Last turn, still short — the round is on the line */

.target-panel.danger {
  border-color: #c4543f;
  animation: danger-pulse 1s ease-in-out infinite;
}

@keyframes danger-pulse {
  0%, 100% { box-shadow: 0 0 12px rgba(196, 84, 63, 0.25); }
  50% { box-shadow: 0 0 32px rgba(196, 84, 63, 0.65); }
}

.danger-tag {
  margin-left: 12px;
  font-size: 0.62rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: #c4543f;
  animation: danger-blink 1s ease-in-out infinite;
}

@keyframes danger-blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}


/* Boss splash */

.boss-overlay { background: rgba(3, 4, 3, 0.88); }

.panel.boss-splash {
  background: linear-gradient(165deg, #201812, #120d08 70%);
  color: var(--cream);
  border: 1px solid rgba(141, 47, 35, 0.7);
  box-shadow: 0 0 60px rgba(141, 47, 35, 0.3), 0 20px 60px rgba(0, 0, 0, 0.8);
  animation: splash-in 0.35s ease;
}

@keyframes splash-in {
  0% { transform: scale(0.92); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}

.boss-splash .boss-portrait {
  display: flex;
  justify-content: center;
  margin-bottom: 6px;
}

.boss-splash .boss-portrait svg {
  height: 130px;
  filter: drop-shadow(0 0 22px rgba(224, 106, 43, 0.3));
}

.boss-splash h2 {
  color: #c4543f;
  font-size: 1.4rem;
  letter-spacing: 0.3em;
  margin: 8px 0 6px;
}

.boss-splash-rule {
  font-size: 1rem;
  color: var(--ivory);
  margin-bottom: 12px;
}

.boss-splash .flavor { color: rgba(232, 220, 192, 0.55); margin-bottom: 20px; }

.boss-splash .button { border-color: #8d2f23; color: #c4543f; }
.boss-splash .button:hover { background: rgba(141, 47, 35, 0.2); }

/* Bag viewer */

.bag-view { padding: 16px 0 4px; }

.bag-die {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  padding: 8px 6px 4px;
  border-radius: 8px;
}

.bag-die.in-hand { background: rgba(217, 164, 65, 0.18); }

.bag-die .faces { color: var(--ink-faded); }

.bag-die-note {
  font-size: 0.6rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink-faded);
}

.panel .button.reward-money { margin-top: 10px; }

/* Help panel */

.close-btn {
  position: absolute;
  top: 10px; left: 12px;
  width: 30px; height: 30px;
  border-radius: 50%;
  border: 1px solid rgba(42, 36, 26, 0.4);
  background: none;
  color: var(--ink);
  font-family: inherit;
  font-size: 1.1rem;
  line-height: 1;
  cursor: pointer;
}

.close-btn:hover { background: rgba(217, 164, 65, 0.25); }

.panel.help {
  max-width: 580px;
  max-height: 86vh;
  overflow-y: auto;
  text-align: left;
}

.panel.help h2, .panel.help > .flavor { text-align: center; }

.panel.help .rules h3 {
  font-weight: normal;
  text-transform: uppercase;
  letter-spacing: 0.18em;
  font-size: 0.8rem;
  color: #7a5514;
  border-bottom: 1px dotted rgba(42, 36, 26, 0.3);
  padding-bottom: 3px;
  margin: 16px 0 6px;
}

.panel.help .rules p {
  font-size: 0.9rem;
  line-height: 1.5;
}

.panel.help .button {
  display: block;
  margin: 22px auto 0;
}

@keyframes stamp-in {
  0% { transform: rotate(-12deg) scale(2.4); opacity: 0; }
  100% { transform: rotate(-12deg) scale(1); opacity: 0.7; }
}

.panel h2 {
  font-weight: normal;
  text-transform: uppercase;
  letter-spacing: 0.2em;
  font-size: 1.1rem;
  margin-bottom: 10px;
}

.panel .flavor { color: var(--ink-faded); margin-bottom: 18px; }

.panel .result { font-size: 0.9rem; margin-bottom: 18px; }

.payout {
  width: 100%;
  margin: 0 0 22px;
  border-collapse: collapse;
  font-size: 0.95rem;
}

.surplus-note {
  font-size: 0.72rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink-faded);
  margin: -8px 0 14px;
}

.payout tr { animation: fade-up 0.35s ease both; }
.payout tr:nth-child(2) { animation-delay: 0.12s; }
.payout tr:nth-child(3) { animation-delay: 0.24s; }
.payout tr:nth-child(4) { animation-delay: 0.4s; }

@keyframes fade-up {
  0% { opacity: 0; transform: translateY(6px); }
  100% { opacity: 1; transform: translateY(0); }
}

.payout td { padding: 5px 4px; border-bottom: 1px dotted rgba(42, 36, 26, 0.25); }
.payout td:last-child { text-align: right; font-variant-numeric: tabular-nums; }
.payout .total td { border-bottom: none; font-size: 1.05rem; color: #7a5514; }

.panel .button { border-color: #7a5514; color: #7a5514; background: none; }
.panel .button:hover { background: rgba(217, 164, 65, 0.2); box-shadow: none; }

/* End-of-run screens: present the choice clearly, not as a stack of look-alikes. */
.end-primary { display: block; width: 100%; margin: 4px 0 0; }

.endchoice { display: flex; gap: 12px; margin: 4px 0 0; }
.endchoice-opt {
  flex: 1; display: flex; flex-direction: column; align-items: center; gap: 5px;
  padding: 15px 14px; text-align: center; line-height: 1.25;
}
.endchoice-opt .ec-title { font-size: 0.95rem; letter-spacing: 0.06em; }
.endchoice-opt .ec-sub {
  font-size: 0.7rem; letter-spacing: 0.03em; color: var(--ink-faded); text-transform: none;
}

.end-extras { display: flex; gap: 10px; justify-content: center; margin: 14px 0 0; }
.end-extras .button { flex: 1; }

@media (max-width: 560px) { .endchoice { flex-direction: column; } }

/* Seed sharing: show/copy the current run's seed; paste one to replay it. */
.seed-share {
  display: flex; flex-direction: column; align-items: center; gap: 10px;
  margin: 6px 0 16px; padding-top: 14px; border-top: 1px solid rgba(217, 164, 65, 0.25);
}
.seed-line { display: flex; flex-wrap: wrap; align-items: center; justify-content: center; gap: 8px; }
.seed-actions { display: flex; gap: 8px; }
.seed-label {
  font-size: 0.68rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-faded);
}
.seed-value {
  font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  font-size: 0.95rem; letter-spacing: 0.08em; color: #7a5514;
  background: rgba(217, 164, 65, 0.15); padding: 3px 8px; border-radius: 4px;
}

.seed-play { display: flex; gap: 8px; align-items: center; margin: 14px auto 4px; max-width: 420px; }
.seed-play .button { flex: none; white-space: nowrap; }
.seed-input {
  flex: 1; min-width: 0;
  font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  font-size: 0.9rem; letter-spacing: 0.06em;
  padding: 8px 10px; border-radius: 6px;
  border: 1px solid rgba(122, 85, 20, 0.4);
  background: rgba(255, 255, 255, 0.4); color: var(--ink);
}
.seed-input::placeholder { color: rgba(42, 36, 26, 0.4); letter-spacing: 0.02em; }
.bag-label {
  text-align: center;
  font-size: 0.72rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: rgba(232, 220, 192, 0.5);
}

/* The playtest report box on the end screens. */
.report-box {
  margin: 18px auto 4px;
  max-width: 420px;
  text-align: left;
  border-top: 1px solid rgba(217, 164, 65, 0.25);
  padding-top: 16px;
}
.report-hint {
  display: block;
  font-size: 0.72rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: rgba(232, 220, 192, 0.55);
  margin-bottom: 8px;
}
.report-feedback {
  width: 100%;
  box-sizing: border-box;
  font-family: inherit;
  font-size: 0.92rem;
  color: var(--cream);
  background: rgba(0, 0, 0, 0.3);
  border: 1px solid rgba(217, 164, 65, 0.35);
  border-radius: 6px;
  padding: 10px 12px;
  resize: vertical;
}
.report-feedback:focus {
  outline: none;
  border-color: var(--gold);
  box-shadow: 0 0 12px rgba(217, 164, 65, 0.2);
}
.report-feedback::placeholder { color: rgba(232, 220, 192, 0.35); font-style: italic; }
.report-actions {
  display: flex;
  gap: 10px;
  margin-top: 10px;
}
.report-actions .button { flex: 1; padding: 10px 16px; font-size: 0.85rem; }

/* A faint build tag in the corner — so a playtester knows their version.
   Clicking it reopens the management notice (the changelog). */
.version-tag {
  position: fixed; bottom: 6px; right: 9px; z-index: 1;
  font-family: ui-monospace, 'SF Mono', Menlo, monospace;
  font-size: 0.62rem; letter-spacing: 0.08em;
  color: rgba(232, 220, 192, 0.3); cursor: pointer;
  font-variant-numeric: tabular-nums;
}
.version-tag:hover { color: rgba(232, 220, 192, 0.65); }

/* The bent-table notice rides with the night-rule line: gold, so a custom
   night reads as "not the house's numbers" at a glance. */
.night-note.night-custom {
  color: rgba(217, 164, 65, 0.75);
  cursor: pointer;
}
.night-note.night-custom:hover { color: rgba(217, 164, 65, 1); }

/* The back office — the hidden configure-and-deal modal. */
.backoffice {
  display: block; margin: 14px auto 0; background: none; border: none;
  font-family: inherit; font-size: 0.72rem; letter-spacing: 0.14em;
  color: rgba(232, 220, 192, 0.35); cursor: pointer; text-transform: uppercase;
}
.backoffice:hover { color: var(--gold); }
.cfg-panel { max-width: min(680px, 94vw); max-height: 90vh; overflow-y: auto; }
.cfg-group {
  margin: 16px 0 6px; font-size: 0.78rem; letter-spacing: 0.18em;
  text-transform: uppercase; color: var(--gold);
}
.cfg-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 4px 18px; text-align: left;
}
.cfg-row {
  display: flex; align-items: center; justify-content: space-between; gap: 8px;
  font-size: 0.82rem; padding: 2px 0;
}
.cfg-name { font-family: ui-monospace, Menlo, monospace; font-size: 0.72rem; opacity: 0.85; }
.cfg-row input[type='number'], .cfg-row input[type='text'] {
  width: 92px; padding: 3px 6px; border-radius: 4px;
  font-family: ui-monospace, Menlo, monospace; font-size: 0.78rem;
  border: 1px solid rgba(122, 85, 20, 0.4);
  background: rgba(255, 255, 255, 0.35); color: var(--ink);
  font-variant-numeric: tabular-nums;
}
.cfg-row input[type='text'] { width: 130px; }
.cfg-actions { display: flex; gap: 10px; justify-content: center; margin-top: 8px; flex-wrap: wrap; }

/* What a followed link deals — the 'link' choice modal's list. */
.link-deals {
  text-align: left; margin: 10px auto 14px; max-width: 44ch;
  padding-left: 22px; color: var(--gold);
  font-size: 0.92rem; line-height: 1.5;
}
.link-deals li { margin: 4px 0; }

/* ===== Run review screen (rv-) ===== */
.rv-panel {
  width: min(940px, 96vw); max-height: 92vh; display: flex; flex-direction: column;
  background: radial-gradient(ellipse 120% 80% at 50% -10%, #2c4636, #1a2c21 55%, #0c1410);
  border: 1px solid rgba(217,164,65,0.28); border-radius: 12px; overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}
.rv-bar {
  display: flex; justify-content: flex-start; align-items: center; gap: 14px;
  padding: 13px 20px; border-bottom: 1px solid rgba(217,164,65,0.22); flex: none;
}
.rv-bar h2 { margin: 0; font-size: 1.3rem; font-weight: normal; color: var(--cream); }
.rv-bar .close-btn { position: static; flex: none; color: var(--cream); border-color: rgba(217,164,65,0.4); }
.rv-export {
  margin-left: auto; padding: 5px 12px; font: inherit; font-size: 0.78rem;
  letter-spacing: 0.06em; color: var(--cream); cursor: pointer;
  background: none; border: 1px solid rgba(217,164,65,0.4); border-radius: 4px;
}
.rv-export:hover { background: rgba(217, 164, 65, 0.25); }
.rv-scroll { overflow-y: auto; padding: 20px 22px 30px; }

.rv-summary {
  display: grid; grid-template-columns: 1fr auto; gap: 16px 24px; align-items: center;
  padding: 18px 20px; margin-bottom: 22px;
  background: rgba(0,0,0,0.26); border: 1px solid rgba(217,164,65,0.2); border-radius: 10px;
}
.rv-facts {
  display: grid; grid-template-columns: max-content 1fr; column-gap: 16px; row-gap: 10px;
  align-items: center; min-width: 0;
}
.rv-k { color: var(--ink-faded); text-transform: uppercase; letter-spacing: 0.12em; font-size: 0.66rem; white-space: nowrap; }
.rv-v { color: var(--cream); font-size: 0.9rem; min-width: 0; }
.rv-v.rv-wrap { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
.rv-money { color: var(--gold); font-variant-numeric: tabular-nums; }
.rv-bagn { font-size: 0.76rem; color: var(--ink-faded); margin-left: 4px; }
.rv-stamp {
  justify-self: end; align-self: start; border: 3px solid #c65b43; color: #c65b43;
  padding: 8px 16px 6px; border-radius: 6px; transform: rotate(4deg);
  text-transform: uppercase; letter-spacing: 0.14em; font-size: 1.02rem; text-align: center;
}
.rv-stamp.won { border-color: #cfa94a; color: #cfa94a; }
.rv-stamp.live { border-color: rgba(232,220,192,0.55); color: var(--cream); transform: rotate(-2deg); }
.rv-stamp small { display: block; font-size: 0.6rem; letter-spacing: 0.1em; opacity: 0.8; margin-top: 2px; }
.rv-boss {
  font-size: 0.72rem; padding: 2px 8px; border-radius: 4px;
  background: rgba(0,0,0,0.3); border: 1px solid rgba(217,164,65,0.2); color: var(--cream);
}
.rv-boss .rv-a { color: var(--ink-faded); margin-right: 5px; }
.rv-boss.beaten { border-color: rgba(217,164,65,0.5); }
.rv-boss.fatal { border-color: #c65b43; color: #f0c4b8; }

.rv-sectionlabel { font-size: 0.7rem; letter-spacing: 0.24em; text-transform: uppercase; color: var(--ink-faded); margin: 0 0 12px 2px; }
.rv-acthead {
  font-size: 1.35rem; margin: 30px 0 12px; padding-bottom: 6px;
  border-bottom: 1px solid rgba(217,164,65,0.22); display: flex; align-items: baseline; gap: 10px;
}
.rv-ahtag { font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--gold); border: 1px solid rgba(217,164,65,0.4); padding: 2px 7px; border-radius: 4px; }

.rv-round {
  margin-bottom: 14px; padding: 14px 16px; background: rgba(0,0,0,0.2);
  border: 1px solid rgba(217,164,65,0.2); border-left: 3px solid #8a6a2c; border-radius: 8px;
}
.rv-round.boss { border-left-color: var(--gold); }
.rv-round.dead { border-left-color: #c65b43; }
.rv-rhead { display: flex; flex-wrap: wrap; align-items: baseline; gap: 8px 12px; margin-bottom: 6px; }
.rv-rtitle { font-size: 1.1rem; color: var(--gold); }
.rv-tag { font-size: 0.64rem; text-transform: uppercase; letter-spacing: 0.1em; padding: 2px 7px; border-radius: 4px; border: 1px solid rgba(217,164,65,0.22); color: var(--cream); }
.rv-tag.back { color: var(--gold); border-color: rgba(217,164,65,0.4); }
.rv-tag.boss { color: #f0d9a0; border-color: var(--gold); background: rgba(217,164,65,0.08); }
.rv-meta {
  display: flex; flex-wrap: wrap; align-items: center; gap: 6px 14px; font-size: 0.8rem;
  color: var(--ink-faded); padding: 4px 0 10px; border-bottom: 1px dotted rgba(217,164,65,0.15); margin-bottom: 8px;
}
.rv-grp { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.rv-grp b { color: var(--cream); }
.rv-chip { font-size: 0.74rem; padding: 2px 9px; border-radius: 10px; background: rgba(217,164,65,0.1); border: 1px solid rgba(217,164,65,0.25); color: var(--cream); }
.rv-dim { opacity: 0.55; }
.rv-bagmini { display: flex; gap: 3px; }

.rv-turn { display: grid; grid-template-columns: 28px 1fr; gap: 10px; padding: 6px 0; align-items: start; }
.rv-turn + .rv-turn { border-top: 1px solid rgba(255,255,255,0.04); }
.rv-tno { font-size: 0.7rem; color: var(--ink-faded); padding-top: 8px; text-transform: uppercase; }
.rv-steps { display: flex; flex-wrap: wrap; align-items: center; gap: 6px 8px; }
.rv-step { display: flex; align-items: center; gap: 5px; }
.rv-sl { font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink-faded); }
.rv-arr { color: var(--ink-faded); opacity: 0.5; }
.rv-shatter { color: #9fd6d2; font-size: 0.72rem; font-style: italic; }
.rv-write { display: flex; align-items: center; gap: 8px; padding: 3px 10px 3px 4px; border-radius: 6px; background: rgba(217,164,65,0.09); border: 1px solid rgba(217,164,65,0.22); }
.rv-cat { font-size: 0.84rem; color: var(--ivory); }
.rv-pts { font-variant-numeric: tabular-nums; color: var(--gold); font-size: 1rem; padding-left: 8px; border-left: 1px solid rgba(217,164,65,0.3); }
.rv-pts.zero { color: #c65b43; }
.rv-bd { display: inline-flex; flex-wrap: wrap; align-items: center; gap: 4px 6px; }
.rv-base { font-size: 0.72rem; color: var(--ink-faded); font-variant-numeric: tabular-nums; }
.rv-proc { font-size: 0.72rem; padding: 1px 7px; border-radius: 10px; background: rgba(217,164,65,0.14); border: 1px solid rgba(217,164,65,0.35); color: var(--gold); white-space: nowrap; }
.rv-notes { grid-column: 2; display: flex; flex-direction: column; gap: 2px; margin-top: 4px; }
.rv-note { font-size: 0.76rem; color: var(--gold); font-style: italic; opacity: 0.85; }
.rv-outcome { margin-top: 8px; padding-top: 8px; font-size: 0.9rem; color: var(--gold); }
.rv-outcome.dead { color: #c65b43; }

/* review dice */
.rv-hand { display: flex; gap: 4px; }
.rv-die {
  width: 30px; height: 30px; border-radius: 6px; position: relative; flex: none;
  display: grid; grid-template: repeat(3,1fr)/repeat(3,1fr); padding: 4px;
  background: var(--ivory); color: var(--ink); box-shadow: inset 0 -2px 3px rgba(0,0,0,0.18), 0 1px 2px rgba(0,0,0,0.4);
}
.rv-die.gold { background: linear-gradient(150deg, #f0cd7a, var(--gold) 60%, #b7862f); }
.rv-die.glass { background: linear-gradient(150deg, rgba(159,214,210,0.5), rgba(159,214,210,0.2)); color: #06312e; border: 1px solid rgba(159,214,210,0.6); }
.rv-die.kept { outline: 2px solid var(--gold); outline-offset: 1px; box-shadow: 0 0 8px rgba(217,164,65,0.5); }
.rv-die .rv-pip { width: 5px; height: 5px; border-radius: 50%; background: currentColor; align-self: center; justify-self: center; }
.rv-die .rv-sp { grid-column: 1/4; grid-row: 1/4; display: grid; place-items: center; font-size: 1.05rem; font-weight: 700; }
.rv-p1 { grid-area: 1/1; } .rv-p2 { grid-area: 1/3; } .rv-p3 { grid-area: 2/2; }
.rv-p4 { grid-area: 2/1; } .rv-p5 { grid-area: 2/3; } .rv-p6 { grid-area: 3/1; }
.rv-p7 { grid-area: 3/3; } .rv-p8 { grid-area: 1/2; } .rv-p9 { grid-area: 3/2; }
.rv-die.mini { width: 22px; height: 22px; padding: 0; border-radius: 4px; }
.rv-die.mini .rv-sp { font-size: 0.95rem; }
.rv-die.mini .rv-bg { position: absolute; inset: 0; display: grid; place-items: center; font-size: 0.82rem; font-weight: 700; color: currentColor; }
.rv-facts .rv-die.mini { width: 28px; height: 28px; border-radius: 5px; }
.rv-facts .rv-die.mini .rv-sp, .rv-facts .rv-die.mini .rv-bg { font-size: 1.15rem; }

/* interludes */
.rv-interlude {
  margin: -6px 0 14px 8px; padding: 8px 14px; display: flex; flex-wrap: wrap; gap: 7px 10px; align-items: center;
  background: rgba(0,0,0,0.16); border-left: 2px solid rgba(217,164,65,0.3); border-radius: 0 6px 6px 0;
}
.rv-il { font-size: 0.8rem; color: var(--cream); display: inline-flex; gap: 6px; align-items: baseline; }
.rv-ilk { font-size: 0.56rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--ink-faded); border: 1px solid rgba(122,111,88,0.4); padding: 1px 5px; border-radius: 3px; }
.rv-il-charm .rv-ilk { color: var(--gold); border-color: rgba(217,164,65,0.45); }
.rv-il-event .rv-ilk { color: #c2a9dd; border-color: rgba(194,169,221,0.4); }
.rv-il-sell .rv-ilk { color: #9fd6d2; border-color: rgba(159,214,210,0.4); }

/* ledger scorecard */
.rv-ledger { margin: 4px 0 8px; padding: 16px 18px; background: rgba(0,0,0,0.3); border: 1px solid rgba(217,164,65,0.22); border-radius: 8px; }
.rv-ltitle { font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--ink-faded); margin-bottom: 12px; }
.rv-lprog { color: var(--gold); margin-left: 6px; letter-spacing: 0.06em; }
.rv-lcols { display: grid; grid-template-columns: 1fr 1fr; gap: 2px 28px; }
.rv-lcap { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.14em; color: var(--gold); opacity: 0.7; margin-bottom: 3px; }
.rv-lrow { display: flex; justify-content: space-between; align-items: baseline; gap: 10px; padding: 3px 0; border-bottom: 1px dotted rgba(217,164,65,0.1); font-size: 0.84rem; color: var(--cream); }
.rv-lpt { font-variant-numeric: tabular-nums; color: var(--gold); }
.rv-lpt sup { font-size: 0.62em; color: var(--ink-faded); margin-left: 2px; }
.rv-lrow.open { color: var(--ink-faded); opacity: 0.55; }
.rv-lrow.open .rv-lpt { color: var(--ink-faded); }
.rv-lrow.sealed { color: var(--ink-faded); }
.rv-lrow.sealed span:first-child { text-decoration: line-through; opacity: 0.7; }
.rv-lrow.sealed .rv-lpt { color: #c65b43; font-size: 0.7rem; text-transform: uppercase; }
.rv-lrow.filled .rv-lpt.zero { color: #c65b43; }
.rv-lrow.sub { border-bottom: 0; margin-top: 2px; }
.rv-lrow.sub span:first-child { color: var(--ink-faded); font-size: 0.76rem; text-transform: uppercase; letter-spacing: 0.06em; }
@media (max-width: 560px) {
  .rv-summary { grid-template-columns: 1fr; }
  .rv-stamp { justify-self: start; }
  .rv-lcols { grid-template-columns: 1fr; }
}

/* ===== Mobile / portrait layout pass ===== */
/* Modals must always sit above the sticky play bar below. */
.overlay { z-index: 50; }

@media (max-width: 700px) {
  #app { padding: 16px 12px 44px; }
  /* Flatten the play table into main's flow so the sticky play bar can stay
     pinned across the whole ledger (shop keeps its own box). */
  main { display: block; }
  .table:not(.shop) { display: contents; }

  /* Logo on its own row; the buttons get a full-width centered row and wrap. */
  header { flex-direction: column; align-items: stretch; gap: 12px; margin-bottom: 16px; }
  .stats { justify-content: center; gap: 8px 12px; }
  .stat, .help-btn { font-size: 0.82rem; }

  /* Modals fit the screen with margin around, and scroll their own content. */
  .overlay { padding: 16px; }
  .panel { padding: 20px 16px; max-height: calc(100dvh - 32px); }

  /* The play bar (score + dice + reroll) stays pinned while the ledger
     scrolls beneath it — so you can always see the dice and the ledger. */
  .playbar {
    position: sticky; top: 0; z-index: 5;
    gap: 12px; padding: 8px 0 12px; margin-bottom: 10px;
    background: linear-gradient(var(--felt) 88%, rgba(34, 56, 42, 0));
  }
  .target-panel { padding: 12px 14px; }

  /* Dice fill the row and always fit: flex-sized, capped, never overflowing. */
  .dice { gap: 6px; padding: 4px 0; flex-wrap: nowrap; justify-content: center; }
  .die { flex: 1 1 0; min-width: 0; width: auto; height: auto; max-width: 64px; aspect-ratio: 1; padding: 8px; border-radius: 10px; }
  .die .pip { width: 9px; height: 9px; }
  .die.held { transform: translateY(-7px); }

  .ledger { padding: 16px 15px 20px; margin-top: 14px; }
}

/* ── Theme: the crypt (?theme=dungeon) — palette experiment ─────────────
   The felt table becomes black stone by torchlight: charcoal walls, bone
   text, ember accents where the den wore gold. Everything else inherits —
   the den's layout is the crypt's layout, only the light changed. */
body.theme-dungeon {
  --felt-light: #2c2733;
  --felt: #17141c;
  --felt-dark: #050408;
  --gold: #c07a35;        /* torch ember, where the den wore gold */
  --cream: #cfc4b0;       /* bone */
  --ink: #16120c;
  --ink-faded: #6b6252;
  --ivory: #e7e0cf;       /* old bone, for the dice */
}
body.theme-dungeon::before {
  /* the hanging lamp's glow thins to torchlight from somewhere above */
  background: radial-gradient(ellipse 42% 26% at 50% 0%, rgba(255, 145, 65, 0.09), transparent 70%);
}
body.theme-dungeon .progress .fill {
  /* the target bar is a creature's health now — it bleeds, not shines */
  background: linear-gradient(90deg, #5a1f1f, #8d2f23);
}
body.theme-dungeon #scene .cord {
  /* the cord becomes a chain */
  width: 3px; left: -1.5px;
  background: repeating-linear-gradient(#3a333c 0 4px, #14111a 4px 8px);
}
body.theme-dungeon #scene .shade {
  /* the lampshade becomes a hanging iron censer (the sway comes along) */
  top: 34px; left: -26px;
  width: 52px; height: 34px;
  background: linear-gradient(160deg, #3a333c, #1a161e 55%, #0a080d);
  clip-path: polygon(0 18%, 100% 18%, 82% 100%, 18% 100%);
  border-radius: 0;
}
body.theme-dungeon #scene .bulbglow {
  /* embers breathing through the grate, not a bulb */
  top: 44px; left: -30px;
  width: 60px; height: 20px;
  background: radial-gradient(ellipse at 50% 40%, rgba(255, 140, 60, 0.75), rgba(200, 90, 40, 0.18) 55%, transparent 75%);
}
body.theme-dungeon #scene .cone {
  /* a narrower, warmer, less certain light */
  background: linear-gradient(rgba(255, 150, 70, 0.07), transparent 74%);
  clip-path: polygon(46% 0, 54% 0, 78% 100%, 22% 100%);
}
body.theme-dungeon #scene .motes i {
  /* dust motes become drifting sparks */
  background: rgba(255, 150, 80, 0.6);

- **Nothing at your table changed.** Every deal, price, and payout is

## v0.2.10 — "The stamp learns arithmetic" (2026-07-12)

- **The stamp learned arithmetic.** Each level already inked makes the
  next Ledger Stamp dearer. The first one costs what it always cost;
  the tenth costs what a tenth stamp is worth to the kind of person
  who buys ten.
- **The Notary keeps his appointment.** One back-room table per night,
  guaranteed. Whether you have his price is your business.

## v0.2.9 — "The first playtests speak" (2026-07-12)

- **The deed got scarcer.** A regular sells his piece once a night —
  the whole deed no longer assembles off the regulars alone. One piece
  per source; the house does not repeat itself.
- **The Owner asks less, and means it.** The fight upstairs demands

  the records keeps your last ten runs — the losses too. Any reviewed
  night can be downloaded as the full report, and a saved page carries
  its whole trace inside it.
- **Every review states its table.** Seed and the version the run was
  born under, right in the summary — no more guessing which rules dealt
  the night.

## v0.2.8 — "The arrangement" (2026-07-11)

- **Some tables can be folded.** A certain charm lets you buy your way
  out of a round going wrong: pay, the table looks away, and the night
  simply continues. Nothing is paid out — you didn’t win, you paid.
- **Deciding late is the expensive part.** Fold early and the dealer
  offers a discount for the good read. Wait until the last write and
  it costs the full price. He does arithmetic, not favors.
- **Even the regulars have a price.** Double, at their chairs. They
  take it without counting it — and leave nothing behind.
- **Some things are not for sale.** The last table of the night holds
  its own paper. And upstairs, money is not what changes hands.
- **Where to find it? Not on any winner’s table.** Arrangements are
  made where the house does its quieter business. Watch the drawer.
  And check lost property — its previous owner stopped needing it.

*The house checked the books: the odds of the night did not move.
This is a matter of style. The house respects style.*

## v0.2.7 — "The back office" (2026-07-11)

- **The house takes requests now.** A shared link can deal more than a
  seed: it can bend the numbers — targets, prices, payouts — and the
  night plays out under those house rules for whoever opens it. The
  table wears a gold **CUSTOM RULES** notice all night; click it for
  the fine print, next to what the house would normally charge.
- **Records tell the truth.** A night under house rules goes on the
  board as one — tagged, itemized, stamped into the review and the
  report. The house does not launder results.
- **Links knock first.** Following a shared night while yours is still
  going now asks — sit back down, or take the dare. Nothing is lost
  until you choose.
- **The back office is open. Quietly.** Somewhere behind the house
  rules card, management keeps a door. Behind it: every number the
  house runs on, editable, and a fresh deck. Deal it, or pocket it as
  a link. The house will allow it. Once.

*Mid-run saves carry over. Custom nights wake up custom.*

## v0.2.6 — "The front door sticks less" (2026-07-11)

- **The night was re-tuned.** Gentler at the door. No kinder upstairs.
- Prices changed. The dealer will not be taking questions.

*Mid-run saves wake up under the new numbers. The house honors old
debts. At new rates.*

## v0.2.5 — "Paperwork" (2026-07-10)

- **A piece of paper has entered the building.** The house declines to
  elaborate.
- Housekeeping under the felt: every number the house runs on now lives
  in one ledger of its own. Same game, tidier books. You won't notice.
  That's the point.

*Mid-run saves carry over, as always. The house honors old debts.*

## v0.2.4 — "The house keeps the tapes" (2026-07-10)

- **Old nights can be reviewed.** Every run that makes the records from
  now on keeps its full story — expand a records row and "Review the
  night" replays it round by round: the dice, the holds, the charms
  firing, what you bought between hands. Records from before tonight
  were kept the old way; the house didn't tape those.
- **Reviews can leave the building.** "Save as page" on any review
  downloads it as a single file — send a friend the whole night, no
  game required. Pairs well with sharing the seed.
- The dealer no longer greets you with an empty speech bubble when you
  come back mid-shopping. He says something. He always says something.

## v0.2.3 — "Management has had a word" (2026-07-10)

- **The dealer was rounding in his own favor.** Every Wild Face since
  the prices started climbing charged a dollar over the number on the
  shelf — in a bad moment it could even put you in the red. Fixed: you
  pay exactly what the tag says. Management apologizes for nothing,
  but the books are correct now.
- **You can think better of it.** Buying a charm with a full shelf no
  longer commits you on the spot — the "make room" choice can be
  walked away from (button, ×, or Esc). Nothing is paid until you
  actually let something go. Backing out of a regular's charm returns
  you to the choice, cash option included.

## v0.2.2 — "Forgeries, priced accordingly" (2026-07-10)

- **Copying a ★ with a Loaded Face now costs like the scarce thing it
  forges** — the more wilds you own, the more a ★-copy runs. An honest
  copy of a six stays $4, always.
- **Both prices are on the tag** before you choose — the shelf reads
  "$4 · ★ $9", and the dealer quotes you again while you pick the die.
  The house is many things. Coy about money isn't one.

## v0.2.1 — "The notice actually gets posted" (2026-07-10)

- The management notice now reaches players who were here before the
  house started posting notices. Which was everyone.
- The number in the corner tells you which build you're on, not which
  build your run remembers. Click it any time to reread the notices.

## v0.2.0 — "The night has a number" (2026-07-10)

- **Every night has a number now.** The same seed deals the same night —
  dice, shop, visitors, all of it. Finish a run and share its number;
  see if a friend survives what you survived. Paste a seed on the front
  door to play someone else's night.
- **Three new night rules** joined the rotation. Harder. Weirder. The
  house doesn't apologize.
- **Wild Faces got scarcer.** The price climbs with every ★ you already
  own. The good ones get scarce — the dealer always said so, and now
  the shelf agrees.
- **First Instinct only trusts your own hands.** Rerolls banked up a
  sleeve no longer count toward it — the reroll button shows the split,
  so you always know which is which.
- The night's report now records shelf rerolls too. The bookkeeping
  sees you fishing.
- Plays properly on phones now. End-of-run screens say more; modals
  close the way you expect; the build number sits quietly in the
  corner.

*Mid-run saves from v0.1.0 carry over — an in-flight run just wakes up
under the new prices. The house honors old debts. At new rates.*

## v0.1.0 — "The doors open" (2026-07-08)

The first public night. Eight acts, a shuffled table of regulars, a
counter that sells you rope and calls it a lifeline. Everything works;
nothing is safe. Pull up a chair.

*The ledger keeps its own private notes on every hand you play — the
house calls it bookkeeping. If a night ever feels off, the "Review the
night" button will show you exactly where it went.*
