aler doesn’t look up.`],scored:[`Noted in the ledger.`,`The dealer counts it twice. It stands.`,`Acceptable. The game continues.`],scoredLow:[`That’s a number, technically.`,`The house appreciates the donation.`,`The dealer writes it down slowly, so you can watch.`,`Bold. Wrong, but bold.`],scoredBig:[`The dealer counts it three times. It stands. Annoyingly.`,`Hm. The house will remember that.`,`Decent. Don’t let it become a habit.`],lastTurn:[`Last turn. The ledger is patient. The target isn’t.`,`One turn left. The house is already counting.`,`Last chance. The chair behind you is suddenly occupied.`],lastReroll:[`That was your last reroll. Now we see who you really are.`,`No more rerolls. The dice are done apologizing.`,`Last one spent. The dealer settles in to watch.`],needle:[`Rolling harder doesn’t help. Players always try.`,`The dice owe you nothing. They’ve made that clear.`,`Take your time. The house has all of it.`,`The dealer stifles a yawn. Poorly.`],richPlayer:[`Quite a pile you’re building. It’s not yours. Not really.`,`Heavy pockets. The house offers to lighten them.`],holdQuip:[`Sentimental.`,`That one? If you say so.`,`A firm grip. The dice notice.`],overkill:[`Showing off is free. Everything else isn’t.`,`The house counts it twice. It’s still absurd.`,`Yes, yes. Very impressive. Sit down.`],buyGlass:[`Mind the edges. The last owner didn’t.`,`Glass. Brave. It counts double until it doesn’t.`],buyGold:[`Gold. It bites like a coin should.`,`Plated. Now it works for you. Loosely speaking.`],newRound:[`A fresh round. The ledger remembers, even if you don’t.`,`The same table. Fewer options. This is called progress.`],chooseFloor:[`The floor. Sensible. The house respects caution. It pays it less.`,`The floor it is. Nothing wrong with surviving.`],chooseBack:[`The back room. The door locks behind you. That’s just the draft.`,`The back room. The dealer follows you in and doesn’t say why.`],newAct:[`The ledger turns a page. Clean entries. Old debts.`,`A new act. The ink from the last one is still drying.`],bossIntro:[`A regular takes the seat opposite. The room gets quieter.`,`The house brings its own player. Standard procedure.`,`Someone important is watching. The stakes adjust themselves.`],roundWon:[`The house pays. Reluctantly.`,`Counted twice. It’s correct. Unfortunately.`,`Your winnings. Try not to spend them here. You will.`],shop:[`The counter opens. Almost everything was someone’s.`,`The dealer arranges the stock. Some of it arranges itself.`,`Browse. The prices are firm. The dealer is firmer.`],shopReroll:[`The dealer sighs, sweeps the counter, and produces different junk.`,`New stock. Same provenance. Don’t ask.`],purchase:[`Sold. There is no word for refund here.`,`A pleasure doing business. For one of us.`,`It’s yours now. That works in both directions.`],retire:[`It is taken somewhere quieter. The bag is lighter.`,`Retired. The other dice don’t mention it.`],shatter:[`A glass die returns to sand. The house does not sweep.`,`It shattered. It was always going to. The dealer nods.`],restore:[`The ink is still wet. The entry never happened.`,`Rewritten. The ledger holds no grudges. The house does.`],spareRoll:[`One extra roll. The dealer pretends not to see.`],lastCall:[`One more turn. The clock disagrees. The clock is outvoted.`],runOver:[`It was never going to hold.`,`You’re out. The table keeps your dice. House policy.`,`The ledger closes. It had your name in it before you arrived.`],runWon:[`The house is… surprised.`,`Paid in full. Never come back.`,`You’ve won. Management would like a word.`],customNight:[`The numbers on the wall are different tonight. Management approved it. Allegedly.`],resumed:[`You left mid-hand. The table waited. It’s good at that.`],letGo:[`Let go. The shelf doesn’t mourn. Neither does the house.`],cancelReplaceReward:[`Changed your mind? The regular is still waiting.`],cancelReplaceShop:[`Back on the shelf. The dealer pretends not to notice.`],upperBonus:[`All six faces accounted for. The house pays a bookkeeping bonus. Grudgingly.`],fullBook:[`The book is full. Every line. The house, quietly impressed, produces another — and $10 for the binding.`],bookNear2:[`Two lines left in the book. The house pretends not to count.`],bookNear1:[`One line left. The house is definitely counting.`],walkedOut:[`You walked out. The door didn’t stop you. Doors never do.`],soldOut:[`You pawned the last die. The money is real. The game, unfortunately, was dice.`],endlessChosen:[`The house raises an eyebrow. The chair stays warm.`],foldTaken:[`He takes it without counting it. The table looks away.`],ledgerExhausted:[`The ledger is full. Nothing left to write. The house admires thoroughness. It doesn’t pay for it.`],shareCopied:[`Copied. Post it somewhere the house can see.`]},u={rabbitsFoot:{name:`Rabbit’s Foot`,desc:`+1 reroll every turn. The rabbit had four. This is the last one.`},pocketWatch:{name:`The Doorman’s Watch`,desc:`+1 turn every round. He hasn’t noticed it’s gone.`},weightedFelt:{name:`Weighted Felt`,desc:`Every ledger entry pays +10. The table tilts your way. Slightly.`},counterfeitStamp:{name:`Counterfeit Stamp`,desc:`Shop items cost $1 less. The dealer knows. The dealer doesn’t care.`},houseKey:{name:`House Key`,desc:`Interest is capped at $10 instead of $5. It opens a door you shouldn’t have.`},steadyHands:{name:`Steady Hands`,desc:`Glass dice shatter half as often. Yours now. Steady.`},ironNerves:{name:`Iron Nerves`,desc:`+15 to writes on your last turn. Panic is for other people.`},collectorsRing:{name:`Collector’s Ring`,desc:`Gold dice pay $2 instead of $1. It never leaves the finger. It can’t.`},sixthFinger:{name:`Sixth Finger`,desc:`Every six on the table pays +2 extra. Nobody counts your fingers twice.`},deepPockets:{name:`Deep Pockets`,desc:`Carry three held items instead of two. Don’t ask what else is in there.`},houseCut:{name:`The House’s Cut`,desc:`+$2 every round you win. Skimmed, technically. From the house, technically.`},silverTongue:{name:`Silver Tongue`,desc:`New shop stock costs $2 instead of $5. The dealer likes you. Nominally.`},reservedSeat:{name:`Reserved Seat`,desc:`Mark one die in your bag; it is always drawn. The chair has its name on it.`},gamblersOath:{name:`Gambler’s Oath`,desc:`+1 reroll every turn, but winning a round pays no base money. You swore something. It listened.`},brittleCrown:{name:`Brittle Crown`,desc:`Glass dice count triple, and shatter twice as often. Wear it while it lasts.`},crookedVisor:{name:`Crooked Visor`,desc:`+5 to every write, but a zero costs you $1. Seeing more has a price.`},openEnded:{name:`Open-Ended`,desc:`Straights may skip one number. The house frowns. The rule stands.`},runningTab:{name:`Running Tab`,desc:`Straights pay +25. Order is worth something in a place like this.`},scavenger:{name:`Scavenger`,desc:`After you write a zero, your next write pays ×1.5. Somebody has to eat the garbage.`},taxWriteOff:{name:`Tax Write-Off`,desc:`Every zero you write pays $2. Losses, properly filed, are earnings.`},foreman:{name:`The Foreman`,desc:`Ones through Sixes count their dice double. He respects honest work.`},invertedTable:{name:`The Inverted Table`,desc:`Every die pays its opposite face — 1 as 6, 2 as 5, 3 as 4. The felt on the other side is worn smooth.`},snakeCharmer:{name:`Snake Charmer`,desc:`Every 1 on the table adds +3 to the write. They listen to him. Only him.`},changeJar:{name:`The Change Jar`,desc:`Overshooting a target pays $1 per 10 surplus points. The house keeps the change. The jar keeps it first.`},momentum:{name:`Momentum`,desc:`A third of your surplus carries into the next round’s score. A table remembers how you left it.`},firstInstinct:{name:`First Instinct`,desc:`Each of this turn’s unspent rerolls adds +7 to the write. Anything up a sleeve doesn’t count. The first thought was correct. It usually is, here.`},upTheSleeve:{name:`Up the Sleeve`,desc:`Up to three unspent rerolls slip up the sleeve for your next turn. The dealer checks. Never finds them.`},standingArrangement:{name:`The Standing Arrangement`,desc:`Fold any table: $16, minus $2 for every turn you leave on it. A regular’s chair costs double, and he leaves nothing behind. Deciding late is the expensive part. The house holds its own paper.`},assayer:{name:`The Assayer`,desc:`Every scoring gold die adds +6 to the write. He bites each one before it counts. They keep passing.`}},d={weightedFace:{name:`Weighted Face`,desc:`Choose a die. Its lowest face becomes a six. Standard craftsmanship.`},loadedFace:{name:`Loaded Face`,desc:`Choose a die. Its lowest face becomes a copy of its highest — a ★ included, for the right price: forgeries of scarce things get scarce themselves. The dealer has seen this before.`},ladderChisel:{name:`Ladder Chisel`,desc:`Choose a die. Its faces become 2·3·3·4·4·5. Made for climbing.`},wildFace:{name:`Wild Face`,desc:`Choose a die. Its lowest face becomes ★ — counts as any value, completes any pattern, worth 6 in sums. The price climbs with every ★ you already own. Whittled from something that shouldn’t whittle — the good ones get scarce.`},blankFace:{name:`Blank Face`,desc:`Choose a die. Its highest face becomes · — worth zero, breaks pairs and straights. For players who profit from garbage. The house doesn’t judge. Aloud.`},goldPlating:{name:`Gold Plating`,desc:`Choose a die. Pays $1 every turn you score. The tooth it was pulled from is not discussed.`},glassBlowing:{name:`Glass Blowing`,desc:`Choose a die. Counts double. Shatters eventually. Everything does.`},ledgerStamp:{name:`Ledger Stamp`,desc:`Choose a ledger entry. It pays better from now on. The house notarizes reluctantly.`},freshInk:{name:`Fresh Ink`,desc:`Held item. Rewrite one spent ledger entry mid-round. Forgery is a strong word.`},spareRoll:{name:`Spare Roll`,desc:`Held item. One extra reroll, when you need it most. You will.`},lastCall:{name:`Last Call`,desc:`Held item. One more turn at this table. The dealer pretends not to notice the clock.`},anotherDie:{name:`Another Die`,desc:`A plain die, added to your bag. Honest work. It won’t stay honest.`},retirement:{name:`Retirement`,desc:`The dealer’s standing offer: he always buys dice.`},deedPiece:{name:`A Piece of the Deed`,desc:`A third of an old document, torn deliberately. The address on it is this address. The dealer sells it without looking at it, or you.`}},ee={quiet:{name:`A quiet night`,desc:`Nothing unusual. Officially.`},crowded:{name:`A crowded night`,desc:`Something waits between the tables of every act.`},glassblowers:{name:`The glassblowers’ night`,desc:`Glass blowing costs $2 at the counter.`},gift:{name:`A welcoming night`,desc:`You start with Fresh Ink and $3. Nothing is free. This isn’t either.`},shortstack:{name:`A short night`,desc:`You sat down light — two dollars to your name. The house prefers it that way.`},taxman:{name:`The taxman’s in`,desc:`Every price at the counter runs a dollar heavier. Nobody argues with the taxman.`},overstocked:{name:`One too many`,desc:`You came in with an extra die. More to shed before the bag behaves.`},noSixes:{name:`The sixes never came`,desc:`The shipment ran short: every 6 on your dice rolled over to a 1 tonight.`},openBar:{name:`An open bar`,desc:`One more reroll every turn, on the house. The house never pours for free.`},lastOrders:{name:`Last orders`,desc:`One reroll a turn tonight. Make it count.`}},te={fewerTurns:{name:`The Doorman`,desc:`Three turns. He closes the table early.`,ruleName:`one fewer turn`,intro:`The Doorman sits down and checks his watch. Three turns. He has somewhere to be. He always has somewhere to be.`,taunts:[`He looks at his watch. Then at you. Then at his watch.`,`He taps the table twice. Time is one of the things you owe.`],pressure:`He’s already standing. One turn, then the door.`,defeat:`He holds the door open. For once, for you.`,victory:`“Closing time.” The door was always going to win.`},threesVoid:{name:`The Accountant`,desc:`Dice showing 3 score nothing.`,ruleName:`threes score nothing`,intro:`The Accountant sits down. Threes score nothing tonight. Don’t ask. He’s been through a lot.`,taunts:[`He recounts your score without being asked. It’s lower his way.`,`He mutters something about threes. Old grief.`],pressure:`He’s already drafted the deficit report.`,defeat:`He initials your win and files it under Irregularities.`,victory:`He balances the books. You were the remainder.`},oneReroll:{name:`The Collector`,desc:`One reroll per turn.`,ruleName:`one reroll only`,intro:`The Collector sits down. One reroll per turn. He finds second chances distasteful.`,taunts:[`He watches your reroll the way a landlord watches a lease.`,`“Spend it wisely.” He means the reroll. He means everything.`],pressure:`He’s clearing a space on his shelf. Player-shaped.`,defeat:`“Kept dice, kept promises.” He tips an invisible hat.`,victory:`You’re catalogued now. Shelf four. Don’t struggle.`},lockedDie:{name:`The Magpie`,desc:`She takes one die each turn.`,ruleName:`a die locked each turn`,intro:`The Magpie sits down. Keep an eye on your dice. It won’t help.`,taunts:[`She’s humming. Your die is part of the song now.`,`Her pockets clink. That clink used to be yours.`],pressure:`She’s already eyeing the rest of the set.`,defeat:`She returns the die. Slightly warmer. Don’t ask.`,victory:`The whole bag, then. She always wanted the whole bag.`},sixesVoid:{name:`The Widow`,desc:`Dice showing 6 score nothing.`,ruleName:`sixes score nothing`,intro:`The Widow sits down. Sixes score nothing tonight. They remind her of someone.`,taunts:[`She turns a six face-down when you’re not looking. You were looking.`,`She says nothing. The veil says it for her.`],pressure:`She’s dressed for an ending. Yours will do.`,defeat:`A small nod under the veil. Someone would have liked you.`,victory:`She adds a bead to the necklace. It’s not a pearl.`},sealedEntries:{name:`The Censor`,desc:`Your two best open entries are sealed.`,ruleName:`two entries sealed`,intro:`The Censor sits down and crosses out your favourites. Nothing personal. Everything is personal.`,taunts:[`The stamp hovers over your ledger like weather.`,`“Redacted” is his favourite word. He has exactly one favourite word.`],pressure:`He’s inking the stamp. Your name fits under it.`,defeat:`He un-crosses one word somewhere. It clearly hurts him.`,victory:`Your run is a footnote now. The footnote is sealed.`},noRest:{name:`The Insomniac`,desc:`Holds don’t survive a reroll.`,ruleName:`holds reset each reroll`,intro:`The Insomniac sits down. Nothing rests near him. Not the dice. Not you.`,taunts:[`He hasn’t blinked since you sat down. He’s counting on you to.`,`He rearranges his coffee cups. There are eleven.`],pressure:`He can wait forever. You have one turn.`,defeat:`He closes his eyes. Just for a second. Because of you.`,victory:`You’ll sleep tonight. He won’t. That’s how he wins.`},theHouse:{name:`The House`,desc:`Three turns. One reroll. Its table, its rules.`,ruleName:`the house`,intro:`The chair opposite stays empty. The house itself is playing tonight. It usually doesn’t bother.`,taunts:[`The empty chair creaks. Nothing shifted its weight.`,`The lamp flickers. It isn’t the wiring.`],pressure:`The room leans in.`,defeat:`The chair is just a chair again. For now.`,victory:`The house always wins. Tonight it didn’t even have to try.`},noReopens:{name:`The Proofreader`,desc:`Entries cannot be reopened at this table — Fresh Ink waits.`,ruleName:`no reopens`,intro:`The Proofreader lays a bone ruler across your ledger and smooths the page flat. What’s written is written.`,taunts:[`Ink dries. That’s rather the point of it.`,`You want to write it AGAIN? It’s a ledger, not a draft.`],pressure:`One turn. The ruler doesn’t move.`,defeat:`She lifts the ruler. The pages breathe again.`,victory:`She underlines your final entry, once, in red.`},firstRollTax:{name:`The Regular`,desc:`Each unspent reroll costs 7 points at write time (up to two).`,ruleName:`unspent rerolls cost points`,intro:`The Regular settles into his usual chair and taps the felt twice. He’s seen ten thousand hands. He knows when you’re not trying.`,taunts:[`Writing the first thing you see? I do that too. It’s called not caring.`,`The house pays for instinct. I charge for it.`],pressure:`One turn. He’s already bored.`,defeat:`He tips an invisible hat. Effort. He respects that.`,victory:`He writes your total without looking. He’s seen this hand before.`},kindsHalved:{name:`The Critic`,desc:`Chance, Three of a Kind, Four of a Kind and Yahtzee pay half at this table.`,ruleName:`chance and the kinds pay half`,intro:`The Critic unfolds a pair of reading glasses and studies your ledger like a wine list. He is not impressed by volume.`,taunts:[`Chance. How inventive.`,`Anyone can add. Show me something with structure.`],pressure:`One turn. He’s composing the review.`,defeat:`He closes the glasses. “Adequate,” he says, which from him is rapture.`,victory:`Two stars. The ledger, he writes, relies on a single tired idea.`},moneyTax:{name:`The Rake`,desc:`At each of this round’s turns the house takes 30% of your cash.`,ruleName:`money tax`,intro:`The Rake lays a long brass rake across the felt, where your money can see it. The house’s cut, collected in person.`,taunts:[`Heavy pockets slow a player down. I’m helping.`,`It’s not stealing. It’s rent on the chair.`],pressure:`One turn. The rake is already moving.`,defeat:`He withdraws the rake with a small bow. What’s left of your money is yours again.`,victory:`He draws your stack across the felt without counting it. He never counts it.`},charmsVoid:{name:`The Landlady`,desc:`Held charms do nothing at her table.`,ruleName:`charms suspended`,intro:`The Landlady sits down and sets the building’s keys on the felt. Your charms go quiet, one by one. Everything in this room works for her. Read your lease.`,taunts:[`Whatever that little thing usually does, it doesn’t do it here.`,`You may keep your charms. Keeping is all they’re doing tonight.`],pressure:`One turn. The rent is due.`,defeat:`She rises without hurry. The table exhales, and your charms remember what they’re for.`,victory:`She was never playing against you. You were behind on the rent from the start.`},facesCapped:{name:`The Leveler`,desc:`No face counts past its third die this round.`,ruleName:`three of a face, no more`,intro:`The Leveler spreads your dice in a neat row and slides every fourth one aside, unhurried. Three of anything is plenty at his table.`,taunts:[`Three of a kind is a hand. Five is a habit.`,`I don’t count past three. House policy. My policy.`],pressure:`One turn left. Three of a face. Not one more.`,defeat:`He pushes the set-aside dice back across the felt. They count again — elsewhere.`,victory:`He stacks your matching dice in a little tower and keeps the change.`},theOwner:{name:`The Owner`,desc:`Three turns. One reroll. Your two best entries sealed. The building itself is watching.`,ruleName:`three turns, one reroll, two seals — upstairs`,intro:`The stairs weren’t on any floor plan. Neither is the room. He is already seated, and the three pieces of paper on the felt have arranged themselves back into a deed. “My property. My table. One hand.”`,taunts:[`He doesn’t look at the dice. The dice look at him.`,`“The house always wins” — he says it like a man quoting his own signature.`,`Downstairs, the parlor has gone very quiet.`],pressure:`He turns the deed face down. Whatever happens next, it’s already filed.`,defeat:`He signs without a word. The pen is warm. The house is yours — whatever that ends up meaning.`,victory:`“Thank you for collecting these.” The deed folds itself into his pocket. The stairs are gone by morning.`}},f=e=>Number(e??0),p={stranger:{name:`The Stranger`,text:`A man you haven’t seen before is suddenly beside you. He offers a die. He doesn’t say from where.`,option:(e,t,n)=>e===`take`?{label:`Take the die`,hint:n?`your bag is full`:`a used die joins your bag`}:{label:`Decline`},result:e=>e===`taken`?`It settles into t         <h3>The arrangement</h3>
        <p>Beat the <strong>target score</strong> each round or the run is over.
           You get <strong>4 turns</strong> per round. A run is 8 acts of
           3 rounds; the third round of each act, <strong>a regular</strong>
           sits in with a house rule of their own — fewer turns, worthless
           threes, sealed entries. Check the map (click the act, top right)
           to see who's waiting.</p>
        <h3>A turn</h3>
        <p>Five dice are drawn from your bag and rolled. Click dice to
           <strong>hold</strong> them, reroll the rest up to twice, then write
           the result into a ledger entry. The entry decides the score —
           straights, of-a-kinds, sixes, and so on. The number shown next to
           each open entry is what your current dice would pay there.</p>
        <h3>The ledger</h3>
        <p>Each entry is written <strong>once per act</strong> — it stays spent
           for all 3 rounds. Sometimes you must write a zero into something
           you loved. The house calls this character-building.</p>
        <p>The upper section holds two contracts: complete <strong>all six of
           Ones–Sixes without a zero</strong> and the house pays half the
           table's target on the spot — or end the act with <strong>every
           upper blank or zeroed</strong> (the blackout) for a cash bonus at
           the boss settlement. Pick a pole, or neither.</p>
        <h3>The tables</h3>
        <p>Each new act, two tables have a seat open: <strong>the floor</strong>
           (standard targets, standard pay) or <strong>the back room</strong>
           (targets half again higher, double payout). Choose by how much
           your engine can carry.</p>
        <h3>Charms</h3>
        <p>Passive relics with lasting effects — you can carry five. There is
           more than one way to come by them: beat a <strong>regular</strong>
           and they leave one behind, the dealer sometimes has one in the
           drawer, and lost property finds new owners.</p>
        <h3>The counter</h3>
        <p>Winnings buy improvements between rounds: carve dice faces, plate
           dice in <strong>gold</strong> (pays $1 per scored turn) or blow them
           in <strong>glass</strong> (counts double, shatters eventually), or
           stamp ledger entries so they pay better. Savings earn interest:
           $1 per $5 held.</p>
        <p>You own <strong>7 dice</strong> but only <strong>5 are drawn</strong>
           each turn, at random. Retire dice to see your good ones more often;
           add dice for raw power at the cost of consistency. The bag is the
           build.</p>
        <h3>At the table</h3>
        <p><strong>R</strong> or <strong>Space</strong> rolls, <strong>1–5</strong>
           hold dice, <strong>Backspace</strong> releases them right to left,
           <strong>Esc</strong> backs out. Your run is saved —
           close the tab and the table waits.</p>
        <h3>Held items</h3>
        <p>You can carry two. <strong>Fresh Ink</strong> rewrites a spent ledger
           entry mid-round. <strong>Spare Roll</strong> is a reroll for when it
           matters. There are no refunds. There is no word for refund here.</p>`,close:`Understood`,backOffice:`the back office`,backOfficeTip:`Every number in the house, editable. Deal a night on your own terms.`},leave:{title:`Walk out?`,flavor:`Mid-run. The ledger will remember where you stopped. It remembers everything else too.`,stay:`Stay seated`,go:`Walk out`},lastWrite:{title:`Last write of the round.`,flavor:`That entry won’t take the round — but another one will. Write this and the table’s lost.`,reconsider:`Let me look again`,write:`Write it anyway`},resume:{title:`The table waited`,flavor:`Your run is where you left it. Chips, dice, debts. Mostly debts.`,sit:`Sit back down`,walk:`Walk away`,dealtUnder:e=>`This night was dealt under v${e}. It plays out under its own rules — the table keeps its word.`},notice:{title:`Notice from management`,flavor:`Posted on the door. Reading it is optional. It always is.`},count:{strip:`The house counts its tables — no names, no faces. Tonight went into the ledger as a number among numbers.`,stripSee:`see exactly what leaves the table`,stripOff:`count me out`,stripOffDone:`Noted. The house won’t count you.`,title:`The count room`,flavor:`What you see below is the literal send — the same bytes, the same code path. There is no second, quieter page.`,keyHtml:e=>`
      <ul>
        <li><strong>In it:</strong> the run itself — every roll, write and buy, exactly as the night review shows them.</li>
        <li><strong>In it:</strong> rough experience — “1–5 / 6–20 / 20+ runs played”, never exact counts.</li>
        <li><strong>In it:</strong> a token minted fresh each day and dead by midnight — it says “someone sat tonight”, nothing more.</li>
        <li><strong>In it:</strong> a note for the house — only if you write one.</li>
        <li><strong>Not in it:</strong> your name, an account, your location, your device.</li>
        ${e?`<li><strong>One thing follows you:</strong> the table mark you volunteered — burnable below, any time.</li>`:`<li><strong>Not in it:</strong> anything that follows you from one day to the next.</li>`}

thing buried in surplus here.`,`The warden stifles a yawn. Poorly.`],richPlayer:[`Quite a collection you’re building. The crypt counts it as inventory.`,`Heavy pockets. Heavy pockets sink slowly.`],holdQuip:[`Sentimental.`,`That one? If you say so.`,`A firm grip. The dice notice. So does the dark.`],overkill:[`It was already down. The crypt admires thoroughness.`,`Yes, yes. Very impressive. It’s dead twice now.`,`Showing off is free. Everything else costs teeth.`],buyGlass:[`Mind the edges. The last owner is around here somewhere.`,`Grave glass. Brave. It counts double until it doesn’t.`],buyGold:[`Gilded. It bites like a tooth should.`,`Plated. Now it works for you. Loosely speaking.`],newRound:[`Something else steps into the torchlight.`,`The next chamber. Fewer options. This is called descending.`],chooseFloor:[`The halls. Sensible. The crypt respects caution. It feeds it last.`,`The halls it is. Nothing wrong with surviving. It’s rare, is all.`],chooseBack:[`The ossuary. The stairs go down. The stairs do not go up.`,`The ossuary. The warden follows you in and doesn’t say why.`],newAct:[`A new floor. The air is older here.`,`The stairs end at another beginning. They always do.`],bossIntro:[`Something larger fills the doorway. The torches lean away.`,`Every floor keeps its keeper. Standard arrangement.`,`The dead go quiet. Quieter.`],roundWon:[`It stops moving. The crypt makes a note of the time.`,`Down. What it carried is yours, administratively speaking.`,`Settled. The floor absorbs it. The floor absorbs everything.`],shop:[`The merchant’s alcove. Almost everything was someone’s.`,`He arranges the stock. Some of it arranges itself.`,`Browse. The prices are firm. The teeth are not.`],shopReroll:[`He sighs, sweeps the slab, and produces different grave goods.`,`New stock. Same provenance. Don’t ask.`],purchase:[`Sold. There are no refunds below ground.`,`A pleasure doing business. For one of us.`,`It’s yours now. That works in both directions.`],retire:[`It is buried with modest ceremony. The bag is lighter.`,`Interred. The other dice don’t mention it.`],shatter:[`A glass die returns to sand. The crypt does not sweep.`,`It shattered. It was always going to. The warden nods.`],restore:[`The blood is still wet. The page never happened.`,`Rewritten. The book holds no grudges. The crypt does.`],spareRoll:[`One extra roll. The warden pretends not to see.`],lastCall:[`The bell tolls once. One more turn. Everything below pauses to check whose it was.`],runOver:[`The delve ends here. The crypt files you under Provisions.`,`Your dice join the pile by the door. It’s a large pile.`,`The stone closes over. It had a space your shape already.`],runWon:[`Daylight. The crypt is… surprised.`,`You walk out. Almost nobody walks out.`,`You’ve won. The management below would like a word.`],customNight:[`The carvings on the wall are different tonight. Somebody approved it. Something.`],resumed:[`You left mid-fight. The crypt waited. It’s good at that.`],letGo:[`Left behind. The shelf doesn’t mourn. Nothing here mourns on duty.`],cancelReplaceReward:[`Changed your mind? It’s still lying there. It can wait. It’s dead.`],cancelReplaceShop:[`Back on the slab. The merchant pretends not to notice.`],upperBonus:[`All six faces accounted for. The crypt pays a cataloguing bonus. Grudgingly.`],fullBook:[`The book is full. Every page. The crypt, quietly impressed, produces another — and ten teeth for the binding.`],bookNear2:[`Two pages left in the grimoire. The crypt pretends not to count.`],bookNear1:[`One page left. The crypt is definitely counting.`],walkedOut:[`You climbed out. The gate didn’t stop you. Gates never do. Coming back in is the trick.`],soldOut:[`You sold the last die. The teeth are real. But the crypt deals in dice, and yours just left in a stranger’s coat.`],endlessChosen:[`The crypt raises what’s left of an eyebrow. The torch stays lit.`],foldTaken:[`It takes the toll without counting it. The chamber looks away.`],ledgerExhausted:[`The book is full. Nothing left to write. The crypt admires thoroughness. It doesn’t pay for it.`],shareCopied:[`Copied. Post it somewhere the living can see.`]},bosses:{fewerTurns:{name:`The Burrower`,desc:`Three turns. Then the ceiling comes down.`,ruleName:`one fewer turn`,intro:`The floor buckles and the Burrower surfaces, chewing. It has been through the supports. Three turns before the chamber follows it down.`,taunts:[`Grit sifts from the ceiling. It isn’t decorative.`,`Something below grinds through stone. Patiently. Towards the middle.`],pressure:`The supports give a long, considered creak.`,defeat:`It withdraws. The ceiling reconsiders. For now.`,victory:`The chamber comes down. It was always going to. You were the last thing in it.`},threesVoid:{name:`The Ghoul`,desc:`Dice showing 3 score nothing.`,ruleName:`threes score nothing`,intro:`The Ghoul shuffles in, still chewing. Threes score nothing tonight. It ate them. It regrets nothing.`,taunts:[`It counts your dice with a wet clicking. The count comes up short.`,`It picks something from its teeth. It was a three.`],pressure:`It has stopped chewing. It’s watching the plate.`,defeat:`It slinks off to eat something less difficult. There’s a queue.`,victory:`It doesn’t rush. Nothing down here rushes a meal.`},oneReroll:{name:`The Basilisk`,desc:`One reroll per turn.`,ruleName:`one reroll only`,intro:`The Basilisk uncoils along the far wall and fixes you with the working eye. One reroll per turn. Its gaze discourages fidgeting.`,taunts:[`Don’t look at it. Don’t not look at it. There’s a knack.`,`The eye follows the dice. The dice have stopped misbehaving.`],pressure:`It has stopped blinking. It never started.`,defeat:`It closes the eye. A courtesy between professionals.`,victory:`You held its gaze one turn too long. The statues in the corner had the same idea.`},lockedDie:{name:`The Rat King`,desc:`It takes one die each turn.`,ruleName:`a die taken each turn`,intro:`The Rat King pours itself out of the wall. Keep an eye on your dice. It won’t help.`,taunts:[`A scraping in the walls. Your die is part of the hoard now.`,`Somewhere, small teeth click. That click used to be yours.`],pressure:`It’s already eyeing the rest of the set.`,defeat:`It returns the die. Slightly gnawed. Don’t ask.`,victory:`The whole bag, then. It always wanted the whole bag.`},sixesVoid:{name:`The Banshee`,desc:`Dice showing 6 score nothing.`,ruleName:`sixes score nothing`,intro:`The Banshee drifts in mid-note. Sixes score nothing tonight — her wail takes the high ones. It takes everything, eventually, but tonight it starts with the sixes.`,taunts:[`The note climbs. Your sixes lie down before it arrives.`,`She isn’t singing to you. That would be worse.`],pressure:`She inhales. The torches duck.`,defeat:`The note ends. The silence afterward is almost warm.`,victory:`The wail finds your pitch. Everyone has one.`},sealedEntries:{name:`The Tomb Spider`,desc:`Your two best open pages are webbed shut.`,ruleName:`two pages sealed`,intro:`The Tomb Spider descends without a sound and walks your grimoire like a landlord. Two of your best pages, webbed shut. Nothing personal. Everything is structural.`,taunts:[`The silk creaks. It’s rated for heavier readers than you.`,`It tests each strand twice. A professional.`],pressure:`It’s spinning again. Your name fits in a cocoon.`,defeat:`It unwraps one thing somewhere. It clearly pains it.`,victory:`Your delve hangs in the larder now. Neatly wrapped. It’s a tidy species.`},noRest:{name:`The Restless`,desc:`Holds don’t survive a reroll.`,ruleName:`holds reset each reroll`,intro:`The Restless drags itself in. Nothing rests near it. Not the dice. Not you. It’s been awake since before the crypt.`,taunts:[`It hasn’t blinked since you arrived. It has no eyelids. Still.`,`It rearranges its bones. There are too many.`],pressure:`It can wait forever. You have one turn.`,defeat:`It lies down. Just for a moment. Because of you.`,victory:`You’ll rest now. It won’t. That’s how it wins.`},theHouse:{name:`The Crypt`,desc:`Three turns. One reroll. Its stone, its rules.`,ruleName:`the crypt itself`,intro:`Nothing fills the doorway. The sarcophagus at the back is open, and always was. The crypt itself is playing tonight. It usually doesn’t bother.`,taunts:[`The empty air settles its weight into the chamber. The stone creaks.`,`The torches gutter. It isn’t the draft. There is no draft down here.`],pressure:`The walls lean in.`,defeat:`The stone is just stone again. For now.`,victory:`The crypt always keeps. Tonight it didn’t even have to dig.`},noReopens:{name:`The Embalmer`,desc:`Spent pages cannot be rewritten in this chamber — Blood Ink waits.`,ruleName:`no rewrites`,intro:`The Embalmer unrolls its kit beside your grimoire and paints every spent page with resin. What’s written is preserved. Preservation is the entire job.`,taunts:[`Resin sets. That’s rather the point of it.`,`Open it again? It’s embalmed, not drafted.`],pressure:`One turn. The seals have set.`,defeat:`It peels the resin back in one long strip. The pages breathe again. It files a complaint with no one.`,victory:`It wraps your last page with professional tenderness. Preserved. Forever is the standard package.`},firstRollTax:{name:`The Duelist`,desc:`Each unspent reroll costs 7 damage at write time (up to two).`,ruleName:`unspent rerolls cost damage`,intro:`The Duelist rises from its slab and salutes with what remains of a rapier. Ten thousand delvers, ten thousand first swings. It knows an unmeasured blow when it buries one.`,taunts:[`Striking at the first opening? There’s a shelf of delvers who did that. It dusts it personally.`,`It taps the blade twice on the stone. Measure. Then commit.`],pressure:`One turn. It has lowered its guard. Insultingly.`,defeat:`It salutes again, slower this time. Effort. The dead respect little else.`,victory:`It carves your total into the wall without looking. It has fought this hand before.`},kindsHalved:{name:`The Curator`,desc:`Chance, Three of a Kind, Four of a Kind and Yahtzee deal half in this chamber.`,ruleName:`chance and the kinds deal half`,intro:`The Curator drifts along the ossuary shelves, sorting knuckle from knuckle. Every heap ever carried down here has crossed its ledger. It is not impressed by volume.`,taunts:[`A pile. How inventive.`,`Anyone can stack bones. Show it an arrangement.`],pressure:`One turn. Your label is already drying.`,defeat:`It moves one femur a finger’s width and pronounces the shelf adequate. From it, that’s rapture.`,victory:`Filed under Derivative. The drawer was full. It made room.`},moneyTax:{name:`The Almoner`,desc:`At each of this chamber’s turns it collects 30% of your teeth.`,ruleName:`a tithe of teeth`,intro:`The Almoner makes its rounds with a copper bowl, patient as subsidence. The dead tithe. You’re close enough to count.`,taunts:[`A heavy pouch sinks a delver. It’s helping.`,`It isn’t theft. It’s upkeep. Someone maintains all this dark.`],pressure:`One turn. The bowl is already under your hands.`,defeat:`It bows and withdraws the bowl. What’s left of your teeth is yours again. The bow costs extra. It waives it.`,victory:`Your teeth go into the bowl uncounted. It never counts. It already knows.`},charmsVoid:{name:`The Reliquary Moth`,desc:`Held relics do nothing in its chamber.`,ruleName:`relics suspended`,intro:`The Reliquary Moth settles above the slab and opens its wings, and your relics go quiet, one by one. It eats the meaning out of things and leaves the things.`,taunts:[`Whatever that relic usually does, it’s been eaten out of it. The shape keeps.`,`Your relics are intact. So is a coat, after moths. Technically.`],pressure:`One turn. The wings stay open.`,defeat:`It folds its wings and lifts away, and the relics remember what they’re for. The air tastes of dust.`,victory:`It was never after the relics. Meaning comes in larger portions. Something that used to mean something leaves with it.`},facesCapped:{name:`The Third Knuckle`,desc:`No face counts past its third die in this chamber.`,ruleName:`nothing counts past three`,intro:`The Third Knuckle rises from the slab — a counting hand with three finger bones raised. It has counted everything that ever came down here, and it has never needed more than three.`,taunts:[`Three of a bone is a hand. Five is a hoard, and hoards stay.`,`It folds no fingers for you. It has none to spare.`],pressure:`One turn. Three bones. The hand does not open further.`,defeat:`The hand sinks back into the slab, and your dice count whole again. Somewhere below, it keeps counting.`,victory:`It counts you. One. That was always enough.`},theOwner:{name:`The Warden Below`,desc:`Three turns. One reroll. Your two best pages sealed. The stone itself is watching.`,ruleName:`three turns, one reroll, two seals — the last stair`,intro:`The stairs weren’t on any map. Neither is the chamber. It is already waiting, and the three shards on the stone have arranged themselves back into a key. “My crypt. My floor. One fight.”`,taunts:[`It doesn’t look at the dice. The dice look at it.`,`“Everything ends up here” — it says it like a landlord quoting the lease.`,`Above you, the halls have gone very quiet.`],pressure:`It turns the key face down. Whatever happens next is already carved.`,defeat:`It bows, and the door behind it unlocks. The crypt is yours — whatever that ends up meaning.`,victory:`“Thank you for gathering these.” The key folds itself into the dark. The stairs are gone by morning.`}},charms:{rabbitsFoot:{name:`Grave Rabbit’s Foot`,desc:`+1 reroll every turn. The rabbit is buried here. Most of it.`},pocketWatch:{name:`The Warden’s Hourglass`,desc:`+1 turn every fight. The sand runs slower for you now. It hasn’t noticed it’s gone.`},weightedFelt:{name:`Whetstone`,desc:`Every blow lands +10 harder. The edge remembers being sharpened.`},counterfeitStamp:{name:`Counterfeit Tooth`,desc:`Stock costs 1 tooth less. The merchant bites it. Says nothing.`},houseKey:{name:`Crypt Key`,desc:`Interest is capped at 10 teeth instead of 5. It opens a door you shouldn’t have.`},steadyHands:{name:`Steady Hands`,desc:`Glass dice shatter half as often. Dead calm. The good kind.`},ironNerves:{name:`Gallows Calm`,desc:`+15 to writes on your last turn. Panic is for the living.`},collectorsRing:{name:`Reliquary Ring`,desc:`Gilded dice pay 2 teeth instead of 1. It never leaves the finger. The finger came with it.`},sixthFinger:{name:`Sixth Finger`,desc:`Every six on the table pays +2 extra. Nobody counts a skeleton’s fingers twice.`},deepPockets:{name:`Burial Shroud`,desc:`Carry three held items instead of two. Don’t ask what else is wrapped in there.`},houseCut:{name:`Gravedigger’s Cut`,desc:`+2 teeth every fight you win. Skimmed, technically. From the dead, technically.`},silverTongue:{name:`Silver Tongue`,desc:`New stock costs 2 teeth instead of 5. The merchant likes you. Nominally. It’s his tongue.`},reservedSeat:{name:`Marked Grave`,desc:`Mark one die in your bag; it is always drawn. The plot has its name on it.`},gamblersOath:{name:`Dead Man’s Oath`,desc:`+1 reroll every turn, but winning a fight pays no base teeth. You swore something. It’s still listening.`},brittleCrown:{name:`Brittle Crown`,desc:`Glass dice count triple, and shatter twice as often. Wear it while it lasts. Everything here wore something once.`},crookedVisor:{name:`Cracked Skullcap`,desc:`+5 to every write, but a zero costs you 1 tooth. Seeing more has a price.`},openEnded:{name:`The Missing Step`,desc:`Straights may skip one number. The stair is missing a step. You’ve learned to.`},runningTab:{name:`Funeral March`,desc:`Straights pay +25. Order matters in a procession.`},scavenger:{name:`Scavenger`,desc:`After you write a zero, your next write pays ×1.5. Somebody has to eat the garbage. Down here there’s a queue.`},taxWriteOff:{name:`Estate Sale`,desc:`Every zero you write pays 2 teeth. The dead pay their own way. Properly filed.`},foreman:{name:`The Sexton`,desc:`Ones through Sixes count their dice double. He respects honest digging.`},invertedTable:{name:`The Overturned Slab`,desc:`Every die pays its opposite face — 1 as 6, 2 as 5, 3 as 4. The underside is worn smooth. Don’t ask by what.`},snakeCharmer:{name:`Worm Charmer`,desc:`Every 1 on the table adds +3 to the write. They listen to him. Only him.`},changeJar:{name:`The Offering Bowl`,desc:`Overkill pays 1 tooth per 10 surplus. The crypt keeps the change. The bowl keeps it first.`},momentum:{name:`Pallbearer’s Stride`,desc:`A third of your surplus carries into the next fight. A procession doesn’t stop for anyone.`},firstInstinct:{name:`First Instinct`,desc:`Each of this turn’s unspent rerolls adds +7 to the write. Anything in the wrappings doesn’t count. The first thought was correct. The dead confirm it.`},upTheSleeve:{name:`In the Wrappings`,desc:`Up to three unspent rerolls slip into the wrappings for your next turn. The warden checks. Never finds them.`},standingArrangement:{name:`Safe Passage`,desc:`Pass any chamber: 16 teeth, minus 2 for every turn you leave in it. A keeper’s chamber costs double, and it drops nothing. Deciding late is the expensive part. The crypt honors its own paper.`},assayer:{name:`Miser’s Bite`,desc:`Every scoring gilded die adds +6 to the write. Something bites each one before it counts. The marks stay.`}},items:{weightedFace:{name:`Graveweight`,desc:`Choose a die. Its lowest face becomes a six. The dead lean on it.`},loadedFace:{name:`Loaded Face`,desc:`Choose a die. Its lowest face becomes a copy of its highest — a ★ included, for the right price: forgeries of scarce things get scarce themselves. The merchant has seen this before. He was probably involved.`},ladderChisel:{name:`Tomb Chisel`,desc:`Choose a die. Its faces become 2·3·3·4·4·5. Steps, carved for climbing. Down, technically, but carved.`},wildFace:{name:`Wild Face`,desc:`Choose a die. Its lowest face becomes ★ — counts as any value, completes any pattern, worth 6 in sums. The price climbs with every ★ you already own. Carved from a knuckle that shouldn’t carve — the good ones get scarce.`},blankFace:{name:`Blind Face`,desc:`Choose a die. Its highest face becomes · — worth zero, breaks pairs and straights. For delvers who profit from garbage. The crypt doesn’t judge. Aloud.`},goldPlating:{name:`Gilded Bone`,desc:`Choose a die. Pays 1 tooth every turn you score. Whose tooth is not discussed.`},glassBlowing:{name:`Grave Glass`,desc:`Choose a die. Counts double. Shatters eventually. Everything down here does.`},ledgerStamp:{name:`Rune Stone`,desc:`Choose a page. It strikes harder from now on. The crypt notarizes reluctantly.`},freshInk:{name:`Blood Ink`,desc:`Held item. Rewrite one spent page mid-fight. Don’t ask whose.`},spareRoll:{name:`Spare Knuckle`,desc:`Held item. One extra reroll, when you need it most. You will.`},lastCall:{name:`The Passing Bell`,desc:`Held item. One more turn in this chamber. Rung for the dying, as a courtesy. Ring it yourself and save the staff a trip.`},anotherDie:{name:`A Stranger’s Die`,desc:`A plain die from the pile by the door, added to your bag. It doesn’t remember its owner. Neither will yours.`},retirement:{name:`Burial`,desc:`The merchant’s standing offer: he always buries dice.`},deedPiece:{name:`A Shard of the Key`,desc:`A third of an old key, broken deliberately. The lock it fits is below this floor. The merchant sells it without looking at it, or you.`}},rules:{quiet:{name:`A quiet floor`,desc:`Nothing moves. Officially.`},crowded:{name:`A restless floor`,desc:`Something waits between the chambers of every floor.`},glassblowers:{name:`The glassmaker’s shift`,desc:`Grave glass costs 2 teeth at the alcove.`},gift:{name:`A stocked tomb`,desc:`You start with Blood Ink and 3 teeth. Grave goods. Somebody’s.`},shortstack:{name:`Picked pockets`,desc:`You came in light — two teeth to your name. Something in the entrance hall is faster than you.`},taxman:{name:`The tollman’s floor`,desc:`Every price in the alcove runs a tooth heavier. Nobody argues with the tollman.`},overstocked:{name:`One bone too many`,desc:`You came in with an extra die. More to shed before the bag behaves.`},noSixes:{name:`The sixes were taken`,desc:`Someone was here first: every 6 on your dice has been ground down to a 1.`},openBar:{name:`A patient floor`,desc:`One more reroll every turn. The stone is in no hurry. Neither are you.`},lastOrders:{name:`The torch runs low`,desc:`One reroll a turn down here. Roll while you can still see.`}},events:{stranger:{name:`The Previous Owner`,text:`A dead man sits against the wall, in no hurry. His hand is open. There’s a die in it.`,option:(e,t,n)=>e===`take`?{label:`Take the die`,hint:n?`your bag is full`:`a used die joins your bag`}:{label:`Leave him be`},result:e=>e===`taken`?`It settles into the bag like it’s been there before. Perhaps it has. Perhaps you’ve met.`:`You leave it. His hand stays open. He can wait. He’s very good at it.`},doubleOrNothing:{name:`Grave Odds`,text:`Two skeletons dice by torchlight. They make room. Four or better and your wager comes back twice. Their hands are very clean. Bone-clean.`,option:(e,t,n)=>e===`wager`?n?{label:`Wager`,hint:`nothing to wager`}:{label:`Wager ${b(Number(t.wager??0))}`,hint:`4–6 doubles it, 1–3 takes it`}:{label:`Walk on`},result:(e,t)=>e===`won`?`A ${t.roll}. They pay ${b(Number(t.wager??0))}, and memorize your face. They have time.`:e===`lost`?`A ${t.roll}. The wager vanishes into a ribcage. So does the mood.`:`Wise. Boring, but wise. The skeletons return to their game. It never ends. That’s the point.`},debtCollector:{name:`The Tollman`,text:`He consults a ledger that isn’t yours and finds your name in it anyway. Everyone who comes down owes. Most pay on the way out. Most don’t leave.`,option:(e,t,n)=>e===`pay`?{label:`Pay ${b(Number(t.price??0))}`,...n?{hint:`you don’t have it`}:{}}:{label:`Refuse`,hint:`one fewer reroll next fight`},result:e=>e===`paid`?`Paid. Receipt? No. Receipts are for places with a way out.`:`He writes something down. The pen doesn’t need ink. Down here nothing does.`},lostProperty:{name:`Grave Goods`,text:`A niche in the wall, a shelf of things nobody came back for. The attendant doesn’t look up. He can’t. "One per delver."`,option:(e,t,n)=>e===`claim`?{label:`Claim something`,hint:n?`you can’t carry more`:`a random relic — previous owner nearby`}:{label:`Leave it`},result:(e,t)=>e===`claimed`?`${t.charmName}. It was labeled with a name. Not yours. Now it is.`:e===`heldOut`?`${t.charmName}. He holds it out, patient the way only the dead are. Your hands are full — something would have to stay behind.`:`The niche stays full. Somewhere behind the wall, something is relieved.`},freeDrink:{name:`The Last Toast`,text:`A cup stands on a coffin lid, freshly poured. Nobody pours drinks down here. Somebody did.`,option:e=>e===`drink`?{label:`Drink it`,hint:`+1 reroll next fight`}:{label:`Leave the cup`,hint:`+1 tooth — full cups fetch a price here`},result:e=>e===`drank`?`It burns pleasantly. Next fight, your hands are faster. Don’t ask what was in it. Or whose.`:`You set it back. Something pays you a tooth for the courtesy. You don’t see what.`},pawnbroker:{name:`The Ossuary Clerk`,text:`A hunched figure with a jeweler’s loupe looks at your bag the way the starving look at dinner. "Six teeth. For whichever one misses you least. The glazed and the gilded — those the catalogue prices higher."`,option:(e,t,n)=>{if(e!==`sell`)return{label:`Keep your dice`};if(n)return{label:`Sell a die`,hint:`the bag is empty — even the catalogue has limits`};let r=Number(t.price??0),i=Number(t.priceMax??0),a=r===i?b(r):`${r}–${b(i)}`;return{label:`Sell a die`,hint:t.last?`your LAST die, ${a} — he doesn’t ask what you’ll roll after`:t.premium?`a random glass or gold die, ${a} — the shine is in the catalogue`:`a random plain die, ${a}`}},result:(e,t)=>e===`sold`?`${b(Number(t.price??0))}, counted twice. The die doesn’t look back. Dice never do.`:e===`soldLast`?`${b(Number(t.price??0))}, counted twice — for the last one. He shelves it with the other things nobody came back for. You already know which shelf.`:`He shrugs. "Everyone comes back." Down here it isn’t a figure of speech.`},handyman:{name:`The Bone-Carver`,text:`He has a chisel, a steady hand, and no pulse. "Three teeth. Your worst face becomes a six. Somewhere."`,option:(e,t,n)=>e===`pay`?{label:`Pay ${b(Number(t.price??0))}`,hint:n?`you don’t have it`:`a random die’s lowest face becomes a six`}:{label:`Decline`},result:e=>e===`done`?`Three taps of the chisel. The die is better now. It doesn’t thank him either.`:`He nods and packs the chisel away. "They all decline once."`},notary:{name:`The Keeper of Keys`,text:`A thin figure with a lockbox that locks twice. Inside, on velvet: a broken piece of iron. The lock it fits is below your feet. "Not for sale. Except tonight, to you, apparently."`,option:(e,t,n)=>e===`buy`?t.soldOut?{label:`Buy the shard`,hint:`the lockbox is empty tonight`}:{label:`Pay ${b(Number(t.price??0))}`,hint:n?`you don’t have it`:`a shard of the key`}:{label:`Walk past`},result:(e,t)=>e===`bought`?Number(t.have)>=Number(t.total)?`The shard fits the others exactly. Somewhere below you, a lock that didn’t exist clears its throat.`:`He counts the teeth twice and hands it over. ${t.have} of ${t.total}. He doesn’t say what it’s a third of. You know.`:`He closes the box. Both locks. "Somebody always buys. Eventually the crypt inherits it back."`},seance:{name:`The Medium`,text:`A woman at a corner slab is mid-conversation with the wall. Down here, the wall answers. She stops, looks at you, and offers to rearrange something.`,option:e=>e===`let`?{label:`Let her`,hint:`a random page levels up`}:{label:`Leave the slab`},result:(e,t)=>e===`done`?`${t.catName} strikes harder now. She won’t say why, and the wall won’t either.`:`She was mid-conversation anyway. It wasn’t with you. It was about you.`}},ui:{wordmarkHtml:`

    <span class="w2"><em>of</em> Dice</span>`,scoreLabel:`dealt`,targetLabel:`enemy hp`,turnsLabel:`turns`,backTag:`the ossuary · double loot`,dangerTag:`last turn — it strikes back`,restoringHint:`Point to a spent page. I will look away.`,ledgerTitle:`The Grimoire`,ledgerNote:`pages stay spent until the floor ends`,shopTitle:`The Merchant`,pockets:{label:`the pouch`,emptySlot:`empty`,emptyTip:`Room for one more. The merchant sells things worth carrying down.`,heldNote:`one in the pouch already`,fullNote:`pouch full`},choice:{flavor:`Two stairways go down. The crypt doesn’t care. The crypt gets everyone either way.`,caption:`what stands in the way`,floorTitle:`The Halls`,floorDesc:`The usual chambers. The usual arithmetic.`,floorPay:`4 teeth a fight, plus what you don’t waste`,backTitle:`The Ossuary`,backDesc:`Half again harder. The dark is load-bearing down there.`,backPay:`8 teeth a fight, bonuses doubled`,qNote:`? — something waits on this stair`},sitDown:`Step in`,reward:{title:`It drops something`,flavor:`Take one. Everything here came from somewhere. Don’t dwell.`,fullNote:`hands full — you’ll let one go`,moneyBtn:e=>`Take ${b(e)} instead`,shardBtn:(e,t)=>`Take what fell from its ribs — a shard of a key (${e}/${t})`},replace:{title:`Make room`,flavor:e=>`Five is the limit. The crypt counted. <strong>${e}</strong> lies on the slab — choose what you leave behind. Or don’t.`,cancel:`Think better of it — keep what you carry`},deedChip:{tip:`Shards of a broken key. The lock is below the last floor. Nobody has said what it opens. Nobody has needed to.`,label:(e,t)=>`Key ${e}/${t}`},payout:{stamp:`settled`,title:`It stopped moving`,toCounter:`To the merchant`,rows:{base:`Fight payout`,unusedTurns:`Unused turns`,interest:`Hoard interest`,changeJar:`The offering bowl`,blackout:`The blackout — not one honest face all floor`,total:`Total`},surplusCarry:(e,t)=>`overkill by ${e} — ${t} carries to the next fight`,surplusJar:(e,t)=>`overkill by ${e} — the bowl catches ${b(t)}`,surplusHouse:e=>`overkill by ${e} — the crypt keeps the change`},folded:{stamp:`passed`,title:`Chamber passed`,result:`The warden looks away. Nothing is paid, nothing carries — the delve simply continues.`},runOver:{stamp:`interred`,title:`The delve ends`,result:(e,t,n,r,i)=>`Fell on floor ${e}, chamber ${t} · ${n} dealt in total · short of ${r} by ${i}`,again:`Crawl back down`,echoLastCall:e=>`One more turn was ${e} away. The merchant would have sold it.`,echoUnused:`The Passing Bell was in your pack the whole time. The crypt counts what you didn’t ring.`,soldOutResult:(e,t,n,r)=>`Reached floor ${e}, chamber ${t} · ${n} dealt in total · ${r} in the pouch — and not one die to roll`},runWon:{stamp:`daylight`,ownerStamp:`keys surrendered`,title:`The gate opens`,ownerTitle:`The crypt is yours`,result:(e,t,n)=>`All ${e} floors cleared · ${t} dealt · ${n} to your name`,ownerResult:(e,t)=>`The Warden yielded. ${e} dealt · ${t} — and the stone.`,walk:`Walk out blinking`,walkSub:`Bank it. Delve again.`,ownerWalkSub:`Lock the gate on your way out.`,stairs:`Take the last stair`,stairsSub:`Three shards make a key. The Warden is below.`,endless:`Stay below`,endlessSub:`Push your luck — endless.`,endlessBookSub:(e,t)=>`The re-bound grimoire keeps writing — your deepened ${e} dealt ${t} last floor.`},bookBeat:{stamp:`re-bound`,title:`The grimoire is full`,ledgerCap:`Every page, deepened — for the rest of the delve`,fee:e=>`+${e} — the binding fee`,deed:`And a shard of the key — earned, not bought.`,carryOn:`Carry on`},shortBy:e=>`Short by ${e}. Margins are how the crypt eats.`,share:{ownerWon:(e,t)=>`I own the crypt now. Found the key, took the last stair, beat the Warden — ${e} dealt. Crypt of Dice.${t}`,ownerLost:(e,t)=>`I found the whole key and took the last stair. The Warden kept it — ${e} dealt. Crypt of Dice.${t}`,won:(e,t)=>`I walked out of the crypt. Eight floors, ${e} dealt. Crypt of Dice.${t}`,endless:(e,t,n)=>`I beat Crypt of Dice, stayed below anyway, and made it to floor ${e} — ${t} dealt.${n}`,boss:(e,t,n,r)=>`${e} kept me on floor ${t} — ${n} in the grimoire. Crypt of Dice.${r}`,lost:(e,t,n)=>`The crypt kept my dice on floor ${e} — ${t} in the grimoire. Crypt of Dice.${n}`,dare:` Same delve, same dice — beat it: `},card:{title:`🎲 Crypt of Dice`,night:(e,t)=>`Night №${e} (${t})`,fell:(e,t,n)=>n?`☠ fell on floor ${e}, chamber ${t} — ${n} kept the dice`:`☠ fell on floor ${e}, chamber ${t} — the crypt kept the dice`,cleared:e=>`🏆 walked out blinking — all ${e} floors cleared`,endless:e=>`♾ beat the crypt, stayed below anyway — made it to floor ${e}`,stats:(e,t,n)=>[`${e} dealt`,...t>0?[`${t} wild face${t===1?``:`s`}`]:[],`${n} still in the pouch`].join(` · `),secondSitting:e=>`(descent №${e} — the first one counted)`,link:e=>`same delve, dealt fresh: ${e}`,actions:{share:`Share the delve`,copy:`Copy the card`}},daily:{offer:e=>`Tonight’s Delve — Night №${e}`,chip:`tonight`,chipSeated:`in tonight’s delve`,flavor:`The crypt keeps a special descent on weeknights. Everyone falls into the same one — the first descent is the one that counts.`,sat:e=>`${e} took the stair tonight`,done:`first descent settled ✓`,again:`a second descent — the card will say so`,seated:`you’re down there right now`,sit:`Take the stair`,not:`Not tonight`,back:`Back to the chamber`,offerSub:`The same dark for everyone. First descent counts.`,forfeit:`Taking the stair forfeits the delve in progress — the crypt won’t record it.`,recordTag:e=>`daily №${e}`,secondTag:`second descent`},help:{title:`The rules of the deep`,flavor:`The warden explains. Once.`,rulesHtml:`
        <h3>The arrangement</h3>
        <p>Every chamber holds an enemy: deal <strong>its HP</strong> in damage
           before your <strong>4 turns</strong> run out or the delve is over.
           A delve is 8 floors of 3 chambers; the third chamber of each floor
           belongs to <strong>the floor's keeper</strong> — a creature with a
           rule of its own: fewer turns, worthless threes, webbed-up pages.
           The map (top right) shows what's waiting.</p>
        <h3>A turn</h3>
        <p>Five dice are drawn from your bag and rolled. Click dice to
           <strong>hold</strong> them, reroll the rest up to twice, then write
           the result into a page of the grimoire. The page decides the damage —
           straights, of-a-kinds, sixes, and so on. The number next to each
           open page is what your current dice would deal there.</p>
        <h3>The grimoire</h3>
        <p>Each page is written <strong>once per floor</strong> — it stays
           spent for all 3 chambers. Sometimes you must write a zero into
           something you loved. The crypt calls this character-building.</p>
        <h3>The stairways</h3>
        <p>Each new floor, two stairs go down: <strong>the halls</strong>
           (standard enemies, standard loot) or <strong>the ossuary</strong>
           (half again tougher, double loot). Choose by how much your engine
           can carry.</p>
        <h3>Relics</h3>
        <p>Passive relics with lasting effects — you can carry five. Keepers
           drop them, the merchant keeps one under the slab sometimes, and
           grave goods find new owners.</p>
        <h3>The merchant</h3>
        <p>Teeth buy improvements between fights: carve dice faces, gild
           dice (a tooth per scored turn) or blow them in <strong>grave
           glass</strong> (counts double, shatters eventually), or set rune
           stones so pages strike harder. Savings earn interest: a tooth
