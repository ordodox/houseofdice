tch.`,`Bold. Wrong, but bold.`],scoredBig:[`The dealer counts it three times. It stands. Annoyingly.`,`Hm. The house will remember that.`,`Decent. Don’t let it become a habit.`],lastTurn:[`Last turn. The ledger is patient. The target isn’t.`,`One turn left. The house is already counting.`,`Last chance. The chair behind you is suddenly occupied.`],lastReroll:[`That was your last reroll. Now we see who you really are.`,`No more rerolls. The dice are done apologizing.`,`Last one spent. The dealer settles in to watch.`],needle:[`Rolling harder doesn’t help. Players always try.`,`The dice owe you nothing. They’ve made that clear.`,`Take your time. The house has all of it.`,`The dealer stifles a yawn. Poorly.`],richPlayer:[`Quite a pile you’re building. It’s not yours. Not really.`,`Heavy pockets. The house offers to lighten them.`],holdQuip:[`Sentimental.`,`That one? If you say so.`,`A firm grip. The dice notice.`],overkill:[`Showing off is free. Everything else isn’t.`,`The house counts it twice. It’s still absurd.`,`Yes, yes. Very impressive. Sit down.`],buyGlass:[`Mind the edges. The last owner didn’t.`,`Glass. Brave. It counts double until it doesn’t.`],buyGold:[`Gold. It bites like a coin should.`,`Plated. Now it works for you. Loosely speaking.`],newRound:[`A fresh round. The ledger remembers, even if you don’t.`,`The same table. Fewer options. This is called progress.`],chooseFloor:[`The floor. Sensible. The house respects caution. It pays it less.`,`The floor it is. Nothing wrong with surviving.`],chooseBack:[`The back room. The door locks behind you. That’s just the draft.`,`The back room. The dealer follows you in and doesn’t say why.`],newAct:[`The ledger turns a page. Clean entries. Old debts.`,`A new act. The ink from the last one is still drying.`],bossIntro:[`A regular takes the seat opposite. The room gets quieter.`,`The house brings its own player. Standard procedure.`,`Someone important is watching. The stakes adjust themselves.`],roundWon:[`The house pays. Reluctantly.`,`Counted twice. It’s correct. Unfortunately.`,`Your winnings. Try not to spend them here. You will.`],shop:[`The counter opens. Almost everything was someone’s.`,`The dealer arranges the stock. Some of it arranges itself.`,`Browse. The prices are firm. The dealer is firmer.`],shopReroll:[`The dealer sighs, sweeps the counter, and produces different junk.`,`New stock. Same provenance. Don’t ask.`],purchase:[`Sold. There is no word for refund here.`,`A pleasure doing business. For one of us.`,`It’s yours now. That works in both directions.`],retire:[`It is taken somewhere quieter. The bag is lighter.`,`Retired. The other dice don’t mention it.`],shatter:[`A glass die returns to sand. The house does not sweep.`,`It shattered. It was always going to. The dealer nods.`],restore:[`The ink is still wet. The entry never happened.`,`Rewritten. The ledger holds no grudges. The house does.`],spareRoll:[`One extra roll. The dealer pretends not to see.`],runOver:[`It was never going to hold.`,`You’re out. The table keeps your dice. House policy.`,`The ledger closes. It had your name in it before you arrived.`],runWon:[`The house is… surprised.`,`Paid in full. Never come back.`,`You’ve won. Management would like a word.`],customNight:[`The numbers on the wall are different tonight. Management approved it. Allegedly.`],resumed:[`You left mid-hand. The table waited. It’s good at that.`],letGo:[`Let go. The shelf doesn’t mourn. Neither does the house.`],cancelReplaceReward:[`Changed your mind? The regular is still waiting.`],cancelReplaceShop:[`Back on the shelf. The dealer pretends not to notice.`],upperBonus:[`All six faces accounted for. The house pays a bookkeeping bonus. Grudgingly.`],fullBook:[`The book is full. Every line. The house, quietly impressed, produces another — and $10 for the binding.`],walkedOut:[`You walked out. The door didn’t stop you. Doors never do.`],endlessChosen:[`The house raises an eyebrow. The chair stays warm.`],foldTaken:[`He takes it without counting it. The table looks away.`],ledgerExhausted:[`The ledger is full. Nothing left to write. The house admires thoroughness. It doesn’t pay for it.`],shareCopied:[`Copied. Post it somewhere the house can see.`]},u={rabbitsFoot:{name:`Rabbit’s Foot`,desc:`+1 reroll every turn. The rabbit had four. This is the last one.`},pocketWatch:{name:`The Doorman’s Watch`,desc:`+1 turn every round. He hasn’t noticed it’s gone.`},weightedFelt:{name:`Weighted Felt`,desc:`Every ledger entry pays +10. The table tilts your way. Slightly.`},counterfeitStamp:{name:`Counterfeit Stamp`,desc:`Shop items cost $1 less. The dealer knows. The dealer doesn’t care.`},houseKey:{name:`House Key`,desc:`Interest is capped at $10 instead of $5. It opens a door you shouldn’t have.`},steadyHands:{name:`Steady Hands`,desc:`Glass dice shatter half as often. Yours now. Steady.`},ironNerves:{name:`Iron Nerves`,desc:`+15 to writes on your last turn. Panic is for other people.`},collectorsRing:{name:`Collector’s Ring`,desc:`Gold dice pay $2 instead of $1. It never leaves the finger. It can’t.`},sixthFinger:{name:`Sixth Finger`,desc:`Every six on the table pays +2 extra. Nobody counts your fingers twice.`},deepPockets:{name:`Deep Pockets`,desc:`Carry three held items instead of two. Don’t ask what else is in there.`},houseCut:{name:`The House’s Cut`,desc:`+$2 every round you win. Skimmed, technically. From the house, technically.`},silverTongue:{name:`Silver Tongue`,desc:`New shop stock costs $2 instead of $5. The dealer likes you. Nominally.`},reservedSeat:{name:`Reserved Seat`,desc:`Mark one die in your bag; it is always drawn. The chair has its name on it.`},gamblersOath:{name:`Gambler’s Oath`,desc:`+1 reroll every turn, but winning a round pays no base money. You swore something. It listened.`},brittleCrown:{name:`Brittle Crown`,desc:`Glass dice count triple, and shatter twice as often. Wear it while it lasts.`},crookedVisor:{name:`Crooked Visor`,desc:`+5 to every write, but a zero costs you $1. Seeing more has a price.`},openEnded:{name:`Open-Ended`,desc:`Straights may skip one number. The house frowns. The rule stands.`},runningTab:{name:`Running Tab`,desc:`Straights pay +25. Order is worth something in a place like this.`},scavenger:{name:`Scavenger`,desc:`After you write a zero, your next write pays ×1.5. Somebody has to eat the garbage.`},taxWriteOff:{name:`Tax Write-Off`,desc:`Every zero you write pays $2. Losses, properly filed, are earnings.`},foreman:{name:`The Foreman`,desc:`Ones through Sixes count their dice double. He respects honest work.`},invertedTable:{name:`The Inverted Table`,desc:`Every die pays its opposite face — 1 as 6, 2 as 5, 3 as 4. The felt on the other side is worn smooth.`},snakeCharmer:{name:`Snake Charmer`,desc:`Every 1 on the table adds +3 to the write. They listen to him. Only him.`},changeJar:{name:`The Change Jar`,desc:`Overshooting a target pays $1 per 10 surplus points. The house keeps the change. The jar keeps it first.`},momentum:{name:`Momentum`,desc:`A third of your surplus carries into the next round’s score. A table remembers how you left it.`},firstInstinct:{name:`First Instinct`,desc:`Each of this turn’s unspent rerolls adds +7 to the write. Anything up a sleeve doesn’t count. The first thought was correct. It usually is, here.`},upTheSleeve:{name:`Up the Sleeve`,desc:`Up to three unspent rerolls slip up the sleeve for your next turn. The dealer checks. Never finds them.`},standingArrangement:{name:`The Standing Arrangement`,desc:`Fold any table: $16, minus $2 for every turn you leave on it. A regular’s chair costs double, and he leaves nothing behind. Deciding late is the expensive part. The house holds its own paper.`}},d={weightedFace:{name:`Weighted Face`,desc:`Choose a die. Its lowest face becomes a six. Standard craftsmanship.`},loadedFace:{name:`Loaded Face`,desc:`Choose a die. Its lowest face becomes a copy of its highest — a ★ included, for the right price: forgeries of scarce things get scarce themselves. The dealer has seen this before.`},ladderChisel:{name:`Ladder Chisel`,desc:`Choose a die. Its faces become 2·3·3·4·4·5. Made for climbing.`},wildFace:{name:`Wild Face`,desc:`Choose a die. Its lowest face becomes ★ — counts as any value, completes any pattern, worth 6 in sums. The price climbs with every ★ you already own. Whittled from something that shouldn’t whittle — the good ones get scarce.`},blankFace:{name:`Blank Face`,desc:`Choose a die. Its highest face becomes · — worth zero, breaks pairs and straights. For players who profit from garbage. The house doesn’t judge. Aloud.`},goldPlating:{name:`Gold Plating`,desc:`Choose a die. Pays $1 every turn you score. The tooth it was pulled from is not discussed.`},glassBlowing:{name:`Glass Blowing`,desc:`Choose a die. Counts double. Shatters eventually. Everything does.`},ledgerStamp:{name:`Ledger Stamp`,desc:`Choose a ledger entry. It pays better from now on. The house notarizes reluctantly.`},freshInk:{name:`Fresh Ink`,desc:`Held item. Rewrite one spent ledger entry mid-round. Forgery is a strong word.`},spareRoll:{name:`Spare Roll`,desc:`Held item. One extra reroll, when you need it most. You will.`},anotherDie:{name:`Another Die`,desc:`A plain die, added to your bag. Honest work. It won’t stay honest.`},retirement:{name:`Retirement`,desc:`The dealer’s standing offer: he always buys dice.`},deedPiece:{name:`A Piece of the Deed`,desc:`A third of an old document, torn deliberately. The address on it is this address. The dealer sells it without looking at it, or you.`}},ee={quiet:{name:`A quiet night`,desc:`Nothing unusual. Officially.`},crowded:{name:`A crowded night`,desc:`Something waits between the tables of every act.`},glassblowers:{name:`The glassblowers’ night`,desc:`Glass blowing costs $2 at the counter.`},gift:{name:`A welcoming night`,desc:`You start with Fresh Ink and $3. Nothing is free. This isn’t either.`},shortstack:{name:`A short night`,desc:`You sat down light — two dollars to your name. The house prefers it that way.`},taxman:{name:`The taxman’s in`,desc:`Every price at the counter runs a dollar heavier. Nobody argues with the taxman.`},overstocked:{name:`One too many`,desc:`You came in with an extra die. More to shed before the bag behaves.`}},f={fewerTurns:{name:`The Doorman`,desc:`Three turns. He closes the table early.`,ruleName:`one fewer turn`,intro:`The Doorman sits down and checks his watch. Three turns. He has somewhere to be. He always has somewhere to be.`,taunts:[`He looks at his watch. Then at you. Then at his watch.`,`He taps the table twice. Time is one of the things you owe.`],pressure:`He’s already standing. One turn, then the door.`,defeat:`He holds the door open. For once, for you.`,victory:`“Closing time.” The door was always going to win.`},threesVoid:{name:`The Accountant`,desc:`Dice showing 3 score nothing.`,ruleName:`threes score nothing`,intro:`The Accountant sits down. Threes score nothing tonight. Don’t ask. He’s been through a lot.`,taunts:[`He recounts your score without being asked. It’s lower his way.`,`He mutters something about threes. Old grief.`],pressure:`He’s already drafted the deficit report.`,defeat:`He initials your win and files it under Irregularities.`,victory:`He balances the books. You were the remainder.`},oneReroll:{name:`The Collector`,desc:`One reroll per turn.`,ruleName:`one reroll only`,intro:`The Collector sits down. One reroll per turn. He finds second chances distasteful.`,taunts:[`He watches your reroll the way a landlord watches a lease.`,`“Spend it wisely.” He means the reroll. He means everything.`],pressure:`He’s clearing a space on his shelf. Player-shaped.`,defeat:`“Kept dice, kept promises.” He tips an invisible hat.`,victory:`You’re catalogued now. Shelf four. Don’t struggle.`},lockedDie:{name:`The Magpie`,desc:`She takes one die each turn.`,ruleName:`a die locked each turn`,intro:`The Magpie sits down. Keep an eye on your dice. It won’t help.`,taunts:[`She’s humming. Your die is part of the song now.`,`Her pockets clink. That clink used to be yours.`],pressure:`She’s already eyeing the rest of the set.`,defeat:`She returns the die. Slightly warmer. Don’t ask.`,victory:`The whole bag, then. She always wanted the whole bag.`},sixesVoid:{name:`The Widow`,desc:`Dice showing 6 score nothing.`,ruleName:`sixes score nothing`,intro:`The Widow sits down. Sixes score nothing tonight. They remind her of someone.`,taunts:[`She turns a six face-down when you’re not looking. You were looking.`,`She says nothing. The veil says it for her.`],pressure:`She’s dressed for an ending. Yours will do.`,defeat:`A small nod under the veil. Someone would have liked you.`,victory:`She adds a bead to the necklace. It’s not a pearl.`},sealedEntries:{name:`The Censor`,desc:`Your two best open entries are sealed.`,ruleName:`two entries sealed`,intro:`The Censor sits down and crosses out your favourites. Nothing personal. Everything is personal.`,taunts:[`The stamp hovers over your ledger like weather.`,`“Redacted” is his favourite word. He has exactly one favourite word.`],pressure:`He’s inking the stamp. Your name fits under it.`,defeat:`He un-crosses one word somewhere. It clearly hurts him.`,victory:`Your run is a footnote now. The footnote is sealed.`},noRest:{name:`The Insomniac`,desc:`Holds don’t survive a reroll.`,ruleName:`holds reset each reroll`,intro:`The Insomniac sits down. Nothing rests near him. Not the dice. Not you.`,taunts:[`He hasn’t blinked since you sat down. He’s counting on you to.`,`He rearranges his coffee cups. There are eleven.`],pressure:`He can wait forever. You have one turn.`,defeat:`He closes his eyes. Just for a second. Because of you.`,victory:`You’ll sleep tonight. He won’t. That’s how he wins.`},theHouse:{name:`The House`,desc:`Three turns. One reroll. Its table, its rules.`,ruleName:`the house`,intro:`The chair opposite stays empty. The house itself is playing tonight. It usually doesn’t bother.`,taunts:[`The empty chair creaks. Nothing shifted its weight.`,`The lamp flickers. It isn’t the wiring.`],pressure:`The room leans in.`,defeat:`The chair is just a chair again. For now.`,victory:`The house always wins. Tonight it didn’t even have to try.`},theOwner:{name:`The Owner`,desc:`Three turns. One reroll. Your two best entries sealed. The building itself is watching.`,ruleName:`three turns, one reroll, two seals — upstairs`,intro:`The stairs weren’t on any floor plan. Neither is the room. He is already seated, and the three pieces of paper on the felt have arranged themselves back into a deed. “My property. My table. One hand.”`,taunts:[`He doesn’t look at the dice. The dice look at him.`,`“The house always wins” — he says it like a man quoting his own signature.`,`Downstairs, the parlor has gone very quiet.`],pressure:`He turns the deed face down. Whatever happens next, it’s already filed.`,defeat:`He signs without a word. The pen is warm. The house is yours — whatever that ends up meaning.`,victory:`“Thank you for collecting these.” The deed folds itself into his pocket. The stairs are gone by morning.`}},p=e=>Number(e??0),m={stranger:{name:`The Stranger`,text:`A man you haven’t seen before is suddenly beside you. He offers a die. He doesn’t say from where.`,option:(e,t,n)=>e===`take`?{label:`Take the die`,hint:n?`your bag is full`:`a used die joins your bag`}:{label:`Decline`},result:e=>e===`taken`?`It settles into the bag like it’s been there before. Perhaps it has.`:`He nods, pockets it, and asks the next table. Someone always says yes.`},doubleOrNothing:{name:`Double or Nothing`,text:`A side table, one die, one roll. Four or better and your wager comes back twice. The man running it has very clean hands.`,option:(e,t,n)=>e===`wager`?n?{label:`Wager`,hint:`nothing to wager`}:{label:`Wager $${p(t.wager)}`,hint:`4–6 doubles it, 1–3 takes it`}:{label:`Walk away`},result:(e,t)=>e===`won`?`A ${p(t.roll)}. The house pays $${p(t.wager)}, and memorizes your face.`:e===`lost`?`A ${p(t.roll)}. The wager vanishes. So does his smile.`:`Wise. Boring, but wise. The man’s hands stay folded.`},debtCollector:{name:`The Debt Collector`,text:`He consults a ledger that isn’t yours and finds your name in it anyway. You owe. Everyone owes.`,option:(e,t,n)=>e===`pay`?{label:`Pay $${p(t.price)}`,...n?{hint:`you don’t have it`}:{}}:{label:`Refuse`,hint:`one fewer reroll next round`},result:e=>e===`paid`?`Paid. Receipt? No. There are no receipts here.`:`He writes something down. The pen doesn’t need ink.`},lostProperty:{name:`Lost Property`,text:`A hatch in the wall, a shelf of things nobody came back for. The attendant doesn’t look up. "One per patron."`,option:(e,t,n)=>e===`claim`?{label:`Claim something`,hint:n?`you can’t carry more`:`a random charm — previous owner unknown`}:{label:`Leave it`},result:(e,t)=>e===`claimed`?`${t.charmName}. It was labeled with a name. Not yours. Now it is.`:`The hatch closes. Somewhere behind it, something is relieved.`},freeDrink:{name:`On the House`,text:`The dealer slides a glass across the felt. You didn’t order it. Nobody orders it.`,option:e=>e===`drink`?{label:`Drink it`,hint:`+1 reroll next round`}:{label:`Slide it back`,hint:`+$1 — he sells it twice`},result:e=>e===`drank`?`It burns pleasantly. Next round, your hands are faster. Don’t ask what was in it.`:`He pockets it, pours it back, and sells it to the next chair. You get a cut.`},pawnbroker:{name:`The Pawnbroker`,text:`A hunched man with a jeweler’s loupe looks at your bag the way other men look at dinner. "Six dollars. For whichever one misses you least."`,option:(e,t,n)=>e===`sell`?{label:`Sell a die`,hint:n?`nothing he wants`:`a random plain die, $${p(t.price)}`}:{label:`Keep your dice`},result:e=>e===`sold`?`Six dollars, counted twice. The die doesn’t look back. Dice never do.`:`He shrugs. “Everyone comes back.” He returns to his loupe.`},handyman:{name:`The Handyman`,text:`He has a chisel, a steady hand, and no questions. "Three dollars. Your worst face becomes a six. Somewhere."`,option:(e,t,n)=>e===`pay`?{label:`Pay $${p(t.price)}`,hint:n?`you don’t have it`:`a random die’s lowest face becomes a six`}:{label:`Decline`},result:e=>e===`done`?`Three taps of the chisel. The die is better now. It doesn’t thank him either.`:`He nods and packs the chisel away. “They all decline once.”`},notary:{name:`The Notary`,text:`A thin man with a briefcase that locks twice. Inside, under glass: a torn piece of paper. The address on it is this address. "Not for sale. Except tonight, to you, apparently."`,option:(e,t,n)=>e===`buy`?t.soldOut?{label:`Buy the piece`,hint:`the briefcase is empty tonight`}:{label:`Pay $${p(t.price)}`,hint:n?`you don’t have it`:`a piece of the deed`}:{label:`Walk past`},result:(e,t)=>e===`bought`?p(t.have)>=p(t.total)?`The piece fits the others exactly. Somewhere above you, a door that didn’t exist gets a hinge.`:`He counts the money twice and hands it over. ${p(t.have)} of ${p(t.total)}. He doesn’t say what it’s a third of. You know.`:`He closes the case. Both locks. “Somebody always buys. Eventually the house buys it back.”`},seance:{name:`The Séance`,text:`A woman at a corner table is speaking to an empty chair. She stops, looks at you, and offers to rearrange something.`,option:e=>e===`let`?{label:`Let her`,hint:`a random ledger entry levels up`}:{label:`Leave the table`},result:(e,t)=>e===`done`?`${t.catName} pays better now. She won’t say why, and you won’t ask.`:`She was mid-conversation anyway. It wasn’t with you.`}},te={wordmarkHtml:`

        <h3>The arrangement</h3>
        <p>Beat the <strong>target score</strong> each round or the run is over.
           You get <strong>4 turns</strong> per round. A run is 8 acts of
           3 rounds; the third round of each act, <strong>a regular</strong>
           sits in with a house rule of their own — fewer turns, worthless
           threes, sealed entries. Check the map (click the act, top right)
           to see who's waiting.</p>
        <h3>A turn</h3>
        <p>Five dice are drawn from your bag and rolled. Click dice to
           <strong>hold</strong> them, reroll the rest up to twice, then write
           the result into a ledger entry. The entry decides the score —
           straights, of-a-kinds, sixes, and so on. The number shown next to
           each open entry is what your current dice would pay there.</p>
        <h3>The ledger</h3>
        <p>Each entry is written <strong>once per act</strong> — it stays spent
           for all 3 rounds. Sometimes you must write a zero into something
           you loved. The house calls this character-building.</p>
        <p>The upper section holds two contracts: complete <strong>all six of
           Ones–Sixes without a zero</strong> and the house pays half the
           table's target on the spot — or end the act with <strong>every
           upper blank or zeroed</strong> (the blackout) for a cash bonus at
           the boss settlement. Pick a pole, or neither.</p>
        <h3>The tables</h3>
        <p>Each new act, two tables have a seat open: <strong>the floor</strong>
           (standard targets, standard pay) or <strong>the back room</strong>
           (targets half again higher, double payout). Choose by how much
           your engine can carry.</p>
        <h3>Charms</h3>
        <p>Passive relics with lasting effects — you can carry five. There is
           more than one way to come by them: beat a <strong>regular</strong>
           and they leave one behind, the dealer sometimes has one in the
           drawer, and lost property finds new owners.</p>
        <h3>The counter</h3>
        <p>Winnings buy improvements between rounds: carve dice faces, plate
           dice in <strong>gold</strong> (pays $1 per scored turn) or blow them
           in <strong>glass</strong> (counts double, shatters eventually), or
           stamp ledger entries so they pay better. Savings earn interest:
           $1 per $5 held.</p>
        <p>You own <strong>7 dice</strong> but only <strong>5 are drawn</strong>
           each turn, at random. Retire dice to see your good ones more often;
           add dice for raw power at the cost of consistency. The bag is the
           build.</p>
        <h3>At the table</h3>
        <p><strong>R</strong> or <strong>Space</strong> rolls, <strong>1–5</strong>
           hold dice, <strong>Backspace</strong> releases them right to left,
           <strong>Esc</strong> backs out. Your run is saved —
           close the tab and the table waits.</p>
        <h3>Held items</h3>
        <p>You can carry two. <strong>Fresh Ink</strong> rewrites a spent ledger
           entry mid-round. <strong>Spare Roll</strong> is a reroll for when it
           matters. There are no refunds. There is no word for refund here.</p>`,close:`Understood`,backOffice:`the back office`,backOfficeTip:`Every number in the house, editable. Deal a night on your own terms.`},leave:{title:`Walk out?`,flavor:`Mid-run. The ledger will remember where you stopped. It remembers everything else too.`,stay:`Stay seated`,go:`Walk out`},resume:{title:`The table waited`,flavor:`Your run is where you left it. Chips, dice, debts. Mostly debts.`,sit:`Sit back down`,walk:`Walk away`},notice:{title:`Notice from management`,flavor:`Posted on the door. Reading it is optional. It always is.`},recordsModal:{title:`House records`,flavor:`The house remembers everyone.`,empty:`No runs on the books yet. The ledger waits. It’s good at that.`,boardTitle:`House records`,recentTitle:`Recent nights`},map:{title:`The evening ahead`,flavor:`Each circle is a table; the number is the score it

    <path d="M58 65 L58 76 M58 71 L62 71 M58 75 L61 75" stroke="${S}" stroke-width="2.5" stroke-linecap="round"/>`)},O=(e,t,n,r=0,i=`sine`)=>({freq:e,peak:t,decay:n,at:r,type:i}),he={den:b,dungeon:{id:`dungeon`,terms:{title:`Crypt of Dice`,money:x,floorName:`the halls`,backName:`the ossuary`,actName:`floor`,runName:`delve`},objective:`hp`,art:{host:le,logo:ue,deed:de,item:fe,consumable:pe,bossPortrait:me},sounds:{win:[O(220,.07,.6),O(330,.035,.7,.02),O(110,.07,1.1,.14)],lose:[O(146.83,.09,.6),O(110,.09,.75,.18),O(73.42,.1,1.3,.36)],coin:[O(640,.07,.05,0,`triangle`),O(470,.06,.05,.05,`triangle`),O(520,.04,.04,.09,`triangle`)]},lines:{welcome:[`The gate closes behind you. It wasn’t locked. It didn’t need to be.`,`Torchlight. Old bones. Somebody’s dice, still warm.`,`The crypt has been expecting you. It expects everyone, eventually.`],zeroScore:[`The blow lands on stone. The stone forgives you. Nothing else will.`,`Recorded. The crypt appreciates honesty in the dying.`,`A zero. Somewhere below, something stops holding its breath.`],scored:[`It felt that.`,`Carved into the record. The record doesn’t bleed. It’s the only one.`,`Acceptable. The fight continues.`],scoredLow:[`That’s a wound, technically.`,`It scratches itself worse in its sleep.`,`The warden writes it down slowly, so you can watch.`,`Bold. Shallow, but bold.`],scoredBig:[`Something cracks. It wasn’t yours.`,`Hm. The crypt will remember that.`,`Decent. The dead applaud. Quietly. They’re dead.`],lastTurn:[`Last turn. It has noticed you tiring.`,`One turn left. It is already measuring you for a niche.`,`Last chance. The thing behind you is patient. Barely.`],lastReroll:[`That was your last reroll. Now the bones decide.`,`No more rerolls. The dice are done apologizing.`,`Last one spent. The warden settles in to watch.`],needle:[`Rolling harder doesn’t help. The dead all tried.`,`The dice owe you nothing. They’ve made that clear.`,`Take your time. Time is the one thing buried in surplus here.`,`The warden stifles a yawn. Poorly.`],richPlayer:[`Quite a collection you’re building. The crypt counts it as inventory.`,`Heavy pockets. Heavy pockets sink slowly.`],holdQuip:[`Sentimental.`,`That one? If you say so.`,`A firm grip. The dice notice. So does the dark.`],overkill:[`It was already down. The crypt admires thoroughness.`,`Yes, yes. Very impressive. It’s dead twice now.`,`Showing off is free. Everything else costs teeth.`],buyGlass:[`Mind the edges. The last owner is around here somewhere.`,`Grave glass. Brave. It counts double until it doesn’t.`],buyGold:[`Gilded. It bites like a tooth should.`,`Plated. Now it works for you. Loosely speaking.`],newRound:[`Something else steps into the torchlight.`,`The next chamber. Fewer options. This is called descending.`],chooseFloor:[`The halls. Sensible. The crypt respects caution. It feeds it last.`,`The halls it is. Nothing wrong with surviving. It’s rare, is all.`],chooseBack:[`The ossuary. The stairs go down. The stairs do not go up.`,`The ossuary. The warden follows you in and doesn’t say why.`],newAct:[`A new floor. The air is older here.`,`The stairs end at another beginning. They always do.`],bossIntro:[`Something larger fills the doorway. The torches lean away.`,`Every floor keeps its keeper. Standard arrangement.`,`The dead go quiet. Quieter.`],roundWon:[`It stops moving. The crypt makes a note of the time.`,`Down. What it carried is yours, administratively speaking.`,`Settled. The floor absorbs it. The floor absorbs everything.`],shop:[`The merchant’s alcove. Almost everything was someone’s.`,`He arranges the stock. Some of it arranges itself.`,`Browse. The prices are firm. The teeth are not.`],shopReroll:[`He sighs, sweeps the slab, and produces different grave goods.`,`New stock. Same provenance. Don’t ask.`],purchase:[`Sold. There are no refunds below ground.`,`A pleasure doing business. For one of us.`,`It’s yours now. That works in both directions.`],retire:[`It is buried with modest ceremony. The bag is lighter.`,`Interred. The other dice don’t mention it.`],shatter:[`A glass die returns to sand. The crypt does not sweep.`,`It shattered. It was always going to. The warden nods.`],restore:[`The blood is still wet. The page never happened.`,`Rewritten. The book holds no grudges. The crypt does.`],spareRoll:[`One extra roll. The warden pretends not to see.`],runOver:[`The delve ends here. The crypt files you under Provisions.`,`Your dice join the pile by the door. It’s a large pile.`,`The stone closes over. It had a space your shape already.`],runWon:[`Daylight. The crypt is… surprised.`,`You walk out. Almost nobody walks out.`,`You’ve won. The management below would like a word.`],customNight:[`The carvings on the wall are different tonight. Somebody approved it. Something.`],resumed:[`You left mid-fight. The crypt waited. It’s good at that.`],letGo:[`Left behind. The shelf doesn’t mourn. Nothing here mourns on duty.`],cancelReplaceReward:[`Changed your mind? It’s still lying there. It can wait. It’s dead.`],cancelReplaceShop:[`Back on the slab. The merchant pretends not to notice.`],upperBonus:[`All six faces accounted for. The crypt pays a cataloguing bonus. Grudgingly.`],fullBook:[`The book is full. Every page. The crypt, quietly impressed, produces another — and ten teeth for the binding.`],walkedOut:[`You climbed out. The gate didn’t stop you. Gates never do. Coming back in is the trick.`],endlessChosen:[`The crypt raises what’s left of an eyebrow. The torch stays lit.`],foldTaken:[`It takes the toll without counting it. The chamber looks away.`],ledgerExhausted:[`The book is full. Nothing left to write. The crypt admires thoroughness. It doesn’t pay for it.`],shareCopied:[`Copied. Post it somewhere the living can see.`]},bosses:{fewerTurns:{name:`The Burrower`,desc:`Three turns. Then the ceiling comes down.`,ruleName:`one fewer turn`,intro:`The floor buckles and the Burrower surfaces, chewing. It has been through the supports. Three turns before the chamber follows it down.`,taunts:[`Grit sifts from the ceiling. It isn’t decorative.`,`Something below grinds through stone. Patiently. Towards the middle.`],pressure:`The supports give a long, considered creak.`,defeat:`It withdraws. The ceiling reconsiders. For now.`,victory:`The chamber comes down. It was always going to. You were the last thing in it.`},threesVoid:{name:`The Ghoul`,desc:`Dice showing 3 score nothing.`,ruleName:`threes score nothing`,intro:`The Ghoul shuffles in, still chewing. Threes score nothing tonight. It ate them. It regrets nothing.`,taunts:[`It counts your dice with a wet clicking. The count comes up short.`,`It picks something from its teeth. It was a three.`],pressure:`It has stopped chewing. It’s watching the plate.`,defeat:`It slinks off to eat something less difficult. There’s a queue.`,victory:`It doesn’t rush. Nothing down here rushes a meal.`},oneReroll:{name:`The Basilisk`,desc:`One reroll per turn.`,ruleName:`one reroll only`,intro:`The Basilisk uncoils along the far wall and fixes you with the working eye. One reroll per turn. Its gaze discourages fidgeting.`,taunts:[`Don’t look at it. Don’t not look at it. There’s a knack.`,`The eye follows the dice. The dice have stopped misbehaving.`],pressure:`It has stopped blinking. It never started.`,defeat:`It closes the eye. A courtesy between professionals.`,victory:`You held its gaze one turn too long. The statues in the corner had the same idea.`},lockedDie:{name:`The Rat King`,desc:`It takes one die each turn.`,ruleName:`a die taken each turn`,intro:`The Rat King pours itself out of the wall. Keep an eye on your dice. It won’t help.`,taunts:[`A scraping in the walls. Your die is part of the hoard now.`,`Somewhere, small teeth click. That click used to be yours.`],pressure:`It’s already eyeing the rest of the set.`,defeat:`It returns the die. Slightly gnawed. Don’t ask.`,victory:`The whole bag, then. It always wanted the whole bag.`},sixesVoid:{name:`The Banshee`,desc:`Dice showing 6 score nothing.`,ruleName:`sixes score nothing`,intro:`The Banshee drifts in mid-note. Sixes score nothing tonight — her wail takes the high ones. It takes everything, eventually, but tonight it starts with the sixes.`,taunts:[`The note climbs. Your sixes lie down before it arrives.`,`She isn’t singing to you. That would be worse.`],pressure:`She inhales. The torches duck.`,defeat:`The note ends. The silence afterward is almost warm.`,victory:`The wail finds your pitch. Everyone has one.`},sealedEntries:{name:`The Tomb Spider`,desc:`Your two best open pages are webbed shut.`,ruleName:`two pages sealed`,intro:`The Tomb Spider descends without a sound and walks your grimoire like a landlord. Two of your best pages, webbed shut. Nothing personal. Everything is structural.`,taunts:[`The silk creaks. It’s rated for heavier readers than you.`,`It tests each strand twice. A professional.`],pressure:`It’s spinning again. Your name fits in a cocoon.`,defeat:`It unwraps one thing somewhere. It clearly pains it.`,victory:`Your delve hangs in the larder now. Neatly wrapped. It’s a tidy species.`},noRest:{name:`The Restless`,desc:`Holds don’t survive a reroll.`,ruleName:`holds reset each reroll`,intro:`The Restless drags itself in. Nothing rests near it. Not the dice. Not you. It’s been awake since before the crypt.`,taunts:[`It hasn’t blinked since you arrived. It has no eyelids. Still.`,`It rearranges its bones. There are too many.`],pressure:`It can wait forever. You have one turn.`,defeat:`It lies down. Just for a moment. Because of you.`,victory:`You’ll rest now. It won’t. That’s how it wins.`},theHouse:{name:`The Crypt`,desc:`Three turns. One reroll. Its stone, its rules.`,ruleName:`the crypt itself`,intro:`Nothing fills the doorway. The sarcophagus at the back is open, and always was. The crypt itself is playing tonight. It usually doesn’t bother.`,taunts:[`The empty air settles its weight into the chamber. The stone creaks.`,`The torches gutter. It isn’t the draft. There is no draft down here.`],pressure:`The walls lean in.`,defeat:`The stone is just stone again. For now.`,victory:`The crypt always keeps. Tonight it didn’t even have to dig.`},theOwner:{name:`The Warden Below`,desc:`Three turns. One reroll. Your two best pages sealed. The stone itself is watching.`,ruleName:`three turns, one reroll, two seals — the last stair`,intro:`The stairs weren’t on any map. Neither is the chamber. It is already waiting, and the three shards on the stone have arranged themselves back into a key. “My crypt. My floor. One fight.”`,taunts:[`It doesn’t look at the dice. The dice look at it.`,`“Everything ends up here” — it says it like a landlord quoting the lease.`,`Above you, the halls have gone very quiet.`],pressure:`It turns the key face down. Whatever happens next is already carved.`,defeat:`It bows, and the door behind it unlocks. The crypt is yours — whatever that ends up meaning.`,victory:`“Thank you for gathering these.” The key folds itself into the dark. The stairs are gone by morning.`}},charms:{rabbitsFoot:{name:`Grave Rabbit’s Foot`,desc:`+1 reroll every turn. The rabbit is buried here. Most of it.`},pocketWatch:{name:`The Warden’s Hourglass`,desc:`+1 turn every fight. The sand runs slower for you now. It hasn’t noticed it’s gone.`},weightedFelt:{name:`Whetstone`,desc:`Every blow lands +10 harder. The edge remembers being sharpened.`},counterfeitStamp:{name:`Counterfeit Tooth`,desc:`Stock costs 1 tooth less. The merchant bites it. Says nothing.`},houseKey:{name:`Crypt Key`,desc:`Interest is capped at 10 teeth instead of 5. It opens a door you shouldn’t have.`},steadyHands:{name:`Steady Hands`,desc:`Glass dice shatter half as often. Dead calm. The good kind.`},ironNerves:{name:`Gallows Calm`,desc:`+15 to writes on your last turn. Panic is for the living.`},collectorsRing:{name:`Reliquary Ring`,desc:`Gilded dice pay 2 teeth instead of 1. It never leaves the finger. The finger came with it.`},sixthFinger:{name:`Sixth Finger`,desc:`Every six on the table pays +2 extra. Nobody counts a skeleton’s fingers twice.`},deepPockets:{name:`Burial Shroud`,desc:`Carry three held items instead of two. Don’t ask what else is wrapped in there.`},houseCut:{name:`Gravedigger’s Cut`,desc:`+2 teeth every fight you win. Skimmed, technically. From the dead, technically.`},silverTongue:{name:`Silver Tongue`,desc:`New stock costs 2 teeth instead of 5. The merchant likes you. Nominally. It’s his tongue.`},reservedSeat:{name:`Marked Grave`,desc:`Mark one die in your bag; it is always drawn. The plot has its name on it.`},gamblersOath:{name:`Dead Man’s Oath`,desc:`+1 reroll every turn, but winning a fight pays no base teeth. You swore something. It’s still listening.`},brittleCrown:{name:`Brittle Crown`,desc:`Glass dice count triple, and shatter twice as often. Wear it while it lasts. Everything here wore something once.`},crookedVisor:{name:`Cracked Skullcap`,desc:`+5 to every write, but a zero costs you 1 tooth. Seeing more has a price.`},openEnded:{name:`The Missing Step`,desc:`Straights may skip one number. The stair is missing a step. You’ve learned to.`},runningTab:{name:`Funeral March`,desc:`Straights pay +25. Order matters in a procession.`},scavenger:{name:`Scavenger`,desc:`After you write a zero, your next write pays ×1.5. Somebody has to eat the garbage. Down here there’s a queue.`},taxWriteOff:{name:`Estate Sale`,desc:`Every zero you write pays 2 teeth. The dead pay their own way. Properly filed.`},foreman:{name:`The Sexton`,desc:`Ones through Sixes count their dice double. He respects honest digging.`},invertedTable:{name:`The Overturned Slab`,desc:`Every die pays its opposite face — 1 as 6, 2 as 5, 3 as 4. The underside is worn smooth. Don’t ask by what.`},snakeCharmer:{name:`Worm Charmer`,desc:`Every 1 on the table adds +3 to the write. They listen to him. Only him.`},changeJar:{name:`The Offering Bowl`,desc:`Overkill pays 1 tooth per 10 surplus. The crypt keeps the change. The bowl keeps it first.`},momentum:{name:`Pallbearer’s Stride`,desc:`A third of your surplus carries into the next fight. A procession doesn’t stop for anyone.`},firstInstinct:{name:`First Instinct`,desc:`Each of this turn’s unspent rerolls adds +7 to the write. Anything in the wrappings doesn’t count. The first thought was correct. The dead confirm it.`},upTheSleeve:{name:`In the Wrappings`,desc:`Up to three unspent rerolls slip into the wrappings for your next turn. The warden checks. Never finds them.`},standingArrangement:{name:`Safe Passage`,desc:`Pass any chamber: 16 teeth, minus 2 for every turn you leave in it. A keeper’s chamber costs double, and it drops nothing. Deciding late is the expensive part. The crypt honors its own paper.`}},items:{weightedFace:{name:`Graveweight`,desc:`Choose a die. Its lowest face becomes a six. The dead lean on it.`},loadedFace:{name:`Loaded Face`,desc:`Choose a die. Its lowest face becomes a copy of its highest — a ★ included, for the right price: forgeries of scarce things get scarce themselves. The merchant has seen this before. He was probably involved.`},ladderChisel:{name:`Tomb Chisel`,desc:`Choose a die. Its faces become 2·3·3·4·4·5. Steps, carved for climbing. Down, technically, but carved.`},wildFace:{name:`Wild Face`,desc:`Choose a die. Its lowest face becomes ★ — counts as any value, completes any pattern, worth 6 in sums. The price climbs with every ★ you already own. Carved from a knuckle that shouldn’t carve — the good ones get scarce.`},blankFace:{name:`Blind Face`,desc:`Choose a die. Its highest face becomes · — worth zero, breaks pairs and straights. For delvers who profit from garbage. The crypt doesn’t judge. Aloud.`},goldPlating:{name:`Gilded Bone`,desc:`Choose a die. Pays 1 tooth every turn you score. Whose tooth is not discussed.`},glassBlowing:{name:`Grave Glass`,desc:`Choose a die. Counts double. Shatters eventually. Everything down here does.`},ledgerStamp:{name:`Rune Stone`,desc:`Choose a page. It strikes harder from now on. The crypt notarizes reluctantly.`},freshInk:{name:`Blood Ink`,desc:`Held item. Rewrite one spent page mid-fight. Don’t ask whose.`},spareRoll:{name:`Spare Knuckle`,desc:`Held item. One extra reroll, when you need it most. You will.`},anotherDie:{name:`A Stranger’s Die`,desc:`A plain die from the pile by the door, added to your bag. It doesn’t remember its owner. Neither will yours.`},retirement:{name:`Burial`,desc:`The merchant’s standing offer: he always buries dice.`},deedPiece:{name:`A Shard of the Key`,desc:`A third of an old key, broken deliberately. The lock it fits is below this floor. The merchant sells it without looking at it, or you.`}},rules:{quiet:{name:`A quiet floor`,desc:`Nothing moves. Officially.`},crowded:{name:`A restless floor`,desc:`Something waits between the chambers of every floor.`},glassblowers:{name:`The glassmaker’s shift`,desc:`Grave glass costs 2 teeth at the alcove.`},gift:{name:`A stocked tomb`,desc:`You start with Blood Ink and 3 teeth. Grave goods. Somebody’s.`},shortstack:{name:`Picked pockets`,desc:`You came in light — two teeth to your name. Something in the entrance hall is faster than you.`},taxman:{name:`The tollman’s floor`,desc:`Every price in the alcove runs a tooth heavier. Nobody argues with the tollman.`},overstocked:{name:`One bone too many`,desc:`You came in with an extra die. More to shed before the bag behaves.`}},events:{stranger:{name:`The Previous Owner`,text:`A dead man sits against the wall, in no hurry. His hand is open. There’s a die in it.`,option:(e,t,n)=>e===`take`?{label:`Take the die`,hint:n?`your bag is full`:`a used die joins your bag`}:{label:`Leave him be`},result:e=>e===`taken`?`It settles into the bag like it’s been there before. Perhaps it has. Perhaps you’ve met.`:`You leave it. His hand stays open. He can wait. He’s very good at it.`},doubleOrNothing:{name:`Grave Odds`,text:`Two skeletons dice by torchlight. They make room. Four or better and your wager comes back twice. Their hands are very clean. Bone-clean.`,option:(e,t,n)=>e===`wager`?n?{label:`Wager`,hint:`nothing to wager`}:{label:`Wager ${x(Number(t.wager??0))}`,hint:`4–6 doubles it, 1–3 takes it`}:{label:`Walk on`},result:(e,t)=>e===`won`?`A ${t.roll}. They pay ${x(Number(t.wager??0))}, and memorize your face. They have time.`:e===`lost`?`A ${t.roll}. The wager vanishes into a ribcage. So does the mood.`:`Wise. Boring, but wise. The skeletons return to their game. It never ends. That’s the point.`},debtCollector:{name:`The Tollman`,text:`He consults a ledger that isn’t yours and finds your name in it anyway. Everyone who comes down owes. Most pay on the way out. Most don’t leave.`,option:(e,t,n)=>e===`pay`?{label:`Pay ${x(Number(t.price??0))}`,...n?{hint:`you don’t have it`}:{}}:{label:`Refuse`,hint:`one fewer reroll next fight`},result:e=>e===`paid`?`Paid. Receipt? No. Receipts are for places with a way out.`:`He writes something down. The pen doesn’t need ink. Down here nothing does.`},lostProperty:{name:`Grave Goods`,text:`A niche in the wall, a shelf of things nobody came back for. The attendant doesn’t look up. He can’t. "One per delver."`,option:(e,t,n)=>e===`claim`?{label:`Claim something`,hint:n?`you can’t carry more`:`a random relic — previous owner nearby`}:{label:`Leave it`},result:(e,t)=>e===`claimed`?`${t.charmName}. It was labeled with a name. Not yours. Now it is.`:`The niche stays full. Somewhere behind the wall, something is relieved.`},freeDrink:{name:`The Last Toast`,text:`A cup stands on a coffin lid, freshly poured. Nobody pours drinks down here. Somebody did.`,option:e=>e===`drink`?{label:`Drink it`,hint:`+1 reroll next fight`}:{label:`Leave the cup`,hint:`+1 tooth — full cups fetch a price here`},result:e=>e===`drank`?`It burns pleasantly. Next fight, your hands are faster. Don’t ask what was in it. Or whose.`:`You set it back. Something pays you a tooth for the courtesy. You don’t see what.`},pawnbroker:{name:`The Ossuary Clerk`,text:`A hunched figure with a jeweler’s loupe looks at your bag the way the starving look at dinner. "Six teeth. For whichever one misses you least."`,option:(e,t,n)=>e===`sell`?{label:`Sell a die`,hint:n?`nothing he wants`:`a random plain die, ${x(Number(t.price??0))}`}:{label:`Keep your dice`},result:e=>e===`sold`?`Six teeth, counted twice. The die doesn’t look back. Dice never do.`:`He shrugs. "Everyone comes back." Down here it isn’t a figure of speech.`},handyman:{name:`The Bone-Carver`,text:`He has a chisel, a steady hand, and no pulse. "Three teeth. Your worst face becomes a six. Somewhere."`,option:(e,t,n)=>e===`pay`?{label:`Pay ${x(Number(t.price??0))}`,hint:n?`you don’t have it`:`a random die’s lowest face becomes a six`}:{label:`Decline`},result:e=>e===`done`?`Three taps of the chisel. The die is better now. It doesn’t thank him either.`:`He nods and packs the chisel away. "They all decline once."`},notary:{name:`The Keeper of Keys`,text:`A thin figure with a lockbox that locks twice. Inside, on velvet: a broken piece of iron. The lock it fits is below your feet. "Not for sale. Except tonight, to you, apparently."`,option:(e,t,n)=>e===`buy`?t.soldOut?{label:`Buy the shard`,hint:`the lockbox is empty tonight`}:{label:`Pay ${x(Number(t.price??0))}`,hint:n?`you don’t have it`:`a shard of the key`}:{label:`Walk past`},result:(e,t)=>e===`bought`?Number(t.have)>=Number(t.total)?`The shard fits the others exactly. Somewhere below you, a lock that didn’t exist clears its throat.`:`He counts the teeth twice and hands it over. ${t.have} of ${t.total}. He doesn’t say what it’s a third of. You know.`:`He closes the box. Both locks. "Somebody always buys. Eventually the crypt inherits it back."`},seance:{name:`The Medium`,text:`A woman at a corner slab is mid-conversation with the wall. Down here, the wall answers. She stops, looks at you, and offers to rearrange something.`,option:e=>e===`let`?{label:`Let her`,hint:`a random page levels up`}:{label:`Leave the slab`},result:(e,t)=>e===`done`?`${t.catName} strikes harder now. She won’t say why, and the wall won’t either.`:`She was mid-conversation anyway. It wasn’t with you. It was about you.`}},ui:{wordmarkHtml:`

        <h3>The arrangement</h3>
        <p>Every chamber holds an enemy: deal <strong>its HP</strong> in damage
           before your <strong>4 turns</strong> run out or the delve is over.
           A delve is 8 floors of 3 chambers; the third chamber of each floor
           belongs to <strong>the floor's keeper</strong> — a creature with a
           rule of its own: fewer turns, worthless threes, webbed-up pages.
           The map (top right) shows what's waiting.</p>
        <h3>A turn</h3>
        <p>Five dice are drawn from your bag and rolled. Click dice to
           <strong>hold</strong> them, reroll the rest up to twice, then write
           the result into a page of the grimoire. The page decides the damage —
           straights, of-a-kinds, sixes, and so on. The number next to each
           open page is what your current dice would deal there.</p>
        <h3>The grimoire</h3>
        <p>Each page is written <strong>once per floor</strong> — it stays
           spent for all 3 chambers. Sometimes you must write a zero into
           something you loved. The crypt calls this character-building.</p>
        <h3>The stairways</h3>
        <p>Each new floor, two stairs go down: <strong>the halls</strong>
           (standard enemies, standard loot) or <strong>the ossuary</strong>
           (half again tougher, double loot). Choose by how much your engine
           can carry.</p>
        <h3>Relics</h3>
        <p>Passive relics with lasting effects — you can carry five. Keepers
           drop them, the merchant keeps one under the slab sometimes, and
           grave goods find new owners.</p>
        <h3>The merchant</h3>
        <p>Teeth buy improvements between fights: carve dice faces, gild
           dice (a tooth per scored turn) or blow them in <strong>grave
           glass</strong> (counts double, shatters eventually), or set rune
           stones so pages strike harder. Savings earn interest: a tooth
           per 5 held.</p>
        <h3>At the slab</h3>
        <p><strong>R</strong> or <strong>Space</strong> rolls, <strong>1–5</strong>
           hold dice, <strong>Backspace</strong> releases them right to left,
           <strong>Esc</strong> backs out. Your delve is saved — close the tab
           and the crypt waits. It's good at that.</p>`,close:`Understood`,backOffice:`the bone room`,backOfficeTip:`Every number in the crypt, editable. Deal a delve on your own terms.`},leave:{title:`Climb out?`,flavor:`Mid-delve. The crypt will remember where you stopped. It remembers everything else too.`,stay:`Keep descending`,go:`Climb out`},resume:{title:`The crypt waited`,flavor:`Your delve is where you left it. Bones, dice, debts. Mostly debts.`,sit:`Descend again`,walk:`Walk away`},notice:{title:`Notice from below`,flavor:`Nailed to the gate. Reading it is optional. It always is.`},recordsModal:{title:`The registry`,flavor:`The crypt remembers everyone. It files them.`,empty:`No delves in the registry yet. The stone waits. It’s good at that.`,boardTitle:`Deepest delves`,recentTitle:`Recent delves`},map:{title:`The descent ahead`,flavor:`Each circle is a chamber; the number is the HP standing in it.
