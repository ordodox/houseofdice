        <h3>The arrangement</h3>
        <p>Beat the <strong>target score</strong> each round or the run is over.
           You get <strong>4 turns</strong> per round. A run is 8 acts of
           3 rounds; the third round of each act, <strong>a regular</strong>
           sits in with a house rule of their own ŌĆö fewer turns, worthless
           threes, sealed entries. Check the map (click the act, top right)
           to see who's waiting.</p>
        <h3>A turn</h3>
        <p>Five dice are drawn from your bag and rolled. Click dice to
           <strong>hold</strong> them, reroll the rest up to twice, then write
           the result into a ledger entry. The entry decides the score ŌĆö
           straights, of-a-kinds, sixes, and so on. The number shown next to
           each open entry is what your current dice would pay there.</p>
        <h3>The ledger</h3>
        <p>Each entry is written <strong>once per act</strong> ŌĆö it stays spent
           for all 3 rounds. Sometimes you must write a zero into something
           you loved. The house calls this character-building.</p>
        <p>The upper section holds two contracts: complete <strong>all six of
           OnesŌĆōSixes without a zero</strong> and the house pays half the
           table's target on the spot ŌĆö or end the act with <strong>every
           upper blank or zeroed</strong> (the blackout) for a cash bonus at
           the boss settlement. Pick a pole, or neither.</p>
        <h3>The tables</h3>
        <p>Each new act, two tables have a seat open: <strong>the floor</strong>
           (standard targets, standard pay) or <strong>the back room</strong>
           (targets half again higher, double payout). Choose by how much
           your engine can carry.</p>
        <h3>Charms</h3>
        <p>Passive relics with lasting effects ŌĆö you can carry five. There is
           more than one way to come by them: beat a <strong>regular</strong>
           and they leave one behind, the dealer sometimes has one in the
           drawer, and lost property finds new owners.</p>
        <h3>The counter</h3>
        <p>Winnings buy improvements between rounds: carve dice faces, plate
           dice in <strong>gold</strong> (pays $1 per scored turn) or blow them
           in <strong>glass</strong> (counts double, shatters eventually), or
           stamp ledger entries so they pay better. Savings earn interest:
           $1 per $5 held.</p>
        <p>You own <strong>7 dice</strong> but only <strong>5 are drawn</strong>
           each turn, at random. Retire dice to see your good ones more often;
           add dice for raw power at the cost of consistency. The bag is the
           build.</p>
        <h3>At the table</h3>
        <p><strong>R</strong> or <strong>Space</strong> rolls, <strong>1ŌĆō5</strong>
           hold dice, <strong>Backspace</strong> releases them right to left,
           <strong>Esc</strong> backs out. Your run is saved ŌĆö
           close the tab and the table waits.</p>
        <h3>Held items</h3>
        <p>You can carry two. <strong>Fresh Ink</strong> rewrites a spent ledger
           entry mid-round. <strong>Spare Roll</strong> is a reroll for when it
           matters. There are no refunds. There is no word for refund here.</p>`,close:`Understood`,backOffice:`the back office`,backOfficeTip:`Every number in the house, editable. Deal a night on your own terms.`},leave:{title:`Walk out?`,flavor:`Mid-run. The ledger will remember where you stopped. It remembers everything else too.`,stay:`Stay seated`,go:`Walk out`},lastWrite:{title:`Last write of the round.`,flavor:`That entry wonŌĆÖt take the round ŌĆö but another one will. Write this and the tableŌĆÖs lost.`,reconsider:`Let me look again`,write:`Write it anyway`},resume:{title:`The table waited`,flavor:`Your run is where you left it. Chips, dice, debts. Mostly debts.`,sit:`Sit back down`,walk:`Walk away`,dealtUnder:e=>`This night was dealt under v${e}. It plays out under its own rules ŌĆö the table keeps its word.`},notice:{title:`Notice from management`,flavor:`Posted on the door. Reading it is optional. It always is.`},count:{strip:`The house counts its tables ŌĆö no names, no faces. Tonight went into the ledger as a number among numbers.`,stripSee:`see exactly what leaves the table`,stripOff:`count me out`,stripOffDone:`Noted. The house wonŌĆÖt count you.`,title:`The count room`,flavor:`What you see below is the literal send ŌĆö the same bytes, the same code path. There is no second, quieter page.`,keyHtml:e=>`

ime. Time is the one thing buried in surplus here.`,`The warden stifles a yawn. Poorly.`],richPlayer:[`Quite a collection youŌĆÖre building. The crypt counts it as inventory.`,`Heavy pockets. Heavy pockets sink slowly.`],holdQuip:[`Sentimental.`,`That one? If you say so.`,`A firm grip. The dice notice. So does the dark.`],overkill:[`It was already down. The crypt admires thoroughness.`,`Yes, yes. Very impressive. ItŌĆÖs dead twice now.`,`Showing off is free. Everything else costs teeth.`],buyGlass:[`Mind the edges. The last owner is around here somewhere.`,`Grave glass. Brave. It counts double until it doesnŌĆÖt.`],buyGold:[`Gilded. It bites like a tooth should.`,`Plated. Now it works for you. Loosely speaking.`],newRound:[`Something else steps into the torchlight.`,`The next chamber. Fewer options. This is called descending.`],chooseFloor:[`The halls. Sensible. The crypt respects caution. It feeds it last.`,`The halls it is. Nothing wrong with surviving. ItŌĆÖs rare, is all.`],chooseBack:[`The ossuary. The stairs go down. The stairs do not go up.`,`The ossuary. The warden follows you in and doesnŌĆÖt say why.`],newAct:[`A new floor. The air is older here.`,`The stairs end at another beginning. They always do.`],bossIntro:[`Something larger fills the doorway. The torches lean away.`,`Every floor keeps its keeper. Standard arrangement.`,`The dead go quiet. Quieter.`],roundWon:[`It stops moving. The crypt makes a note of the time.`,`Down. What it carried is yours, administratively speaking.`,`Settled. The floor absorbs it. The floor absorbs everything.`],shop:[`The merchantŌĆÖs alcove. Almost everything was someoneŌĆÖs.`,`He arranges the stock. Some of it arranges itself.`,`Browse. The prices are firm. The teeth are not.`],shopReroll:[`He sighs, sweeps the slab, and produces different grave goods.`,`New stock. Same provenance. DonŌĆÖt ask.`],purchase:[`Sold. There are no refunds below ground.`,`A pleasure doing business. For one of us.`,`ItŌĆÖs yours now. That works in both directions.`],retire:[`It is buried with modest ceremony. The bag is lighter.`,`Interred. The other dice donŌĆÖt mention it.`],shatter:[`A glass die returns to sand. The crypt does not sweep.`,`It shattered. It was always going to. The warden nods.`],restore:[`The blood is still wet. The page never happened.`,`Rewritten. The book holds no grudges. The crypt does.`],spareRoll:[`One extra roll. The warden pretends not to see.`],lastCall:[`The bell tolls once. One more turn. Everything below pauses to check whose it was.`],runOver:[`The delve ends here. The crypt files you under Provisions.`,`Your dice join the pile by the door. ItŌĆÖs a large pile.`,`The stone closes over. It had a space your shape already.`],runWon:[`Daylight. The crypt isŌĆ” surprised.`,`You walk out. Almost nobody walks out.`,`YouŌĆÖve won. The management below would like a word.`],customNight:[`The carvings on the wall are different tonight. Somebody approved it. Something.`],resumed:[`You left mid-fight. The crypt waited. ItŌĆÖs good at that.`],letGo:[`Left behind. The shelf doesnŌĆÖt mourn. Nothing here mourns on duty.`],cancelReplaceReward:[`Changed your mind? ItŌĆÖs still lying there. It can wait. ItŌĆÖs dead.`],cancelReplaceShop:[`Back on the slab. The merchant pretends not to notice.`],upperBonus:[`All six faces accounted for. The crypt pays a cataloguing bonus. Grudgingly.`],fullBook:[`The book is full. Every page. The crypt, quietly impressed, produces another ŌĆö and ten teeth for the binding.`],bookNear2:[`Two pages left in the grimoire. The crypt pretends not to count.`],bookNear1:[`One page left. The crypt is definitely counting.`],walkedOut:[`You climbed out. The gate didnŌĆÖt stop you. Gates never do. Coming back in is the trick.`],soldOut:[`You sold the last die. The teeth are real. But the crypt deals in dice, and yours just left in a strangerŌĆÖs coat.`],endlessChosen:[`The crypt raises whatŌĆÖs left of an eyebrow. The torch stays lit.`],foldTaken:[`It takes the toll without counting it. The chamber looks away.`],ledgerExhausted:[`The book is full. Nothing left to write. The crypt admires thoroughness. It doesnŌĆÖt pay for it.`],shareCopied:[`Copied. Post it somewhere the living can see.`]},bosses:{fewerTurns:{name:`The Burrower`,desc:`Three turns. Then the ceiling comes down.`,ruleName:`one fewer turn`,intro:`The floor buckles and the Burrower surfaces, chewing. It has been through the supports. Three turns before the chamber follows it down.`,taunts:[`Grit sifts from the ceiling. It isnŌĆÖt decorative.`,`Something below grinds through stone. Patiently. Towards the middle.`],pressure:`The supports give a long, considered creak.`,defeat:`It withdraws. The ceiling reconsiders. For now.`,victory:`The chamber comes down. It was always going to. You were the last thing in it.`},threesVoid:{name:`The Ghoul`,desc:`Dice showing 3 score nothing.`,ruleName:`threes score nothing`,intro:`The Ghoul shuffles in, still chewing. Threes score nothing tonight. It ate them. It regrets nothing.`,taunts:[`It counts your dice with a wet clicking. The count comes up short.`,`It picks something from its teeth. It was a three.`],pressure:`It has stopped chewing. ItŌĆÖs watching the plate.`,defeat:`It slinks off to eat something less difficult. ThereŌĆÖs a queue.`,victory:`It doesnŌĆÖt rush. Nothing down here rushes a meal.`},oneReroll:{name:`The Basilisk`,desc:`One reroll per turn.`,ruleName:`one reroll only`,intro:`The Basilisk uncoils along the far wall and fixes you with the working eye. One reroll per turn. Its gaze discourages fidgeting.`,taunts:[`DonŌĆÖt look at it. DonŌĆÖt not look at it. ThereŌĆÖs a knack.`,`The eye follows the dice. The dice have stopped misbehaving.`],pressure:`It has stopped blinking. It never started.`,defeat:`It closes the eye. A courtesy between professionals.`,victory:`You held its gaze one turn too long. The statues in the corner had the same idea.`},lockedDie:{name:`The Rat King`,desc:`It takes one die each turn.`,ruleName:`a die taken each turn`,intro:`The Rat King pours itself out of the wall. Keep an eye on your dice. It wonŌĆÖt help.`,taunts:[`A scraping in the walls. Your die is part of the hoard now.`,`Somewhere, small teeth click. That click used to be yours.`],pressure:`ItŌĆÖs already eyeing the rest of the set.`,defeat:`It returns the die. Slightly gnawed. DonŌĆÖt ask.`,victory:`The whole bag, then. It always wanted the whole bag.`},sixesVoid:{name:`The Banshee`,desc:`Dice showing 6 score nothing.`,ruleName:`sixes score nothing`,intro:`The Banshee drifts in mid-note. Sixes score nothing tonight ŌĆö her wail takes the high ones. It takes everything, eventually, but tonight it starts with the sixes.`,taunts:[`The note climbs. Your sixes lie down before it arrives.`,`She isnŌĆÖt singing to you. That would be worse.`],pressure:`She inhales. The torches duck.`,defeat:`The note ends. The silence afterward is almost warm.`,victory:`The wail finds your pitch. Everyone has one.`},sealedEntries:{name:`The Tomb Spider`,desc:`Your two best open pages are webbed shut.`,ruleName:`two pages sealed`,intro:`The Tomb Spider descends without a sound and walks your grimoire like a landlord. Two of your best pages, webbed shut. Nothing personal. Everything is structural.`,taunts:[`The silk creaks. ItŌĆÖs rated for heavier readers than you.`,`It tests each strand twice. A professional.`],pressure:`ItŌĆÖs spinning again. Your name fits in a cocoon.`,defeat:`It unwraps one thing somewhere. It clearly pains it.`,victory:`Your delve hangs in the larder now. Neatly wrapped. ItŌĆÖs a tidy species.`},noRest:{name:`The Restless`,desc:`Holds donŌĆÖt survive a reroll.`,ruleName:`holds reset each reroll`,intro:`The Restless drags itself in. Nothing rests near it. Not the dice. Not you. ItŌĆÖs been awake since before the crypt.`,taunts:[`It hasnŌĆÖt blinked since you arrived. It has no eyelids. Still.`,`It rearranges its bones. There are too many.`],pressure:`It can wait forever. You have one turn.`,defeat:`It into the wall without looking. It has fought this hand before.`},kindsHalved:{name:`The Curator`,desc:`Chance, Three of a Kind, Four of a Kind and Yahtzee deal half in this chamber.`,ruleName:`chance and the kinds deal half`,intro:`The Curator drifts along the ossuary shelves, sorting knuckle from knuckle. Every heap ever carried down here has crossed its ledger. It is not impressed by volume.`,taunts:[`A pile. How inventive.`,`Anyone can stack bones. Show it an arrangement.`],pressure:`One turn. Your label is already drying.`,defeat:`It moves one femur a fingerŌĆÖs width and pronounces the shelf adequate. From it, thatŌĆÖs rapture.`,victory:`Filed under Derivative. The drawer was full. It made room.`},moneyTax:{name:`The Almoner`,desc:`At each of this chamberŌĆÖs turns it collects 30% of your teeth.`,ruleName:`a tithe of teeth`,intro:`The Almoner makes its rounds with a copper bowl, patient as subsidence. The dead tithe. YouŌĆÖre close enough to count.`,taunts:[`A heavy pouch sinks a delver. ItŌĆÖs helping.`,`It isnŌĆÖt theft. ItŌĆÖs upkeep. Someone maintains all this dark.`],pressure:`One turn. The bowl is already under your hands.`,defeat:`It bows and withdraws the bowl. WhatŌĆÖs left of your teeth is yours again. The bow costs extra. It waives it.`,victory:`Your teeth go into the bowl uncounted. It never counts. It already knows.`},charmsVoid:{name:`The Reliquary Moth`,desc:`Held relics do nothing in its chamber.`,ruleName:`relics suspended`,intro:`The Reliquary Moth settles above the slab and opens its wings, and your relics go quiet, one by one. It eats the meaning out of things and leaves the things.`,taunts:[`Whatever that relic usually does, itŌĆÖs been eaten out of it. The shape keeps.`,`Your relics are intact. So is a coat, after moths. Technically.`],pressure:`One turn. The wings stay open.`,defeat:`It folds its wings and lifts away, and the relics remember what theyŌĆÖre for. The air tastes of dust.`,victory:`It was never after the relics. Meaning comes d.`},counterfeitStamp:{name:`Counterfeit Tooth`,desc:`Stock costs 1 tooth less. The merchant bites it. Says nothing.`},houseKey:{name:`Crypt Key`,desc:`Interest is capped at 10 teeth instead of 5. It opens a door you shouldnŌĆÖt have.`},steadyHands:{name:`Steady Hands`,desc:`Glass dice shatter half as often. Dead calm. The good kind.`},ironNerves:{name:`Gallows Calm`,desc:`+15 to writes on your last turn. Panic is for the living.`},collectorsRing:{name:`Reliquary Ring`,desc:`Gilded dice pay 2 teeth instead of 1. It never leaves the finger. The finger came with it.`},sixthFinger:{name:`Sixth Finger`,desc:`Every six on the table pays +2 extra. Nobody counts a skeletonŌĆÖs fingers twice.`},deepPockets:{name:`Burial Shroud`,desc:`Carry three held items instead of two. DonŌĆÖt ask what else is wrapped in there.`},houseCut:{name:`GravediggerŌĆÖs Cut`,desc:`+2 teeth every fight you win. Skimmed, technically. From the dead, technically.`},silverTongue:{name:`Silver Tongue`,desc:`New stock costs 2 teeth instead of 5. The merchant likes you. Nominally. ItŌĆÖs his tongue.`},reservedSeat:{name:`Marked Grave`,desc:`Mark one die in your bag; it is always drawn. The plot has its name on it.`},gamblersOath:{name:`Dead ManŌĆÖs Oath`,desc:`+1 reroll every turn, but winning a fight pays no base teeth. You swore something. ItŌĆÖs still listening.`},brittleCrown:{name:`Brittle Crown`,desc:`Glass dice count triple, and shatter twice as often. Wear it while it lasts. Everything here wore something once.`},crookedVisor:{name:`Cracked Skullcap`,desc:`+5 to every write, but a zero costs you 1 tooth. Seeing more has a price.`},openEnded:{name:`The Missing Step`,desc:`Straights may skip one number. The stair is missing a step. YouŌĆÖve learned to.`},runningTab:{name:`Funeral March`,desc:`Straights pay +25. Order matters in a procession.`},scavenger:{name:`Scavenger`,desc:`After you write a zero, your next write pays ├Ś1.5. Somebody has to eat the garbage. Down here thereŌĆÖs a queue.`},taxWriteOff:{name:`Estate Sale`,desc:`Every zero you write pays 2 teeth. The dead pay their own way. Properly filed.`},foreman:{name:`The Sexton`,desc:`Ones through Sixes count their dice double. He respects honest digging.`},invertedTable:{name:`The Overturned Slab`,desc:`Every die pays its opposite face ŌĆö 1 as 6, 2 as 5, 3 as 4. The underside is worn smooth. DonŌĆÖt ask by what.`},snakeCharmer:{name:`Worm Charmer`,desc:`Every 1 on the table adds +3 to the write. They listen to him. Only him.`},changeJar:{name:`The Offering Bowl`,desc:`Overkill pays 1 tooth per 10 surplus. The crypt keeps the change. The bowl keeps it first.`},momentum:{name:`PallbearerŌĆÖs Stride`,desc:`A third of your surplus carries into the next fight. A procession doesnŌĆÖt stop for anyone.`},firstInstinct:{name:`First Instinct`,desc:`Each of this turnŌĆÖs unspent rerolls adds +7 to the write. Anything in the wrappings doesnŌĆÖt count. The first thought was correct. The dead confirm it.`},upTheSleeve:{name:`In the Wrappings`,desc:`Up to three unspent rerolls slip into the wrappings for your next turn. The warden checks. Never finds them.`},standingArrangement:{name:`Safe Passage`,desc:`Pass any chamber: 16 teeth, minus 2 for every turn you leave in it. A keeperŌĆÖs chamber costs double, and it drops nothing. Deciding late is the expensive part. The crypt honors its own paper.`},assayer:{name:`MiserŌĆÖs Bite`,desc:`Every scoring gilded die adds +6 to the write. Something bites each one before it counts. The marks stay.`}},items:{weightedFace:{name:`Graveweight`,desc:`Choose a die. Its lowest face becomes a six. The dead lean on it.`},loadedFace:{name:`Loaded Face`,desc:`Choose a die. Its lowest face becomes a copy of its highest ŌĆö a Ōśģ included, for the right price: forgeries of scarce things get scarce themselves. The merchant has seen this before. He was probably involved.`},ladderChisel:{name:`Tomb Chisel`,desc:`Choose a die. Its faces become 2┬Ę3┬Ę3┬Ę4┬Ę4┬Ę5. Steps, carved for climbing. Down, stack:{name:`Picked pockets`,desc:`You came in light ŌĆö two teeth to your name. Something in the entrance hall is faster than you.`},taxman:{name:`The tollmanŌĆÖs floor`,desc:`Every price in the alcove runs a tooth heavier. Nobody argues with the tollman.`},overstocked:{name:`One bone too many`,desc:`You came in with an extra die. More to shed before the bag behaves.`}},events:{stranger:{name:`The Previous Owner`,text:`A dead man sits against the wall, in no hurry. His hand is open. ThereŌĆÖs a die in it.`,option:(e,t,n)=>e===`take`?{label:`Take the die`,hint:n?`your bag is full`:`a used die joins your bag`}:{label:`Leave him be`},result:e=>e===`taken`?`It settles into the bag like itŌĆÖs been there before. Perhaps it has. Perhaps youŌĆÖve met.`:`You leave it. His hand stays open. He can wait. HeŌĆÖs very good at it.`},doubleOrNothing:{name:`Grave Odds`,text:`Two skeletons dice by torchlight. They make room. Four or better and your wager comes back twice. Their hands are very clean. Bone-clean.`,option:(e,t,n)=>e===`wager`?n?{label:`Wager`,hint:`nothing to wager`}:{label:`Wager ${le(Number(t.wager??0))}`,hint:`4ŌĆō6 doubles it, 1ŌĆō3 takes it`}:{label:`Walk on`},result:(e,t)=>e===`won`?`A ${t.roll}. They pay ${le(Number(t.wager??0))}, and memorize your face. They have time.`:e===`lost`?`A ${t.roll}. The wager vanishes into a ribcage. So does the mood.`:`Wise. Boring, but wise. The skeletons return to their game. It never ends. ThatŌĆÖs the point.`},debtCollector:{name:`The Tollman`,text:`He consults a ledger that isnŌĆÖt yours and finds your name in it anyway. Everyone who comes down owes. Most pay on the way out. Most donŌĆÖt leave.`,option:(e,t,n)=>e===`pay`?{label:`Pay ${le(Number(t.price??0))}`,...n?{hint:`you donŌĆÖt have it`}:{}}:{label:`Refuse`,hint:`one fewer reroll next fight`},result:e=>e===`paid`?`Paid. Receipt? No. Receipts are for places with a way out.`:`He writes something down. The pen doesnŌĆÖt need ink. Down here nothing does.`},lostProperty:{name:`Grave Goods`,text:`A niche in the wall, a shelf of things nobody came back for. The attendant doesnŌĆÖt look up. He canŌĆÖt. "One per delver."`,option:(e,t,n)=>e===`claim`?{label:`Claim something`,hint:n?`you canŌĆÖt carry more`:`a random relic ŌĆö previous owner nearby`}:{label:`Leave it`},result:(e,t)=>e===`claimed`?`${t.charmName}. It was labeled with a name. Not yours. Now it is.`:e===`heldOut`?`${t.charmName}. He holds it out, patient the way only the dead are. Your hands are full ŌĆö something would have to stay behind.`:`The niche stays full. Somewhere behind the wall, something is relieved.`},freeDrink:{name:`The Last Toast`,text:`A cup stands on a coffin lid, freshly poured. Nobody pours drinks down here. Somebody did.`,option:e=>e===`drink`?{label:`Drink it`,hint:`+1 reroll next fight`}:{label:`Leave the cup`,hint:`+1 tooth ŌĆö full cups fetch a price here`},result:e=>e===`drank`?`It burns pleasantly. Next fight, your hands are faster. DonŌĆÖt ask what was in it. Or whose.`:`You set it back. Something pays you a tooth for the courtesy. You donŌĆÖt see what.`},pawnbroker:{name:`The Ossuary Clerk`,text:`A hunched figure with a jewelerŌĆÖs loupe looks at your bag the way the starving look at dinner. "Six teeth. For whichever one misses you least. The glazed and the gilded ŌĆö those the catalogue prices higher."`,option:(e,t,n)=>{if(e!==`sell`)return{label:`Keep your dice`};if(n)return{label:`Sell a die`,hint:`the bag is empty ŌĆö even the catalogue has limits`};let r=Number(t.price??0),i=Number(t.priceMax??0),a=r===i?le(r):`${r}ŌĆō${le(i)}`;return{label:`Sell a die`,hint:t.last?`your LAST die, ${a} ŌĆö he doesnŌĆÖt ask what youŌĆÖll roll after`:t.premium?`a random glass or gold die, ${a} ŌĆö the shine is in the catalogue`:`a random plain die, ${a}`}},result:(e,t)=>e===`sold`?`${le(Number(t.price??0))}, counted twice. The die doesnŌĆÖt look back. Dice never do.`:e===`soldLast`?`${le(Number(t.price??0))}, counted twice ŌĆö for the last one. He shelves it with the other things nobody came back for. You already know which shelf.`:`He shrugs. "Everyone comes back." Down here it isnŌĆÖt a figure of speech.`},handyman:{name:`The Bone-Carver`,text:`He has a chisel, a steady hand, and no pulse. "Three teeth. Your worst face becomes a six. Somewhere."`,option:(e,t,n)=>e===`pay`?{label:`Pay ${le(Number(t.price??0))}`,hint:n?`you donŌĆÖt have it`:`a random dieŌĆÖs lowest face becomes a six`}:{label:`Decline`},result:e=>e===`done`?`Three taps of the chisel. The die is better now. It doesnŌĆÖt thank him either.`:`He nods and packs the chisel away. "They all decline once."`},notary:{name:`The Keeper of Keys`,text:`A thin figure with a lockbox that locks twice. Inside, on velvet: a broken piece of iron. The lock it fits is below your feet. "Not for sale. Except tonight, to you, apparently."`,option:(e,t,n)=>e===`buy`?t.soldOut?{label:`Buy the shard`,hint:`the lockbox is empty tonight`}:{label:`Pay ${le(Number(t.price??0))}`,hint:n?`you donŌĆÖt have it`:`a shard of the key`}:{label:`Walk past`},result:(e,t)=>e===`bought`?Number(t.have)>=Number(t.total)?`The shard fits the others exactly. Somewhere below you, a lock that didnŌĆÖt exist clears its throat.`:`He counts the teeth twice and hands it over. ${t.have} of ${t.total}. He doesnŌĆÖt say what itŌĆÖs a third of. You know.`:`He closes the box. Both locks. "Somebody always buys. Eventually the crypt inherits it back."`},seance:{name:`The Medium`,text:`A woman at a corner slab is mid-conversation with the wall. Down here, the wall answers. She stops, looks at you, and offers to rearrange something.`,option:e=>e===`let`?{label:`Let her`,hint:`a random page levels up`}:{label:`Leave the slab`},result:(e,t)=>e===`done`?`${t.catName} strikes harder now. She wonŌĆÖt say why, and the wall wonŌĆÖt either.`:`She was mid-conversation anyway. It wasnŌĆÖt with you. It was about you.`}},ui:{wordmarkHtml:`

        <h3>The arrangement</h3>
        <p>Every chamber holds an enemy: deal <strong>its HP</strong> in damage
           before your <strong>4 turns</strong> run out or the delve is over.
           A delve is 8 floors of 3 chambers; the third chamber of each floor
           belongs to <strong>the floor's keeper</strong> ŌĆö a creature with a
           rule of its own: fewer turns, worthless threes, webbed-up pages.
           The map (top right) shows what's waiting.</p>
        <h3>A turn</h3>
        <p>Five dice are drawn from your bag and rolled. Click dice to
           <strong>hold</strong> them, reroll the rest up to twice, then write
           the result into a page of the grimoire. The page decides the damage ŌĆö
           straights, of-a-kinds, sixes, and so on. The number next to each
           open page is what your current dice would deal there.</p>
        <h3>The grimoire</h3>
        <p>Each page is written <strong>once per floor</strong> ŌĆö it stays
           spent for all 3 chambers. Sometimes you must write a zero into
           something you loved. The crypt calls this character-building.</p>
        <h3>The stairways</h3>
        <p>Each new floor, two stairs go down: <strong>the halls</strong>
           (standard enemies, standard loot) or <strong>the ossuary</strong>
           (half again tougher, double loot). Choose by how much your engine
           can carry.</p>
        <h3>Relics</h3>
        <p>Passive relics with lasting effects ŌĆö you can carry five. Keepers
           drop them, the merchant keeps one under the slab sometimes, and
           grave goods find new owners.</p>
        <h3>The merchant</h3>
        <p>Teeth buy improvements between fights: carve dice faces, gild
           dice (a tooth per scored turn) or blow them in <strong>grave
           glass</strong> (counts double, shatters eventually), or set rune
           stones so pages strike harder. Savings earn interest: a tooth
           per 5 held.</p>
        <h3>At the slab</h3>
        <p><strong>R</strong> or <strong>Space</strong> rolls, <strong>1ŌĆō5</strong>
           hold dice, <strong>Backspace</strong> releases them right to left,
           <strong>Esc</strong> backs out. Your delve is saved ŌĆö close the tab
           and the crypt waits. It's good at that.</p>`,close:`Understood`,backOffice:`the bone room`,backOfficeTip:`Every number in the crypt, editable. Deal a delve on your own terms.`},leave:{title:`Climb out?`,flavor:`Mid-delve. The crypt will remember where you stopped. It remembers everything else too.`,stay:`Keep descending`,go:`Climb out`},resume:{title:`The crypt waited`,flavor:`Your delve is where you left it. Bones, dice, debts. Mostly debts.`,sit:`Descend again`,walk:`Walk away`,dealtUnder:e=>`This delve was cut under v${e}. It plays out by the old stone ŌĆö the crypt honors its own paper.`},notice:{title:`Notice from below`,flavor:`Nailed to the gate. Reading it is optional. It always is.`},recordsModal:{title:`The registry`,flavor:`The crypt remembers everyone. It files them.`,empty:`No delves in the registry yet. The stone waits. ItŌĆÖs good at that.`,boardTitle:`Deepest delves`,recentTitle:`Recent delves`},plaques:{title:`Rubbings`,flavor:`Charcoal on paper, taken from the stones. Proof you were down here.`,count:(e,t)=>`${e} of ${t} taken`,awarded:e=>`The stone takes a new rubbing ŌĆö ${e}.`,chairName:e=>`${e}, Outlasted`,chairDesc:e=>`Clear ${e}ŌĆÖs chamber.`,defs:{firstLoss:{name:`The Crypt Keeps You`,desc:`End a delve face-down. Everyone starts as a resident.`},sweptUp:{name:`Shards`,desc:`Lose a glass die to a throw. The floor keeps them.`},curtain:{name:`Into the Ossuary`,desc:`Brave a chamber in the ossuary.`},paperTrail:{name:`Key Shard`,desc:`Hold a shard of the key.`},exactChange:{name:`Measured Exactly`,desc:`Clear a chamber at exactly the mark. Not a point spilled.`},tripleDigits:{name:`Triple Digits`,desc:`Score 100 or more on a single page.`},feltDown:{name:`Toothless`,desc:`Clear a denizenŌĆÖs chamber entered without a single tooth.`},theMinimum:{name:`The Minimum`,desc:`Five of a kind. Ones. The stone respects the gesture.`},shatteredStanding:{name:`Shattered and Standing`,desc:`Clear a denizenŌĆÖs chamber after two glass dice burst i }

/* ŌöĆŌöĆ Scene: the hanging lamp ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ */

#scene {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
}

#scene .lamp {
  position: absolute;
  top: 0; left: 50%;
  width: 0;
  transform-origin: top center;
  animation: lamp-sway 9s ease-in-out infinite;
}

@keyframes lamp-sway {
  0%, 100% { transform: rotate(-0.6deg); }
  50% { transform: rotate(0.6deg); }
}

#scene .cord {
  position: absolute;
  top: 0; left: -1px;
  width: 2px; height: 34px;
  background: linear-gradient(#000, #1c1712);
}

#scene .shade {
  position: absolute;
  top: 34px; left: -60px;
  width: 120px; height: 40px;
  background: linear-gradient(160deg, #4a3d28, #241d12 60%, #15100a);
  clip-path: polygon(26% 0, 74% 0, 100% 100%, 0 100%);
}

#scene .bulbglow {
  position: absolute;
  top: 62px; left: -75px;
  width: 150px; height: 26px;
  background: radial-gradient(ellipse at 50% 0%, rgba(255, 232, 170, 0.9), rgba(255, 220, 150, 0.15) 55%, transparent 75%);
  filter: blur(2px);
}

#scene .cone {
  position: absolute;
  top: 70px; left: 0;
  width: 100%; height: 62vh;
  background: linear-gradient(rgba(255, 226, 160, 0.09), transparent 78%);
  clip-path: polygon(44.5% 0, 55.5% 0, 84% 100%, 16% 100%);
  animation: flicker 7s infinite;
}

@keyframes flicker {
  0%, 100% { opacity: 1; }
  87% { opacity: 1; }
  88% { opacity: 0.75; }
  89% { opacity: 0.95; }
  91% { opacity: 0.7; }
  92% { opacity: 1; }
}

#scene .motes i {
  position: absolute;
  top: 80px;
  width: 3px; height: 3px;
  border-radius: 50%;
  background: rgba(255, 232, 180, 0.55);
  opacity: 0;
  animation: mote 11s linear infinite;
}

#scene .motes i:nth-child(1) { left: 47%; animation-duration: 12s; }
#scene .motes i:nth-child(2) { left: 50%; animation-delay: 1.6s; animation-duration: 9s; }
#scene .motes i:nth-child(3) { left: 53%; animation-delay: 3.1s; width: 2px; height: 2px; }
#scene .motes i:nth-child(4) { left: 45%; animation-delay: 4.7s; animation-duration: 14s; }
#scene .motes i:nth-child(5) { left: 56%; animation-delay: 6s; width: 2px; height: 2px; }
#scene .motes i:nth-child(6) { left: 49%; animation-delay: 7.4s; animation-duration: 10s; }
#scene .motes i:nth-child(7) { left: 52%; animation-delay: 8.8s; width: 2px; height: 2px; }
#scene .motes i:nth-child(8) { left: 44%; animation-delay: 10.2s; animation-duration: 13s; }

@keyframes mote {
  0% { transform: translate(0, 0); opacity: 0; }
  12% { opacity: 0.7; }
  85% { opacity: 0.35; }
  100% { transform: translate(26px, 52vh); opacity: 0; }
}

#scene .vignette {
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 50% 38%, transparent 52%, rgba(0, 0, 0, 0.55) 100%);
}

header {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
  margin-bottom: 28px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 14px;
}

.logo-mark {
  height: 46px;
  filter: drop-shadow(0 0 12px rgba(217, 164, 65, 0.3));
}

.wordmark {
  display: flex;
  flex-direction: column;
  gap: 4px;
  font-weight: normal;
  text-transform: uppercase;
  color: var(--gold);
  text-shadow: 0 0 24px rgba(217, 164, 65, 0.35);
  line-height: 1;
}

.wordmark .w1 {
  font-size: 1.35rem;
  letter-spacing: 0.42em;
}

.wordmark .w2 {
  font-size: 0.95rem;
  letter-spacing: 0.45em;
  color: rgba(217, 164, 65, 0.8);
}

.wordmark .w2 em {

  font-size: 0.8rem;

}

.stats { display: flex; flex-wrap: wrap; gap: 18px; align-items: baseline; }

.stat {
  font-size: 0.9rem;
  color: rgba(232, 220, 192, 0.75);
  letter-spacing: 0.05em;
}

.stat .boss { color: var(--gold); font-style: italic; }

.stat.money {
  font-size: 1.1rem;
  color: var(--gold);
}

.help-btn {
  width: 26px; height: 26px;
  border-radius: 50%;
  border: 1px solid rgba(217, 164, 65, 0.5);
  background: rgba(0, 0, 0, 0.3);
  color: var(--gold);
  font-family: inherit;
  font-size: 0.9rem;
  cursor: pointer;
  transition: box-shadow 0.12s ease;
}

.help-btn:hover { box-shadow: 0 0 12px rgba(217, 164, 65, 0.35); }
/* The daily chip while seated at tonight's table ŌĆö a worn badge, not an offer. */
.help-btn.daily-live {
  color: var(--gold, #d9a441);
  border-color: rgba(217, 164, 65, 0.55);
  box-shadow: 0 0 8px rgba(217, 164, 65, 0.25);
}

.help-btn.wide {
  width: auto;
  border-radius: 14px;
  padding: 0 14px;
  font-size: 0.7rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
}

.stat-btn {
  background: none;
  border: none;
  border-bottom: 1px dotted rgba(232, 220, 192, 0.4);
  font-family: inherit;
  padding: 0 0 1px;
